    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">수령정보 유의사항</h1>

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <ul class="ul -bullet">
                        <!-- ux 라이팅 수정 시작 -->
                        <li>골드바 실물은 구매 고객 본인만 수령할 수 있습니다.<br>(본인 신분증이 필요하며, 대리인은 수령할 수 없습니다.)</li>
                        <li>구매한 날로부터 통상 영업일 기준 7일 이내에 본인이 지정한 영업점에서 실물 수령할 수 있으며, 지정한 영업점은 변경할 수 없습니다.</li>
                        <li>골드바 구매 후 권종 교환, 취소, 환불, 정정을 할 수 없습니다.</li>
                        <li>국제 금 시세 및 골드바 수급 상황에 따라 판매가 제한될 수 있습니다.</li>
                        <!-- //ux 라이팅 수정 끝 -->
                    </ul>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <!-- <button type="button" class="button -lg">취소</button> -->

                    </div>
