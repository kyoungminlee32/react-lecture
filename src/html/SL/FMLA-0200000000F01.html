                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:1; --max:4;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 4단계 중 1번째</span>

                            </div>

                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required4"  >
                                    <label for="required4">골드바 가격 계산 및 수수료율</label>
                                    <button type="button" class="more"><span class="hide">골드바 가격 계산 및 수수료율</span></button>
                                </div>
                                <div class="checkbox -sub">

                                    <label for="required5">상품설명서 및 약관</label>
                                    <button type="button" class="more"><span class="hide">상품설명서 및 약관</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required6" >
                                    <label for="required6">구매정보 유의사항</label>
                                    <button type="button" class="more"><span class="hide">구매정보 유의사항</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required7" >
                                    <label for="required">수령정보 유의사항</label>
                                    <button type="button" class="more"><span class="hide">수령정보 유의사항</span></button>
                                </div> -->
