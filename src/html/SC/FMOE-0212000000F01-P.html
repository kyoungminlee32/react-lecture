<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>만족도 조사</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>
<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">만족도 조사</h1>

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">NH농협은행 영업점<br>방문 예약 서비스를 이용해 주셔서<br>감사 드립니다.</h2>
                        <p class="desc">만족도 조사 결과는 더 나은 서비스 제공을 위한 자료로 참고 하겠습니다.</p>
                    </div>
                    <div class="review">
                        <p class="p">영업점 방문 예약 서비스에 대해 얼마나 만족하시나요?</p>
                        <div class="stars">
                            <button class="star"><span class="hide">별점1개</span></button>
                            <button class="star"><span class="hide">별점2개</span></button>
                            <button class="star"><span class="hide">별점3개</span></button>
                            <button class="star"><span class="hide">별점4개</span></button>
                            <button class="star"><span class="hide">별점5개</span></button>
                        </div>
                        <div class="btw-32">
                            <p class="p">서비스를 이용하면서 좋았던 점이나 개선할 점을 알려주세요.</p>
                            <div class="textarea">
                                <textarea placeholder="내용을 간단히 입력해 주세요."></textarea>
                                <div class="text-count">
                                    <span class="count point">0</span>
                                    <span class="total">300</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');

        // 팝업 닫기(마지막 인자 기본값: false)
        // Popup.close('popup', function() {
        //     '콜백함수'
        // });

        // 팝업 닫기 + DOM 삭제
        // Popup.close('popup', function() {
        //     '콜백함수'
        // }, true);
    </script>
    <script>
        $('.star').click(function(){
            $('.stars .star').removeClass('on');
            $(this).addClass('on').prevAll('.star').addClass('on')
        })
    </script>
</body>
</html>
