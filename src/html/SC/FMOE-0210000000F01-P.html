<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>상품 검색</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>
<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">도착 알림</h1>

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">도착을 알려주세요</h2>
                    </div>
                    <div class="left">
                        <!-- [240319] 이미지 크기 변경됨 -->
                        <img src="/content/assets/imgs/img/utility/ico-sc-notice.png" style="width:14rem" alt="도착 알림 이미지">
                    </div>
                    <ul class="ul -bullet btw-23">
                        <!-- ux 라이팅 수정 시작 -->
                        <li>영업점 방문 시 아래 [영업점 도착알림]을 눌러 주세요</li>
                        <li>예약 20분 전부터 10분 후까지 [영업점 도착알림] 을 누를 수 있으며 10분이 지나면 자동 취소됩니다.</li>
                        <!-- //ux 라이팅 수정 끝 -->
                    </ul>
                    <div class="left refresh-btn-area"><!-- 2023-12-27 클래스명 수정 right > left -->
                        <button type="button" class="button -lg -fit">새로고침
                            <span class="refresh"></span>
                        </button>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- ux 라이팅 수정 시작 -->
                        <button type="button" class="button -lg -primary">영업점 도착알림</button>
                        <!-- //ux 라이팅 수정 끝 -->
                    </div>
                </div>
                <!-- 토스트팝업은 -active 클래스 사용하여 실행합니다 -->
                <div class="toast -active" role="alert" aria-live="assertive">
                    <div class="message">
                        <p>도착 확인이 가능한 시간이 아닙니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');

        // 팝업 닫기(마지막 인자 기본값: false)
        // Popup.close('popup', function() {
        //     '콜백함수'
        // });

        // 팝업 닫기 + DOM 삭제
        // Popup.close('popup', function() {
        //     '콜백함수'
        // }, true);
    </script>
</body>
</html>
