<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>스마트상담센터</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">스마트상담센터</h1>

                    <div class="funcs">
                        <button type="button" class="func -home"><span class="hide">홈</span></button>
                        <button type="button" class="func -menu"><span class="hide">전체메뉴</span></button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">상담 방법을 선택해 주세요</h2>
                        <p class="desc">금융상품에 대해 궁금한 내용을 쉽고 빠르게 도와 드릴게요.</p>
                    </div>
                    <div class="sc-main-wrap">
                        <div class="sc-line-box">
                            <div class="sc-type -agent">
                                <!-- ux 라이팅 수정 시작 -->
                                <h3 class="title">영업점 방문 예약</h3>
                                <p class="p">영업점마다 다른 운영 시간을 확인해 주세요.</p>
                                <!-- //ux 라이팅 수정 끝 -->
                            </div>
                            <div class="buttons fix">
                                <!-- ux 라이팅 수정 시작 -->
                                <button type="button" class="button -sm">예약 내역</button>
                                <!-- //ux 라이팅 수정 끝 -->
                                <button type="button" class="button -sm -secondary">예약하기</button>
                            </div>
                        </div>
                        <div class="sc-line-box">
                            <div class="sc-type -phone">
                                <!-- ux 라이팅 수정 시작 -->
                                <h3 class="title">전화 상담 예약</h3>
                                <!-- //ux 라이팅 수정 끝 -->
                                <p class="p">평일 09:00 ~ 18:00</p><!-- 2024-04-11 시간 형식 수정 -->
                            </div>
                            <div class="buttons fix">
                                <!-- ux 라이팅 수정 시작 -->
                                <button type="button" class="button -sm">예약 내역</button>
                                <!-- //ux 라이팅 수정 끝 -->
                                <button type="button" class="button -sm -secondary">예약하기</button>
                            </div>
                        </div>
                        <div class="sc-line-box">
                            <!-- [240319] 화상상담 아이콘 변경 -->
                            <div class="sc-type -video">
                                <!-- ux 라이팅 수정 시작 -->
                                <h3 class="title">화상 상담</h3>
                                <!-- //ux 라이팅 수정 끝 -->
                                <p class="p">평일 09:00 ~ 18:00</p><!-- 2024-04-11 시간 형식 수정 -->
                            </div>
                            <div class="buttons fix">
                                <button type="button" class="button -sm -secondary">상담하기</button>
                            </div>
                        </div>
                        <div class="sc-line-box">
                            <div class="sc-type -chat">
                                <!-- ux 라이팅 수정 시작 -->
                                <h3 class="title">채팅 상담</h3>
                                <!-- //ux 라이팅 수정 끝 -->
                                <p class="p">평일 09:00 ~ 18:00</p><!-- 2024-04-11 시간 형식 수정 -->
                            </div>
                            <div class="buttons fix">
                                <button type="button" class="button -sm -secondary">상담하기</button>
                            </div>
                        </div>
                        <div class="sc-line-box">
                            <div class="sc-type -mail">
                                <!-- ux 라이팅 수정 시작 -->
                                <h3 class="title">이메일 상담</h3>
                                <!-- //ux 라이팅 수정 끝 -->
                                <p class="p">24시간(회신 - 09:00 ~ 18:00)</p>
                            </div>
                            <div class="buttons fix">
                                <!-- ux 라이팅 수정 시작 -->
                                <button type="button" class="button -sm">예약 내역</button>
                                <!-- //ux 라이팅 수정 끝 -->
                                <button type="button" class="button -sm -secondary">예약하기</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
