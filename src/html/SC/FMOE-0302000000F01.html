<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>
                    <!-- ux 라이팅 수정 시작 -->
                    <h1 class="title">전화 상담내역</h1>
                    <!-- //ux 라이팅 수정 끝 -->

                    <div class="funcs">
                        <button type="button" class="func -home"><span class="hide">홈</span></button>
                        <button type="button" class="func -menu"><span class="hide">전체메뉴</span></button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="appoint-list">
                        <div class="dl -bordered">
                            <!-- ux 라이팅 수정 시작 -->
                            <span class="badge -greenline">NH농협은행</span>
                            <!-- //ux 라이팅 수정 끝 -->
                            <h3 class="appoint-subject">예적금 문의</h3>
                            <dl class="dl">
                                <div>
                                    <dt>작성일</dt>
                                    <dd>yyyy.mm.dd</dd>
                                </div>
                                <div>
                                    <dt>예약일</dt>
                                    <dd>2023.12.28</dd>
                                </div>
                                <div>
                                    <dt>상태</dt>
                                    <!-- ux 라이팅 수정 시작 -->
                                    <dd>접수 / 상담사 미배정</dd>
                                    <!-- //ux 라이팅 수정 끝 -->
                                </div>
                            </dl>
                        </div>

                        <div class="dl -bordered">
                            <!-- ux 라이팅 수정 시작 -->
                            <span class="badge -greenline">NH농협은행</span>
                            <!-- //ux 라이팅 수정 끝 -->
                            <h3 class="appoint-subject">예적금 문의</h3>
                            <dl class="dl">
                                <div>
                                    <dt>작성일</dt>
                                    <dd>yyyy.mm.dd</dd>
                                </div>
                                <div>
                                    <dt>예약일</dt>
                                    <dd>2023.12.28</dd>
                                </div>
                                <div>
                                    <dt>상태</dt>
                                    <!-- ux 라이팅 수정 시작 -->
                                    <dd>통화 완료</dd>
                                    <!-- //ux 라이팅 수정 끝 -->
                                </div>
                            </dl>
                        </div>
                    </div>

                    <!-- 내역 없을 때  -->
                    <div class="result -sm">
                        <p class="message">조회 결과가 없습니다.</p>
                    </div>
                    <!-- //내역 없을 때  -->
                </div><!-- //.content -->
                
                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <ul class="ul -bullet">
                                <!-- ux 라이팅 수정 시작 -->
                                <li>상품 내용이나 가입 방법 등 전화 상담할 내용을 간략하게 작성하여 예약하시면 스마트상담센터의 상담사들이 고객님에게 전화를 드립니다.</li>
                                <li>신청한 내용으로 상담 내용(전화/채팅/이메일)은 저장됩니다. 개인신용정보보호법에 따라 본인 이외의 상담은 제한이 있을 수 있습니다.</li>
                                <!-- //ux 라이팅 수정 끝 -->
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">전화상담예약 신청</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
