<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>
                    <!-- ux 라이팅 수정 시작 -->
                    <h1 class="title">화상 상담</h1>
                    <!-- //ux 라이팅 수정 끝 -->

                    <div class="funcs">
                        <button type="button" class="func -home"><span class="hide">홈</span></button>
                        <button type="button" class="func -menu"><span class="hide">전체메뉴</span></button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">
                            전문 상담사에게 궁금한 점을<br>
                            화상으로 문의해 주세요
                        </h2>
                    </div>

                    <!-- ux 라이팅 수정 시작 -->
                    <ol class="ol -badge">
                        <li>
                            <span class="gadget">1단계</span>
                            <div class="title">개인정보 이용 동의</div>
                            화상 상담에 필요한 개인정보 수집·이용에 동의해 주세요
                        </li>
                        <li>
                            <span class="gadget">2단계</span>
                            <div class="title">상담 분류 선택</div>
                            상담사가 준비할 수 있도록 상담 분류와 문의 내용을 입력해 주세요.
                        </li>
                        <li>
                            <span class="gadget">3단계</span>
                            <div class="title">상담사 화상 연결</div>
                            상담사와 화상으로 상담을 진행해 주세요.
                        </li>
                    </ol>
                    <!-- //ux 라이팅 수정 끝 -->
                </div><!-- //.content -->
                
                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <ul class="ul -bullet">
                                <!-- ux 라이팅 수정 시작 -->
                                <li>영업시간(09:00 ~ 18:00) 이외에는 이메일 상담을 이용해 주세요.
                                <!-- //ux 라이팅 수정 끝 -->
                                    <!-- 2023-12-27 수정 클래스 추가(btw-12) -->
                                    <div class="left btw-12"><a href="javascript:void(0)" class="a -arrow">이메일 상담 신청</a></div>
                                    <!-- //2023-12-27 수정 클래스 추가(btw-12) -->
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- 2023-12-26 문구 수정 -->
                        <!-- ux 라이팅 수정 시작 -->
                        <button type="button" class="button -lg -primary">화상 상담하기</button>
                        <!-- //ux 라이팅 수정 끝 -->
                        <!-- //2023-12-26 문구 수정 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
