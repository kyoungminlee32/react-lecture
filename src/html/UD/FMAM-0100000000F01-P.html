<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>
<body>
    <!-- 240103 서브페이지->팝업페이지로 변경 -->
    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">본인인증</h1>

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">
                            휴대폰 본인인증을 해 주세요
                        </h2>
                    </div>

                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="required-total">
                                <label for="required-total">[필수] 전체동의</label>
                            </div>
                            <button type="button" class="more"><span class="hide">필수 전체 동의 약관</span></button>
                        </div>
                        <div class="panel">
                            <div class="checkboxes -full">
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required1">
                                    <label for="required1">고유식별정보 처리 동의</label>
                                    <button type="button" class="more"><span class="hide">고유식별정보 처리 동의</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required2">
                                    <label for="required2">개인정보 수집 이용 제공 동의</label>
                                    <button type="button" class="more"><span class="hide">개인정보 수집 이용 제공 동의</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required3">
                                    <label for="required3">서비스 이용약관 동의</label>
                                    <button type="button" class="more"><span class="hide">서비스 이용약관 동의</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required4">
                                    <label for="required4">통신사 이용약관 동의</label>
                                    <button type="button" class="more"><span class="hide">통신사 이용약관 동의</span></button>
                                </div>
                            </div>
                        </div>
                    </div>        
                    <div class="field">
                        <label for="phone123" class="label">휴대폰번호</label>
                        <div class="select">
                            <button type="button" data-id="phone123">통신사 선택</button>
                        </div>
                        <div class="mix">
                            <div class="select flex-5">
                                <button type="button" class="left-side" aria-haspopup="true" title="휴대폰 앞자리 선택" >010</button>
                            </div>
            
                            <div class="text flex-7" data-clear="false">
                                <input type="tel" data-id="phone123" class="mid-side num-call" placeholder="-없이 입력" title="휴대폰번호 입력" aria-haspopup="true"  readonly>
                            </div>
                            <div class="space -lined right-side">
                                <button type="button" class="button -xs -fit" title="인증번호 요청" title="인증번호 요청">요청</button>
                            </div>
                        </div>
                        <div class="mix">
                            <div class="text flex-8" data-clear="false">
                                <input type="tel" data-id="phone123" class="left-side num-call" placeholder="인증번호 6자리" title="인증번호 6자리 입력" aria-haspopup="true" readonly>
                            </div>
                            <div class="space -lined mid-side time-limit">
                                <span aria-live="assertive">3:30</span>
                            </div>
                            <div class="space -lined right-side">
                                <!-- <button type="button" class="button -xs -fit">시간 연장</button> --> <!-- 240328 시간연장 삭제 -->
                            </div>
                            <p class="message -error">유효성메시지 출력 영역</p>
                        </div>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary -disabled">다음</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- 토스트팝업은 -active 클래스 사용하여 실행합니다 -->
    <div class="toast" role="alert" aria-live="assertive">
        <div class="message">
            <p>인증번호가 발송되었습니다.</p>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');
    </script>
</body>
</html>
