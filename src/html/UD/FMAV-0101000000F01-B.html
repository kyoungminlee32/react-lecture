<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>계약서류 받는 방법-layer-이메일</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>

<body>
    <div id="layer" class="layer">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">~을 어디로 받을까요?</h1>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="segments -bar">
                        <div class="outer">
                            <div class="inner">
                                <div role="tablist" class="list">
                                    <div class="item -active"><button type="button" role="tab" aria-selected="true"
                                            aria-controls="segments-panel3" id="segment5">이메일</button></div>
                                    <div class="item"><button type="button" role="tab" aria-selected="false"
                                            aria-controls="segments-panel4" id="segment6">문자메시지</button></div>
                                    <span class="switcher" aria-hidden="true"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="segments-panels">
                        <div role="tabpanel" aria-labelledby="segment5" id="segments-panel3"
                            class="segments-panel -active" tabindex="0">
                            <div class="field">
                                <!-- [CASE] 에러 text -error-->
                                <div class="text">
                                    <input type="text" id="field1" value="ABC123@gmail.com" title="이메일">
                                </div>
                                <!-- [CASE] 에러메세지-->
                                <!-- <p class="message">입력 오류 알림 내용 출력</p> -->
                                <!-- [CASE] 에러메세지-->
                            </div>
                        </div>

                        <div role="tabpanel" aria-labelledby="segment5" id="segments-panel4" class="segments-panel"
                            tabindex="0">
                            <div class="field">
                                <div class="mix">
                                    <div class="select flex-3">
                                        <button type="button" class="left-side num-call" aria-haspopup="true" title="휴대폰 앞자리 선택" readonly>010</button>
                                    </div>
                                    <div class="text flex-7" data-clear="false">
                                        <input type="tel" class="right-side num-call" placeholder="-없이 입력" title="010제외한 휴대전화번호" readonly>
                                    </div>
                                    <p class="message -error">입력 오류 알림 내용 출력</p>
                                </div>
                            </div>

                        </div>

                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Layer.open('layer');

        // 레이어 닫기(마지막 인자 기본값: false)
        // Layer.close('layer', function() {
        //     '콜백함수'
        // });

        // 레이어 닫기 + DOM 삭제
        // Layer.close('layer', function() {
        //     '콜백함수'
        // }, true);
    </script>
</body>

</html>
