<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">본인인증</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>  
                    <div class="h2-group">                        
                        <h2 class="h2">
                            <!-- 본인 확인 방법을 선택해 주세요 -->
                            <!-- [CASE] 얼굴인증 실패횟수 5회 초과시 -->
                            얼굴인증을 하지 못했어요 <br>다른 인증 방법을 선택해 주세요
                        </h2>
                    </div>         
                    <div class="field">
                        <button type="button" class="certify cer1">본인계좌 인증</button> <!-- ux 라이팅 수정 -->
                        <button type="button" class="certify cer2">영상 통화 인증</button> <!-- [231228] ux 라이팅 수정 -->
                    </div>       
                </div>
                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <ul class="ul -bullet"> <!-- ux 라이팅 수정 -->
                                <li>영상 통화 이용시간 : (영업일/평일) 09:00 ~ 18:00</li>   <!-- [240531]텍스트 변경 -->
                                <li>원활한 상담을 위해 신분증을 미리 준비해 주세요. </li>
                                <li>영상 통화를 하면 데이터 요금이 발생할 수 있습니다.</li>
                                <li>영상 통화에 의한 실명인증 자료는 보관됩니다.</li>
                                <li>불필요한 행동(음란행위, 욕설 등)을 하면 화면이 차단되며, 법적인 처벌을 받을 수 있습니다.</li>                                
                            </ul>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
