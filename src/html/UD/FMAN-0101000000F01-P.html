<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>우편번호를 입력</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>
<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">우편번호를 입력해 주세요</h1> <!-- ux 라이팅 수정 -->
                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">                    
                    <div class="field">
                        <div class="mix">
                            <div class="text">
                                <input type="text" class="left-side" id="search01" value="" placeholder="도로명, 지번, 건물명" title="도로명, 지번, 건물명"> <!-- [231115] title추가 --> <!-- ux 라이팅 수정 --> <!-- [231218]placeholder 수정 -->
                            </div>
            
                            <div class="space -lined search">
                                <button type="button" class="icon-button -search"><span class="hide">조회</span></button>
                            </div>
                        </div>
                    </div>
                    <div class="field">
                        <ul class="ul -bullet address-detail">
                            <li>도로명+건물번호 <span>(통일로 120)</span></li>
                            <li>지역명+번지 <span>(충정로 1가 85)</span></li>
                            <li>건물명 <span>(농협중앙회 중앙본부)</span></li>
                            <!-- <li>초성검색 <span>(ㄴㅎㅈㅇㅎ)</span></li> --> <!-- [231229]삭제 -->
                        </ul>
                    </div>
                    
                    <!-- [CASE]검색결과 있는 경우 -->
                    <div class="field">
                        <p class="total-count">총 <span class="point">5</span>건</p>
                        <div class="custom-list">
                            <ul>
                                <li>
                                    <!-- ui수정  -->
                                    <button type="button" class="-sm"><!-- ui수정 240122 (클래스명 변경) -->
                                        <div>
                                            <div class="address-txt">
                                                <p>서울특별시 영등포구 여의도동 28-3</p>
                                                <p>서울특별시 영등포구 여의대로 9(여의도동)</p>
                                                <p class="addr-num">16007</p>
                                            </div>
                                        </div>
                                    </button>
                                </li>
                                <li>
                                    <button type="button" class="-sm"><!-- ui수정 240122 (클래스명 변경) -->
                                        <div>
                                            <div class="address-txt">
                                                <p>서울특별시 영등포구 여의도동 28-3</p>
                                                <p>서울특별시 영등포구 여의대로 9(여의도동)</p>
                                                <p class="addr-num">16007</p>
                                            </div>
                                        </div>
                                    </button>
                                </li>
                            </ul>
                        </div>
                    </div>
                    <!-- //[CASE]검색결과 있는 경우 -->

                    <!-- [231121]영역 추가 -->
                    <div class="field">
                        <button type="button" class="more-button" aria-haspopup="false">더보기(1/50)</button>
                    </div>
                    <!-- //[231121]영역 추가 -->

                    <!-- [CASE]검색결과 없는 경우 -->
                    <div class="result -sm">
                        <p class="message">검색 결과가 없습니다.</p>
                    </div>
                    <!-- //[CASE]검색결과 없는 경우 -->
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');

        // 팝업 닫기(마지막 인자 기본값: false)
        // Popup.close('popup', function() {
        //     '콜백함수'
        // });

        // 팝업 닫기 + DOM 삭제
        // Popup.close('popup', function() {
        //     '콜백함수'
        // }, true);
    </script>
</body>
</html>
