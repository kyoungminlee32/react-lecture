<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OTP 인증번호</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title"></h1>

                    <div class="funcs">
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">
                            OTP 인증번호 6자리를 <br>입력해 주세요
                        </h2>
                    </div>
                    <div class="otp-pw-wrap">
                        <div class="short-pw">
                            <span class="filled"><input title="OTP 인증번호 첫번째자리 입력" type="password" maxlength="1" disabled></span>
                            <span class="filled"><input title="OTP 인증번호 두번째자리 입력" type="password" maxlength="1" disabled></span>
                            <span><input title="OTP 인증번호 세번째자리 입력" type="password"  maxlength="1" disabled></span>
                            <span><input title="OTP 인증번호 네번째자리 입력" type="password"  maxlength="1" disabled></span>
                            <span><input title="OTP 인증번호 다섯번째자리 입력" type="password"  maxlength="1" disabled></span>
                            <span><input title="OTP 인증번호 여섯번째자리 입력" type="password"  maxlength="1" disabled></span>
                        </div>
                        <div class="info-area">
                            <p class="info -error">인증번호가 일치하지 않습니다 (n/10)</p>

                            <!-- [case] 연속 10회 오류시 -->
                            <p class="info -error">인증번호 10회 오류로 사용이 제한됩니다.<br>OTP 오류해제 후 이용해 주세요</p>    
                        </div>
                        
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
