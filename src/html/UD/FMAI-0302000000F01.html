<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">본인인증</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>                    
                    <div class="h2-group">
                        <!-- ux 라이팅 수정 시작 -->
                        <h2 class="h2">
                            휴대폰 본인인증을 해주세요
                        </h2>
                        <!-- //ux 라이팅 수정 끝 -->
                    </div>

                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="required-total">
                                <label for="required-total">[필수] 전체동의</label>
                            </div>
                            <button type="button" class="more"><span class="hide">필수 전체 동의 약관</span></button>
                        </div>
                        <div class="panel">
                            <div class="checkboxes -full">
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required1">
                                    <label for="required1">개인(신용)정보 수집・이용・제공 동의</label> <!-- [231228] ux 라이팅 수정 -->
                                    <button type="button" class="more"><span class="hide">개인(신용)정보 수집・이용・제공 동의</span></button> <!-- [231228] ux 라이팅 수정 -->
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required2">
                                    <label for="required2">개인정보 제3자 제공 동의</label> <!-- [231228] ux 라이팅 수정 -->
                                    <button type="button" class="more"><span class="hide">개인정보 제3자 제공 동의</span></button> <!-- [231228] ux 라이팅 수정 -->
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required3">
                                    <label for="required3">서비스 이용약관 동의</label>
                                    <button type="button" class="more"><span class="hide">서비스 이용약관 동의</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required4">
                                    <label for="required4">통신사 이용약관 동의</label>
                                    <button type="button" class="more"><span class="hide">통신사 이용약관 동의</span></button>
                                </div>
                            </div>
                        </div>
                    </div>        
                    <div class="field">
                        <label for="text" class="label">사업자등록번호</label>
                        <div class="text">
                            <input type="tel" class="num-call" id="text" value="" placeholder="-없이 입력" readonly aria-haspopup="true">
                        </div>
                    </div>                                
                    
                    <div class="field">
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="phones" id="sk" checked>
                                <label class="fs-13" for="sk"><span class="fs-15 mb-4">SKT</span>(알뜰폰포함)</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="phones" id="kt">
                                <label class="fs-13" for="kt"><span class="fs-15 mb-4">KT</span>(알뜰폰포함)</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="phones" id="lgu">
                                <label class="fs-13" for="lgu"><span class="fs-15 mb-4">LGU+</span>(알뜰폰포함)</label>
                            </div>
                        </div>
                        <div class="text">
                            <div class="mix">
                                <div class="select flex-5">
                                    <button type="button" class="left-side" aria-haspopup="true" title="휴대폰 앞자리 선택" >010</button>
                                </div>
                
                                <div class="text flex-7" data-clear="false">
                                    <input type="tel" data-id="phone123" class="mid-side num-call" placeholder="-없이 입력" title="휴대폰번호 입력" aria-haspopup="true"  readonly>
                                </div>
                                <div class="space -lined right-side">
                                    <!-- <button type="button" class="button -xs -fit" title="인증번호 요청" title="인증번호 요청">요청</button> -->
                                </div>
                            </div>
                            <!-- 231204 삭제 <p class="info">본인명의 휴대폰이 아닐 경우(예 : 법인폰 등) 
                                <span class="tooltip">
                                    <button type="button" class="trigger">
                                        <span class="hide">툴팁</span>
                                    </button>
                                    <span class="panel">
                                        <span class="t-content">
                                            전자금융사기예방 서비스에 가입된 전화번호로 ARS인증을 받으시면 e금융 가입자 가입을 하실 수 있습니다.
                                        </span>
                                    </span>
                                </span>
                            </p>   
                            <button type="button" class="goto-button">e금융 가입자 회원가입</button>                                  -->
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary -disabled">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
