<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>
<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">비과세종합저축 가입 대상 확인</h1>  <!-- ux 라이팅 수정 -->

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">

                    <!-- ux 라이팅 수정 시작 -->
                    <div class="h2-group">
                        <h2 class="h2">비과세종합저축 가입 대상<br> 확인을 위해 동의해 주세요</h2>
                    </div>

                    <div class="field">
                        <p class="label">대상자 유형</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">선택</button>
                        </div>
                    </div>
                    <!-- //ux 라이팅 수정 끝 -->

                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="required-total">
                                <label for="required-total">[필수] 전체 동의</label>
                            </div>
                            <button type="button" class="more"><span class="hide">필수 전체 동의 약관</span></button>
                        </div>
                        <div class="panel">
                            <div class="checkboxes -full">
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required1">
                                    <label for="required1">공공마이데이터개인(신용)정보 수집·이용·제공 동의서(비과세종합저축)</label>
                                    <button type="button" class="more"><span class="hide">약관</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required2">
                                    <label for="required2">개인(신용)정보 수집·이용 동의서 (비과세종합저축 가입용)</label>
                                    <button type="button" class="more"><span class="hide">약관</span></button>
                                </div>
                            </div>
                        </div>
                    </div>   

                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');

        // 팝업 닫기(마지막 인자 기본값: false)
        // Popup.close('popup', function() {
        //     '콜백함수'
        // });

        // 팝업 닫기 + DOM 삭제
        // Popup.close('popup', function() {
        //     '콜백함수'
        // }, true);
    </script>
</body>
</html>
