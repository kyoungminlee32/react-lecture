<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">예적금 상품 찾기</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    
                    <div class="h2-group">                        
                        <h2 class="h2">
                            나에게 최적화된<br>
                            예적금을 찾아보세요
                        </h2>
                    </div>

                    <div class="field">
                        <p class="label">상품을 선택해 주세요</p>
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period--color1" id="period-point-color1-1" checked>
                                <label for="period-point-color1-1">적금</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period--color1" id="period-point-color1-2">
                                <label for="period-point-color1-2">예금</label>
                            </div>
                        </div>
                    </div>

                    <!-- [CASE]적금 선택 시 -->
                    <div class="field">
                        <p class="label">가입기간을 선택해 주세요</p>
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period01" id="box-radio11-12" checked>
                                <label for="box-radio11-12">12개월</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period01" id="box-radio11-22">
                                <label for="box-radio11-22">24개월</label>
                            </div>
                        </div>
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period01" id="box-radio11-32">
                                <label for="box-radio11-32">36개월</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period01" id="box-radio11-42">
                                <label for="box-radio11-42">직접 선택</label>
                            </div>
                        </div>
                    </div>  
                    <!-- //[CASE]적금 선택 시 -->

                    <!-- [CASE]예금 선택 시 -->
                    <div class="field">
                        <p class="label">가입기간을 선택해 주세요</p>
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period04" id="box-radio14-12" checked>
                                <label for="box-radio14-12">3개월</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period04" id="box-radio14-22">
                                <label for="box-radio14-22">6개월</label>
                            </div>
                        </div>
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period04" id="box-radio14-32">
                                <label for="box-radio14-32">12개월</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period04" id="box-radio14-42">
                                <label for="box-radio14-42">직접 선택</label>
                            </div>
                        </div>
                    </div> 
                    <!-- //[CASE]예금 선택 시 -->

                    <!-- [CASE]적금 선택 시 -->
                    <div class="field">
                        <label for="text" class="label">월 납입 금액을 입력해 주세요</label>
                        <div class="mix">
                            <div class="text -won">
                                <input type="tel" id="text" class="right num-call" value="1,000,000" aria-haspopup="true" readonly placeholder="금액을 입력해 주세요">
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="info red">입력 오류 알림 내용 출력</p>
                                <p class="info right point">일백만원</p>
                            </div>
                        </div>
                    </div>
                    <!-- //[CASE]적금 선택 시 --> 

                    <!-- [CASE]예금 선택 시 -->
                    <div class="field">
                        <label for="text45" class="label">가입 금액을 입력해 주세요</label>
                        <div class="mix">
                            <div class="text -won">
                                <input type="tel" id="text45" class="right num-call" value="" aria-haspopup="true" readonly placeholder="금액을 입력해 주세요">
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="info red">입력 오류 알림 내용 출력</p>
                                <p class="info right point">일백만원</p>
                            </div>
                        </div>
                    </div>
                    <!-- //[CASE]예금 선택 시 --> 

                    <div class="case-wrap -sm">
                        <!-- [240424]삭제 -->
                        <!-- <div class="field">
                            <p class="label">만족한 우대조건을 확인해 주세요</p>
                            <div class="condition-wrap -box">
                                <div class="condition-item">급여이체</div>
                                <div class="condition-item">카드 사용</div>
                            </div>
                        </div> -->
                        <!-- //[240424]삭제 -->

                        <!-- [240424]추가 -->
                        <div class="field">
                            <p class="label">만족한 우대조건을 확인해 주세요</p>
                            <div class="preferred-wrap box">
                                <span class="prf-item">전월 기준 급여이체 중</span>
                                <span class="prf-item">가트 월 20만원 이상 사용</span>
                                <span class="prf-item">마케팅동의</span>
                                <span class="prf-item">손하나로 인증 서비스 등록</span>
                            </div>
                        </div>
                        <!-- //[240424]추가 -->
    
                        <div class="field">
                            <p class="label">가입 가능한 우대조건을 선택해 주세요</p>
                            <div class="condition-wrap">
                                <div class="condition-item -selec">
                                    <div class="check">
                                        <input type="checkbox" id="checkbox-sub01" checked>
                                        <label for="checkbox-sub01">주택청약종합저축 가입</label>
                                    </div>
                                </div>
                                <div class="condition-item -selec">
                                    <div class="check">
                                        <input type="checkbox" id="checkbox-sub02">
                                        <label for="checkbox-sub02">적립식펀드 상품 가입</label>
                                    </div>
                                </div>
                                <div class="condition-item -selec">
                                    <div class="check">
                                        <input type="checkbox" id="checkbox-sub03">
                                        <label for="checkbox-sub03">마케팅 수신 동의</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>                 

                </div>

                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <p class="p">거래실적 유지 및 우대조건 신규 가입에 따른 예상금리로 실제 제공금리와는 차이가 날 수 있으니, 우대조건을 확인해 주시기 바랍니다</p>  <!-- [240130]클래스 fs-14 삭제 -->
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary" disabled>상품 찾기</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
