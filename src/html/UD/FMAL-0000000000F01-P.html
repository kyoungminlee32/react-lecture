<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NH포인트 사용 신청 레이어팝업</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">
</head>
<body>
    <!-- ui수정 240122 가용포인트 box 변경 바텀시트 -> 팝업 -->
    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">NH포인트 사용 신청</h1>
                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>
            <div class="contents">
                <div class="content">
                    <div class="field">
                        <div class="data-box">
                            <div class="data-box-title">가용포인트</div>
                            <div class="data-box-content">8,400,000P</div>
                        </div>
                        <!-- [240125] 포인트 신청 입력필드 변경 -->
                        <div class="case-wrap -xxs">
                            <div class="mix">
                                <div class="text -poin">
                                    <input type="tel" id="text" class="right num-call" value="90" placeholder="가용 포인트 이내로 신청 포인트 입력" aria-haspopup="true" readonly>
                                    <div class="poin">p</div>
                                </div>
                            </div>
                        </div>
                        <!-- // [240125] 포인트 신청 입력필드 변경 -->
                    </div>
                </div>
                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <ul class="ul -bullet fs-14">
                                <li>NH포인트는 1P 단위로 신청할 수 있습니다.</li>
                                <!-- ux 라이팅 수정 시작 -->
                                <li>사용 신청하면 바로 출금계좌로 입금됩니다. 입금 후 포인트 사용 취소를 할 수 없습니다.</li>
                                <li>NH포인트 사용 가능시간 : 04:01 ~ 23:45</li>
                                <!-- //ux 라이팅 수정 끝 -->
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">NH포인트 사용 신청하기</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');

        // 팝업 닫기(마지막 인자 기본값: false)
        // Popup.close('popup', function() {
        //     '콜백함수'
        // });

        // 팝업 닫기 + DOM 삭제
        // Popup.close('popup', function() {
        //     '콜백함수'
        // }, true);
    </script>
</body>
</html>
