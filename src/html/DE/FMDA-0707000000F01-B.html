<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div id="layer" class="layer">
        <div class="container">
            <div class="header">
                <div class="inner"> 
                    <h1 class="title">가입 중인 상품이 있어요</h1> <!-- ux 라이팅 수정 -->

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                
                <div class="content">
                    <div class="box-list">
                        <ul>
                            <li>
                                <!-- [240112] 접근성 관련 a태그로 태그 변경 필요 -->
                                <a href="javascript:void(0)" class="box -active" role="radio">
                                    <div class="area">
                                        <h3 class="title">무배당 보너스 주는 e저축보험</h3>
                                    </div>
                                    <button type="button" class="del-btn"><span class="hide">삭제</span></button>
                                </a>
                            </li>
                            <li>
                                <a href="javascript:void(0)" class="box" role="radio">
                                    <div class="area">
                                        <h3 class="title">무배당 보너스 주는 e저축보험</h3>
                                    </div>
                                    <button type="button" class="del-btn"><span class="hide">삭제</span></button>
                                </a>
                            </li>
                            <li>
                                <a href="javascript:void(0)" class="box" role="radio">
                                    <div class="area">
                                        <h3 class="title">무배당 보너스 주는 e저축보험</h3>
                                    </div>
                                    <button type="button" class="del-btn"><span class="hide">삭제</span></button>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>

                <!-- [231206]버튼 변경 -->
                <div class="fixer">
                    <div class="buttons -half">
                        <!-- ux 라이팅 수정 시작 -->
                        <button type="button" class="button -lg">삭제하기</button>
                        <button type="button" class="button -lg -primary">이어하기</button>
                        <!-- //ux 라이팅 수정 끝 -->
                    </div>
                </div>
                <!-- //[231206]버튼 변경 -->
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Layer.open('layer');
    </script>
    <script>
        // 이어하기 box list active 동작
        $('.box-list .box').click(
            function(){
                $('.box-list .box').removeClass('-active');
                $(this).addClass('-active');
            }
        )
    </script>
</body>
</html>
