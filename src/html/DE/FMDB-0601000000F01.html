<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">예금 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content"> 
                    <!-- ux 라이팅 수정 시작 -->                   
                    <div class="h2-group">                        
                        <h2 class="h2">
                            가입 전에 확인해 주세요
                        </h2>
                        <p class="p">「금융소비자보호 모법규준」에 따라 금융취약 투자자(만 65세 이상, 은퇴자, 주부, 우선 설명 요청 고객)는 “확인할 사항 및 불이익 사항”을 다른 정보보다 먼저 확인할 수 있습니다.</p>
                    </div>
                    <div class="case-wrap -sm">
                        <div class="field">
                            <dl class="invest-qna">
                                <dt class="question-text">
                                    <span>
                                        금융취약 투자자 해당 여부를 NH농협은행에 제공하는 것에 동의하시겠어요?
                                    </span>
                                </dt>
                                <dd class="answer-list">
                                    <div class="box-radios">
                                        <div class="box-radio -left">
                                            <input type="radio" name="radio1" id="radio1-1" checked>
                                            <label for="radio1-1">예</label>
                                        </div>
                                        <div class="box-radio -left">
                                            <input type="radio" name="radio1" id="radio1-2">
                                            <label for="radio1-2">아니요</label>
                                        </div>
                                    </div> 
                                    <div class="invest-notice">
                                        <div class="message">
                                            금융소비자의 불이익 사항은 상품설명서에서 확인해 주세요.
                                        </div>
                                    </div>
                                </dd>    
                            </dl>
                        </div>

                        <!-- [CASE]1번째 질문 예 버튼 선택 시 -->
                        <div class="field">
                            <dl class="invest-qna">
                                <dt class="question-text">
                                    <span>
                                        해당하는 항목이 있으신가요?<br>
                                    </span>
                                    <p class="fs-15 mt-12 normal">① 만 65세 이상 ② 은퇴자 ③ 주부 ④ 우선 설명을 받기 원함</p>
                                </dt>
                                <dd class="answer-list">
                                    <div class="box-radios">
                                        <div class="box-radio -left">
                                            <input type="radio" name="radio2" id="radio2-1" checked>
                                            <label for="radio2-1">예</label>
                                        </div>
                                        <div class="box-radio -left">
                                            <input type="radio" name="radio2" id="radio2-2">
                                            <label for="radio2-2">아니요</label>
                                        </div>
                                    </div> 
                                    <div class="invest-notice">
                                        <div class="message">
                                            금융소비자의 불이익 사항은 상품설명서에서 확인해 주세요.  <!-- [240122]문구 변경 -->
                                        </div>
                                    </div>
                                </dd>    
                            </dl>
                        </div>
                        <!-- //[CASE]1번째 질문 예 버튼 선택 시 -->
                    </div> 
                    <!-- //ux 라이팅 수정 끝 -->       
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <!-- <button type="button" class="button -lg">취소</button> -->
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
