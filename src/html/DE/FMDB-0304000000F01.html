<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">적금 가입</h1> <!-- [231205]텍스트 수정 -->

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>                         
                    
                    <div class="h2-group">                        
                        <h2 class="h2">
                            가입금액을 입력해 주세요
                        </h2>
                    </div>
                    <div class="field">     
                        <div class="mix">
                            <div class="text -won">
                                <input type="tel" id="text1213" class="right num-call" placeholder="5만원 ~ 500만원" aria-haspopup="true" onclick="numKey.keyOpen(this,'amount')" readonly> 
                                <div class="won">원</div>      
                            </div>                           
                            <div class="info-wrap">
                                <p class="message">유효성메시지 출력 영역</p>    <!-- [CASE]오류인경우 클래스 -error 추가 -->
                                <p class="info right point"><span>오십만</span>원</p> 
                            </div>
                        </div>                    
                    </div> 
                    
                    <div class="case-wrap">
                        <div class="field">
                            <!-- [231207]항목 삭제 및 추가 -->
                            <!-- <p class="label">출금계좌</p> -->
                            <div class="h2-group">                        
                                <h2 class="h2">
                                    출금계좌를 선택해 주세요
                                </h2>
                            </div>
                            <!-- //[231207]항목 삭제 및 추가 -->
                            <div class="select">
                                <button type="button" class="-fixed" aria-haspopup="true">
                                    <div class="selection">
                                        <div data-bankcode="011" class="info">
                                            <span class="name">
                                                <span>주거래우대통장</span>
                                            </span>
                                            <span class="account-number">
                                                <span>NH농협</span>
                                                <span>111-1234-5678-99</span>
                                            </span>
                                        </div>
                                        <div class="amount">
                                            <div class="key">출금가능금액</div>
                                            <div class="value">
                                                <span>150,000,000</span>원
                                            </div>
                                        </div>
                                    </div>
                                </button>
                            </div>
                            <div class="checkbox -sm">
                                <input type="checkbox" id="checkbox-sm-checked01" checked="">
                                <label for="checkbox-sm-checked01">출금계좌와 동일하게 비밀번호 설정</label>
                            </div>
                        </div>     
                        
                        <!-- [240118]추가 -->
                        <!-- [CASE]출금계좌 다른은행계좌(오픈뱅킹) 선택한 경우 -->
                        <div class="field">
                            <div class="h2-group">                        
                                <h2 class="h2">
                                    출금계좌를 선택해 주세요
                                </h2>
                            </div>
                            <div class="select">
                                <button type="button" class="-fixed" aria-haspopup="true">
                                    <div class="selection">
                                        <div data-bankcode="081" class="info">
                                            <span class="name">
                                                <span>통장(상품)명 또는 별칭</span>
                                            </span>
                                            <span class="account-number">
                                                <span>하나은행</span>
                                                <span>111-1234-5678-99</span>
                                            </span>
                                        </div>
                                        <div class="amount">
                                            <div class="key">출금가능금액</div>
                                            <div class="value">
                                                <span>150,000,000</span>원
                                            </div>
                                        </div>
                                    </div>
                                </button>
                            </div>
                        </div>  
                        <!-- [CASE]출금계좌 다른은행계좌(오픈뱅킹) 선택한 경우 --> 
                        <!-- [240118]추가 -->

                        <!-- [CASE]출금계좌에 대표계좌 설정되지 않았을 경우 -->
                        <div class="field">
                            <!-- [231207]항목 삭제 및 추가 -->
                            <!-- <p class="label">출금계좌</p> -->
                            <div class="h2-group">                        
                                <h2 class="h2">
                                    출금계좌를 선택해 주세요
                                </h2>
                            </div>
                            <!-- //[231207]항목 삭제 및 추가 -->
                            <div class="select">
                                <button type="button">출금계좌 선택</button> <!-- ux 라이팅 수정 -->
                            </div>
                            <div class="checkbox -sm">
                                <input type="checkbox" id="checkbox-sm-checked02" checked="">
                                <label for="checkbox-sm-checked02">출금계좌와 동일하게 비밀번호 설정</label>
                            </div>
                        </div>
                        <!-- //[CASE]출금계좌에 대표계좌 설정되지 않았을 경우 -->

                        <!-- [CASE]출금계좌 NH농협계좌 선택한 경우 -->
                        <div class="field">
                            <p class="label">만기 시 입금 받을 계좌</p> <!-- ux 라이팅 수정 -->
                            <!-- [240116]추가 및 삭제-->
                            <div class="select">
                                <button type="button" aria-haspopup="true">
                                    <div class="selection">
                                        <div data-bankcode="011" class="info">
                                            <span class="name">
                                                <span>통장(상품)명</span>
                                            </span>
                                            <span class="account-number">
                                                <span>NH농협은행</span>
                                                <span>111-1234-5678-99</span>
                                            </span>
                                        </div>
                                    </div>
                                </button>
                            </div>
                            <!-- <div class="select">
                                <button type="button">123-45678901-23(통장(상품)명)</button>
                            </div> -->
                            <!-- //[240116]추가 및 삭제-->
                        </div>
                        <!-- //[CASE]출금계좌 NH농협계좌 선택한 경우 -->

                        <!-- [CASE]출금계좌 NH농협계좌 선택한 경우 -->
                        <div class="field">
                            <label for="text1" class="label">신규계좌 비밀번호</label>
                            <div class="text">
                                <input type="password" class="num-call" id="text1" placeholder="4자리 숫자 입력" aria-haspopup="true" readonly>
                            </div>
                        </div>
                        <!-- //[CASE]출금계좌 NH농협계좌 선택한 경우 -->
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 숫자 키패드 레이어 -->
    <div class="custom-key-layer" aria-hidden="true">
        <div class="amount-btn-wrap">
            <button type="button" value="100000" class="button numBtn -sm -fit">+1만원</button>
            <button type="button" value="500000" class="button numBtn -sm -fit">+5만원</button>
            <button type="button" value="1000000" class="button numBtn -sm -fit">+10만원</button>
            <button type="button" value="10000000" class="button numBtn -sm -fit">+100만원</button>
        </div>
        <div class="custom-key-wrap">
            <button type="button" class="numBtn" value="1" title="숫자 1 입력">1</button>
            <button type="button" class="numBtn" value="2" title="숫자 2 입력">2</button>
            <button type="button" class="numBtn" value="3" title="숫자 3 입력">3</button>
            <button type="button" class="numBtn" value="4" title="숫자 4 입력">4</button>
            <button type="button" class="numBtn" value="5" title="숫자 5 입력">5</button>
            <button type="button" class="numBtn" value="6" title="숫자 6 입력">6</button>
            <button type="button" class="numBtn" value="7" title="숫자 7 입력">7</button>
            <button type="button" class="numBtn" value="8" title="숫자 8 입력">8</button>
            <button type="button" class="numBtn" value="9" title="숫자 9 입력">9</button>
            <button type="button" class="numBtn btn-temp" disabled="" aria-hidden="true">NH</button>
            <button type="button" class="numBtn btn-amount" value="00" title="숫자 00입력">00</button>
            <button type="button" class="numBtn" value="0" title="숫자 0 입력">0</button>
            <button type="button" class="numBtn btn-del" title="마지막 숫자 삭제">←</button>
        </div>
        <div class="buttons">
            <button type="button" class="button -lg -primary" onclick="numKey.keyClose()">확인</button>
        </div>
    </div>
    <!-- //숫자 키패드 레이어 -->

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
