<!DOCTYPE html>

                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-2" aria-selected="false">

                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-3" aria-selected="false">

                            <div class="box-radio">
                                <input type="radio" name="period-point-color01" id="period-point-color1-02" aria-selected="true">

                            </div>
                        </div>
                    </div>

                            <!-- [231205]삭제 -->
                        </div>
                        <div class="text">
                            <input type="text" id="text" value="010-1234-****" readonly>

                    </div>
