<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청 전 준비물 및 유의사항 안내</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">신청 전 확인사항</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">진행 절차를 확인해 주세요</h2>
                    </div>
                    <ol class="ol -badge">
                        <li>
                            <span class="gadget">1단계</span>
                            <div class="title">가입자격확인서 발급</div>
                            <!-- 2024-05-27 오타수정 -->
                            나라사랑포털 앱에서 가입자격 확인서를 발급한 후 제출은행을 농협은행으로 선택해 주세요.
                        </li>
                        <li>
                            <span class="gadget">2단계</span>
                            <div class="title">상품가입 정보 입력</div>
                            적금 가입 금액, 자동이체 설정 등 상품 가입정보를  입력해 주세요.<br>(매월 입금한도는 20만원 이내 입니다.)
                        </li>
                        <li>
                            <span class="gadget">3단계</span>
                            <div class="title">적금가입 완료</div>
                            모바일 인증과 상품 가입정보 입력을 끝내면 NH장병내일준비적금의 가입이 완료됩니다. 
                        </li>
                    </ol>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">가입자격 확인서 발급 바로가기</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
