<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">청약 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="h2-group">    
                        <!-- [240206]텍스트 변경-->                    
                        <h2 class="h2">
                            주택공급 정책 활용을 위해 선택해 주세요
                        </h2>
                        <p class="p">본 조사표는 [주택공급에 관한 규칙] 제6조에 의거 주택공급 정책 자료로만 활용됩니다. 실제 주택공급 신청과는 관계가 없습니다.</p>
                        <!-- //[240206]텍스트 변경-->
                    </div>
                    
                    <div class="case-wrap -sm">
                        <div class="field">
                            <p class="label">희망 지역</p>
                            <div class="select">
                                <button type="button" aria-haspopup="true">경기도 고양시 일산서구</button>
                            </div>
                        </div>

                        <div class="field">
                            <p class="label">주택 종류</p>
                            <div class="select">
                                <button type="button" aria-haspopup="true">아파트</button>
                            </div>
                        </div>

                        <div class="field">
                            <p class="label">주택 면적</p>
                            <div class="select">
                                <button type="button" aria-haspopup="true">85㎡초과 102㎡이하</button>
                            </div>
                        </div>

                        <div class="field">
                            <p class="label">희망 입주 시기</p>
                            <div class="select">
                                <button type="button" aria-haspopup="true">2024년 5월</button>
                            </div>
                        </div>
                    </div>
                    
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>


    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>

        // 스크립트 작성
    </script>
