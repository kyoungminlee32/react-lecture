<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">적금 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:2; --max:3;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">
                        <h2 class="h2">  <!-- [240126]텍스트 수정 -->   <!-- [240328]텍스트 변경 -->
                            정보를 확인해 주세요.   
                        </h2>
                    </div>

                    <div class="case-wrap -sm"> 
                        <div class="field">
                            <label for="text01" class="label">휴대폰번호</label>
                            <div class="text">
                                <input type="text" id="text01" value="010-1234-4848" readonly="">
                            </div>
                        </div>

                        <div class="field">
                            <label for="text02" class="label">집 주소</label>
                            <div class="text">
                                <input type="text" id="text02" value="(04517) 서울시 중구 동일로 120" readonly="">
                            </div>
                            <div class="text">
                                <input type="text" id="text03" title="상세 주소" value="NH농협은행 12층" readonly="">
                            </div>
                            <div class="right mt-12">
                                <a href="javascript:void(0)" class="a -arrow">내 정보 수정</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <ul class="ul -bullet">
                                <li>화면에 보이는 고객정보(이름, 휴대폰번호, 집 주소)로 신청을 진행합니다.</li>   
                                <li>고객정보가 누락되었거나 잘못 입력된 상태에서 신청을 진행할 경우 고객님께 불이익이 발생할 수 있습니다.</li>    <!-- [240409]텍스트 수정 -->  
                                <li>고객정보 수정을 원하실 경우 화면 하단에 [내 정보 수정]을 선택하여 정보를 변경해 주세요.</li>           
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">확인</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
