<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">입출금 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:9;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>                      
                    <div class="h2-group">                        
                        <h2 class="h2">
                            사업자 정보를 확인해 주세요
                        </h2>
                    </div>

                    <dl class="dl -box">
                        <div>
                            <dt>업체명</dt>
                            <dd>&업체명&</dd>
                        </div>
                        <div>
                            <dt>사업자등록번호</dt>
                            <dd>123-45-678910</dd>
                        </div>
                        <div>
                            <dt>업태/종목</dt>
                            <dd>부동산업/주택임대</dd>
                        </div>
                        <div>
                            <dt>대표자 성명</dt>
                            <dd>김농협</dd>
                        </div>
                        <div>
                            <dt>대표자 주민등록번호</dt>
                            <dd>900101-*******</dd>
                        </div>
                        <div>
                            <dt>개업일</dt>
                            <dd>20200101</dd>
                        </div>
                    </dl>

                    <div class="field">
                        <label for="search01" class="label">주소</label>
                        <div class="mix">
                            <div class="text">
                                <input type="text" class="left-side fake-readonly" id="search01" value="04517 서울시 중구 통일로 120" readonly>
                            </div>
                            <div class="space -lined search">
                                <button type="button" class="icon-button -search"><span class="hide">조회</span></button>
                            </div>
                        </div>
                        <div class="text">
                            <input type="text" id="search01" title="집 상세 주소" value="NH농협은행" >
                        </div>
                    </div>

                    <div class="field">
                        <label for="text441" class="label">전화번호</label>
                        <div class="mix">
                            <div class="select flex-3">
                                <button type="button" class="left-side" title="전화번호 앞3자리" aria-haspopup="true">선택</button>
                            </div>
                            <div class="text flex-7" data-clear="false">
                                <input type="tel" id="text441" class="right-side num-call" placeholder="-없이 입력" title="전화번호 뒤8자리" aria-haspopup="true" readonly>
                            </div>
                        </div>
                    </div> 
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg" disabled>다음</button>   <!-- [240329] disabled 추가 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
