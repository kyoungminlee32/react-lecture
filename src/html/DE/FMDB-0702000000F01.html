<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">

</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">우대금리 신청</h1>  <!-- ux 라이팅 수정 -->

                    <div class="funcs">
                        <button type="button" class="func -home"><span class="hide">홈</span></button>
                        <button type="button" class="func -menu"><span class="hide">전체메뉴</span></button>
                    </div>
                </div>
            </header>

            <!-- ux 라이팅 수정 시작 -->
            <main class="contents">
                <div class="content"> 
                    <div class="h2-group">
                        <h2 class="h2">
                            우대 항목을 선택해 주세요
                        </h2>
                    </div>                    
                    <div class="account">
                        <button type="button" data-bankcode="011" class="info">
                            <span class="name">
                                <span>주거래우대통장</span>
                            </span>
                            <span class="account-number">
                                <span>NH농협은행</span>
                                <span>111-1234-5678-99</span>
                            </span>
                        </button>
                    </div>

                    <div class="selection case-wrap -sm"> <!-- [240112]추가 -->
                        <ul> <!-- [240112]추가 -->
                            <li>
                                <div class="box-radios -card type02">
                                    <div class="box-radio -left -bigsize">
                                        <input type="checkbox" name="period-point-color1" id="period-point-color22-1" checked> <!-- [240109]type 변경-->
                                        <label for="period-point-color22-1">
                                            <dl class="dl">
                                                <div>
                                                    <dt>우대 항목</dt>
                                                    <dd>NH1934월복리적급 농업계고 및 청년농부사관학교 졸업자가 졸업증명서 및 수료증 제출 시<br>(최초 1회만)</dd>
                                                </div>
                                                <div>
                                                    <dt>우대 금리</dt>
                                                    <dd>2.0%p</dd>
                                                </div>
                                                <div>
                                                    <dt>금리 신청</dt>
                                                    <dd>신청 가능</dd>
                                                </div>
                                            </dl>                        
                                        </label>
                                    </div>
                                </div>
                            </li>
                            <li>
                                <div class="box-radios -card type02">
                                    <div class="box-radio -left -bigsize">
                                        <input type="checkbox" name="period-point-color1" id="period-point-color22-2"> <!-- [240109]type 변경-->
                                        <label for="period-point-color22-2">
                                            <dl class="dl">
                                                <div>
                                                    <dt>우대 항목</dt>
                                                    <dd>NH1934월복리적급 농업계고 및 청년농부사관학교 졸업자가 졸업증명서 및 수료증 제출 시<br>(최초 1회만)</dd>
                                                </div>
                                                <div>
                                                    <dt>우대 금리</dt>
                                                    <dd>2.0%p</dd>
                                                </div>
                                                <div>
                                                    <dt>금리 신청</dt>
                                                    <dd>신청 가능</dd>
                                                </div>
                                            </dl>                        
                                        </label>
                                    </div>
                                </div>
                            </li>
                        </ul>
                    </div>
                        
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary -disabled">다음</button>
                    </div>
                </div>
            </main>
            <!-- //ux 라이팅 수정 끝 -->
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>

        // 스크립트 작성
