<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">적금 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>                      
                    <div class="h2-group">                        
                        <h2 class="h2">  <!-- [240119]텍스트 수정 -->
                            스윙입금을 신청하시겠어요?
                        </h2>
                    </div>
                    <div class="field">
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-1" checked="">
                                <label for="period-point-color1-1">신청함</label>  <!-- [240119]텍스트 수정 -->
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-2">
                                <label for="period-point-color1-2">신청 안함</label>
                            </div>
                        </div>
                        <p class="info">스윙입금 서비스 안내
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <span class="panel">
                                    <span class="title">스윙입금 서비스 안내</span>
                                    <span class="t-content">
                                        <span class="dot">NH1418우대통장가입자만 해당 스윙입금 서비스 이용이 가능합니다.</span>
                                        <span class="dot">스윙입금 서비스 출금시점에 통장 잔액이 1만원 미만이거나, 적금 입금액이 100원 미만인 경우 스윙입금 서비스가 제공되지 않습니다.</span>
                                    </span>
                                </span>
                            </span>
                        </p>
                    </div>
                    <div class="case-wrap">
                        <!-- [240119]삭제, 추가 -->
                        <div class="field">
                            <p class="label">스윙입금 금액</p>
                            <div class="select">
                                <button type="button" aria-haspopup="true">3천원 이하</button>
                            </div>
                            <!-- <div class="h2-group">                        
                                <h2 class="h2">
                                    스윙입금 정보를 확인해 주세요
                                </h2>
                            </div>
                            <div class="field">
                                <div class="select">
                                    <button type="button" aria-haspopup="true">입금일 선택</button>
                                </div>
                                <div class="select">
                                    <button type="button" aria-haspopup="true">입금금액 선택</button>
                                </div>
                            </div> -->
                        </div>
                        <div class="field">
                            <p class="label">스윙입금일</p>
                            <div class="select">
                                <button type="button" aria-haspopup="true">입금일 선택</button>
                            </div>
                        </div>
                        <!-- //[240119]삭제, 추가 -->
                    </div>
                    
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
