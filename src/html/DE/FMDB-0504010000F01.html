<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">예금 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">                        
                        <h2 class="h2">
                            또 하나의 고향을 선택해 주세요
                        </h2>
                    </div>
                    
                    <div class="case-wrap -sm">
                        <div class="field">
                            <div class="select">
                                <button type="button" aria-haspopup="true">지역을 선택해 주세요</button>
                            </div>
                            <div class="text">
                                <p class="info">또 하나의 고향(통장명 지역)
                                    <span class="tooltip">
                                        <button type="button" class="trigger">
                                            <span class="hide">툴팁</span>
                                        </button>
                                        <span class="panel">
                                            <span class="title">또 하나의 고향</span>
                                            <span class="t-content">
                                                <span class="dot">선택한 지역은 통장명으로 사용됩니다. (통장명 : NH고향사랑기부예금(선택지역명))</span>
                                                <span class="dot">공익기금은 해당 지자체 소속 17개 시, 도, 광역시로 적립되며, 지역간 균형있는 발전을 위해 통합하여 지원합니다.</span>
                                                <span class="dot">상품약관 참조</span>
                                            </span>
                                        </span>
                                    </span>
                                </p>   
                            </div>
                        </div>
                    </div>
                    
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>


    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
