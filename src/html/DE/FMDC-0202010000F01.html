<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">적금 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>                      
                    <div class="h2-group">                        
                        <h2 class="h2">  <!-- [240119]텍스트 수정 -->
                            자동이체를 신청하시겠어요?
                        </h2>
                    </div>
                    <div class="field">
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-1" checked="">
                                <label for="period-point-color1-1">신청함</label>  <!-- [240119]텍스트 수정 -->
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-2">
                                <label for="period-point-color1-2">신청 안함</label>
                            </div>
                        </div>
                        <p class="info">자동이체 신청 안내
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <!-- ux 라이팅 수정 시작 -->
                                <!-- [CASE]NH직장인월복리적금 상품 이외일 경우 -->
                                <span class="panel">
                                    <span class="title">자동이체 신청 안내</span>
                                    <span class="t-content">
                                        <span class="dot">자동이체일이 토요일 /공휴일이면 다음 날(영업일 기준)에 출금됩니다.</span>
                                        <span class="dot">자동이체일이 말일이고, 토요일/공휴일인 경우 다음 달 첫 영업일에 처리되어 그 달의 저축한도에 따라 자동이체가 되지 않을 수 있습니다.</span>   <!-- [240603]텍스트 변경 -->
                                        <!-- <span class="dot">매일 자동이체를 선택하면 영업일에만 이체됩니다. 출금계좌의 잔액이 부족해도 이후 다시 출금되지 않습니다.</span> --> <!-- [240111]문구 삭제 -->
                                    </span>
                                </span>
                                <!-- //[CASE]NH직장인월복리적금 상품 이외일 경우 -->

                                <!-- [CASE]NH직장인월복리적금 상품일 경우 -->
                                <!-- <span class="panel">
                                    <span class="title">자동이체 신청 안내</span>
                                    <span class="t-content">
                                        <span class="dot">자동이체일이 토요일 /공휴일이면 다음 날(영업일 기준)에 출금됩니다.</span>
                                        <span class="dot">자동이체일이 말일이고, 토요일/공휴일인 경우 다음 달 첫 영업일에 처리되어 그 달의 저축한도에 따라 자동이체가 되지 않을 수 있습니다.</span> -->   <!-- [240603]텍스트 변경 -->
                                        <!-- <span class="dot">매일 자동이체를 선택하면 영업일에만 이체됩니다. 출금계좌의 잔액이 부족해도 이후 다시 출금되지 않습니다.</span> -->  <!-- [240111]문구 삭제 -->
                                        <!-- <span class="dot">NH직장인월복리적금 저축한도는 1인당 분기별 300만원입니다.</span>                                
                                        <span class="dot">NH직장인월복리적금을 여러 개 가입한 경우 저축한도는 합산하여 적용됩니다. 분기별 저축한도를 초과하면 자동이체가 되지 않을 수 있으니, 분기별 잔여한도를 확인해 주시기 바랍니다.</span>                                
                                    </span>
                                </span> -->
                                <!-- //[CASE]NH직장인월복리적금 상품일 경우 -->
                                <!-- //ux 라이팅 수정 끝 -->
                            </span>
                        </p>
                    </div>
                    <div class="case-wrap">
                        <!-- [240119]영역 삭제, 추가, 이동 -->
                        <div class="field">
                            <label for="text" class="label">자동이체 금액</label>
                            <div class="mix">
                                <div class="text -won" data-clear="false">
                                    <input type="tel" id="text" class="right num-call" aria-haspopup="true" placeholder="1만원 ~" title="가입금액 입력" value="100,000" readonly>
                                    <div class="won">원</div>
                                </div>                            
                            </div>
                            <div>
                                <!-- [CASE] 한글 금액 -->
                                <p class="message point right">일십만원</p>
                                <!-- //[CASE] 한글 금액 -->
    
                                <!-- [CASE] 에러메세지 -->
                                <!-- <p class="message -error">입력 오류 알림 내용 출력</p> -->
                                <!-- //[CASE] 에러메세지 -->
    
                                <!-- [CASE] 유효성메세지 -->
                                <!-- <p class="message">한도안내 or 한도체크값 출력 </p> -->   <!-- [240327]클래스 point 삭제 -->
                                <!-- //[CASE] 유효성메세지 -->
                            </div>
                        </div>

                        <div class="field">    
                            <p class="label">자동이체일</p>
                            <div class="select">
                                <button type="button" aria-haspopup="true">다음달 부터 매월 25일</button>  <!-- [240111]문구 수정 -->
                            </div> 
                            <!-- <div class="mix">
                                <div class="text -won">
                                    <input type="tel" id="text" class="right num-call" value="100,000" title="금액 입력" aria-haspopup="true" readonly>
                                    <div class="won">원</div>
                                </div>
                                <div class="info-wrap">
                                    <p class="info right point">일십만원</p>
                                </div>
                            </div> -->
                        </div>
                        <!-- //[240119]영역 삭제, 추가, 이동 -->
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
