<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청 전 준비물 및 유의사항 안내</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">신청 전 확인사항</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">시작 전 준비해 주세요</h2>
                    </div>
                    <!-- [240319]마크업 변경 -->
                    <!-- [240125]텍스트 수정, 위치 변경 -->
                    <ol class="ol process -icon">
                        <li class="-ico04">
                            <div class="title">부모명의 휴대폰
                            </div>
                        </li>
                        <li class="-ico02">
                            <div class="title">신분증
                                <p class="p">주민등록증/(모바일)운전면허증</p>   <!-- [240510]텍스트 변경 -->
                            </div>
                        </li>
                        <li class="-ico03">
                            <!-- [240125]텍스트 수정 -->
                            <div class="title">간편인증서
                                <p class="p">아이의 법정대리인 자격확인</p> <!-- [240109]텍스트 수정 -->
                            </div>
                            <!-- //[240125]텍스트 수정 -->
                        </li>
                    </ol>
                    <!-- //[240125]텍스트 수정, 위치 변경 -->
                    <!-- //[240319]마크업 변경 -->
                </div>

                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <!-- [240425]마크업 수정 -->
                            <p class="p mb-12">금융거래 한도제한계좌로 가입됩니다.</p>  <!-- [240125]텍스트 수정 -->  <!-- [240130]클래스 fs-14 삭제 -->
                            <div class="table -x">
                                <table>
                                    <caption><span class="hide">출금/이체 한도</span></caption>
                                    <colgroup>
                                        <col style="width:50%">
                                        <col style="width:50%">
                                    </colgroup>
                                    <tbody>
                                        <tr>
                                            <th scope="row" class="left">창구 거래</th> <!-- [231226]class="left" 추가 -->
                                            <td class="right">300만원/일</td>
                                        </tr>
                                        <tr>
                                            <th scope="row" class="left">ATM 출금/이체</th> <!-- [231226]class="left" 추가 -->
                                            <td class="right">100만원/일</td>
                                        </tr>
                                        <tr>
                                            <th scope="row" class="left">전자금융 이체+기타</th> <!-- [231226]class="left" 추가 -->
                                            <td class="right">100만원/일</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <p class="message">기타 : 오픈뱅킹거래, 가상계좌로의 이체거래 등</p>
                            <!-- //[240425]마크업 수정 -->
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <!-- <button type="button" class="button -lg">취소</button> -->
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
