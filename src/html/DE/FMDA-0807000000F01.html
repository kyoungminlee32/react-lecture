<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">입출금 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:7; --max:11;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">
                        <h2 class="h2">
                            &자녀 이름&님의 정보를 입력해 주세요
                        </h2>
                    </div>

                    <div class="prod-list-wrap -active">                        
                        <div class="field">
                            <label for="text01" class="label">휴대폰번호</label>
                            <div class="mix">
                                <div class="select flex-4">
                                    <button type="button" class="left-side" aria-haspopup="true" title="휴대폰 앞자리 선택">010</button>
                                </div>
                                <div class="text flex-8" data-clear="false">
                                    <input type="tel" id="text01" data-id="phone123" class="mid-side num-call" placeholder="-없이 입력" title="휴대폰 번호 뒷자리 입력" aria-haspopup="true" readonly>
                                </div>
                                <div class="space -lined right-side">
                                    <!-- <button type="button" class="button -xs -fit" title="인증번호 요청">요청</button> -->
                                </div>
                            </div>
                        </div>

                        <div class="field">
                            <label for="search" class="label">집 주소</label>
                            <div class="mix">
                                <div class="text">
                                    <input type="text" class="left-side fake-readonly" id="search" value="04517 서울시 중구 통일로 120" title="검색하기" aria-haspopup="true" readonly>  <!-- [240112]속성 변경 -->
                                </div>
                
                                <div class="space -lined search">
                                    <button type="button" class="icon-button -search"><span class="hide">조회</span></button>
                                </div>
                            </div>
                            <div class="text">
                                <input type="text" data-id="search" value="NH농협은행 12층" title="검색 두번째 정보">
                            </div>
                        </div>

                        <div class="case-wrap">
                            <hr class="hr -xxl" aria-hidden="true" tabindex="-1">
                            <div class="field">
                                <p class="label">직업 분류</p>
                                <!-- [240109]삭제 및 추가 -->
                                <div class="text">
                                    <input type="text" id="bbss01" readonly value="대분류-이외">
                                </div>
                                <div class="text">
                                    <input type="text" id="bbss02" readonly value="중분류-학생·미취학아동">
                                </div>
                                <!-- <div class="select">
                                    <button type="button" aria-haspopup="true" readonly>대분류-이외</button>
                                </div>
                                <div class="select">
                                    <button type="button" aria-haspopup="true" readonly>중분류-학생·미취학아동</button>
                                </div> -->
                                <!-- //[240109]삭제 및 추가 -->
                            </div>

                            <div class="field">
                                <p class="label">학생 구분</p>
                                <div class="select">
                                    <button type="button" aria-haspopup="true">선택</button>
                                </div>
                            </div>

                            <div class="field">
                                <p class="label">거래 목적</p>
                                <div class="select">
                                    <button type="button" aria-haspopup="true">예금 및 투자</button>
                                </div>
                            </div>

                            <div class="field">
                                <p class="label">자금 출처</p>
                                <div class="select">
                                    <button type="button" aria-haspopup="true">상속</button>
                                </div>
                            </div>
                            <div class="field">
                                <p class="label">계좌 실소유자</p>
                                <div class="answer-list">
                                    <div class="item">
                                        <div class="box-radios">
                                            <div class="box-radio -left">
                                                <input type="radio" name="radio4-1" id="radio4-1" checked="">
                                                <label for="radio4-1" class="check-ox -orign">네, 맞아요</label>
                                            </div>
                                            <div class="box-radio -left">
                                                <input type="radio" name="radio4-1" id="radio4-2">
                                                <label for="radio4-2" class="check-ox -orign">아니요</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg" disabled>다음</button>   <!-- [240329] disabled 추가 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
