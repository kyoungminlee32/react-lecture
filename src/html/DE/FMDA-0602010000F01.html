<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청 전 준비물 및 유의사항 안내</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">본인인증</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                     <!-- [231206]추가 -->
                     <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:1; --max:9;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>  
                    <!-- //[231206]추가 -->  

                    <div class="h2-group">
                        <h2 class="h2">공직자 자격 조회에 동의해 주세요</h2>
                    </div>

                    <!-- 2024-11-01 추가 -->
                    <div class="field">
                        <label for="rrn" class="label multi-label">주민등록번호</label>
                        <div class="mix -lasthide">
                            <div class="text" data-clear="false">
                                <input type="tel" class="num-call" id="rrn" placeholder="6자리 입력" value="910814" title="주민등록번호 앞자리 6자리 입력" aria-haspopup="true" readonly>
                            </div>
            
                            <div class="dash">-</div>
            
                            <div class="text" data-clear="false">
                                <input type="tel" class="num-call" id="ddd" placeholder="7자리 입력" title="주민등록번호 7자리 입력" aria-haspopup="true" readonly>
                            </div>
                        </div>
                        <div class="info-wrap">
                            <p class="message">주민등록번호를 입력해주세요.</p>
                        </div>
                    </div>
                    <!-- //2024-11-01 추가 -->
                    
                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="total">
                                <label for="total">[필수] 공공마이데이터 사용동의서</label>                              
                            </div>
                            <button type="button" class="more"><span class="hide">[필수] 공공마이데이터 사용동의서</span></button>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <!-- <button type="button" class="button -lg">취소</button> -->
                        <button type="button" class="button -lg -primary" disabled>다음</button>   <!-- [240329] disabled 추가 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
