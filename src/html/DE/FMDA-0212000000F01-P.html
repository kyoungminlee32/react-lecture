<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청 전 준비물 및 유의사항 안내</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">우리아이 계좌개설</h1>

                    <div class="funcs">
                        <button type="button" class="func -home"><span class="hide">홈</span></button>                        
                        <button type="button" class="func -menu"><span class="hide">전체메뉴</span></button>                    
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="product-detail-wrap -mychild">
                        <!-- 상품 안내 영역 -->
                        <div class="procuct-summary">
                            <!-- //.info-area -->
                            <div class="loadArea" data-includ="/content/nhbank/html/dt/dt10001277_de.html"></div>
                        </div><!-- //.procuct-summary -->

                        <div class="product-other">
                            <div class="product-share">
                                <ul>
                                    <li><button type="button" class="share" aria-haspopup="true"><span class="hide">공유</span></button></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons -half">
                        <button type="button" class="button -lg -primary">우리 아이 계좌개설 신청</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
        procuctDatailAct();

        // html 파일 로드 (퍼블확인용)
        incHtml();
        function incHtml() {
            $('[data-includ]').each(function () {
                $this = $(this);
                var $url = $this.attr('data-includ')
                $this.load($url)
            })
        }
    </script>
</body>

</html>
