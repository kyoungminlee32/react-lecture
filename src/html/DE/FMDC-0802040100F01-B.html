<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div id="layer" class="layer">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">해지 시 입금 받을 계좌를 선택해 주세요</h1>

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    
                    <div class="choose-account-Wrap">
                        <div class="field">
                            <div class="text">
                                <div class="choose-account-input">
                                    <input type="text" id="text" readonly placeholder="계좌번호 직접입력">
                                    <button type="button" class="button jsChooseBtn -sm -inline">직접 입력</button> <!-- [240214]텍스트 변경 -->
                                </div>
                                <p class="message">입력 정보 안내 메시지 출력</p>
                            </div>
                        </div>
                        <div class="custom-key-display">
                            <div class="custom-key-wrap">
                                <button type="button" value="1" title="숫자 1 입력">1</button>
                                <button type="button" value="2" title="숫자 2 입력">2</button>
                                <button type="button" value="3" title="숫자 3 입력">3</button>
                                <button type="button" value="4" title="숫자 4 입력">4</button>
                                <button type="button" value="5" title="숫자 5 입력">5</button>
                                <button type="button" value="6" title="숫자 6 입력">6</button>
                                <button type="button" value="7" title="숫자 7 입력">7</button>
                                <button type="button" value="8" title="숫자 8 입력">8</button>
                                <button type="button" value="9" title="숫자 9 입력">9</button>
                                <button type="button" disabled aria-hidden="true">NH</button>
                                <button type="button" value="0" title="숫자 0 입력">0</button>
                                <button type="button" class="btn-del" title="마지막 숫자 삭제">←</button>
                            </div>
                            <div class="buttons">
                                <button type="button" class="button -lg -primary">확인</button>
                            </div>
                            
                        </div><!-- //.custom-key-display -->

                        <div class="selection choose-account-list">
                            <ul>
                                <li>
                                    <button type="button" data-bankcode="011" class="info -fix">
                                        <span>
                                            <span>
                                                <span class="name">
                                                    <span>주거래우대통장</span>
                                                </span>
                                                <span class="account-number">
                                                    <!-- <span>NH농협</span> -->  <!-- [240214]삭제 -->
                                                    <span>111-1234-5678-99</span>
                                                </span>
                                            </span>
                                            <div class="amout-number">
                                                <span class="amout-title">출금가능금액</span>
                                                <span>100,000,000</span>원
                                            </div>
                                        </span>
                                    </button>
                                </li>
                                <li>
                                    <button type="button" data-bankcode="011" class="info -fix">
                                        <span>
                                            <span>
                                                <span class="name">
                                                    <span>주거래우대통장</span>
                                                </span>
                                                <span class="account-number">
                                                    <!-- <span>NH농협</span> -->  <!-- [240214]삭제 -->
                                                    <span>111-1234-5678-99</span>
                                                </span>
                                            </span>
                                            <div class="amout-number">
                                                <span class="amout-title">출금가능금액</span>
                                                <span>100,000,000</span>원
                                            </div>
                                        </span>
                                    </button>
                                </li>
                                <li>
                                    <button type="button" data-bankcode="011" class="info -fix">
                                        <span>
                                            <span>
                                                <span class="name">
                                                    <span>주거래우대통장</span>
                                                </span>
                                                <span class="account-number">
                                                    <!-- <span>NH농협</span> -->   <!-- [240214]삭제 -->
                                                    <span>111-1234-5678-99</span>
                                                </span>
                                            </span>
                                            <div class="amout-number">
                                                <span class="amout-title">출금가능금액</span>
                                                <span>100,000,000</span>원
                                            </div>
                                        </span>
                                    </button>
                                </li>
                            </ul>
                        </div><!-- //.choose-account-list -->
                    </div>
                    <!-- //.choose-account-Wrap -->
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Layer.open('layer');
    </script>
</body>
</html>
