<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/fund.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">펀드 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>                      
                    <div class="h2-group">                        
                        <h2 class="h2">
                            펀드 중요사항을 확인해 주세요                       
                        </h2>
                    </div>
                     <!-- ux 라이팅 수정 -->
                    <h4 class="h5">자발적 가입 의사 확인</h4>
                    <p class="p">본인의 판단 하에 자발적 의사로 가입함을 확인합니다.</p>
                    <h4 class="h5">대출거래 관련 유의사항 확인</h4>
                    <p class="p">「금융소비자 보호에 관한 법률」에 따라 중소기업 및 그 기업의 대표자, 개인인 금융소비자의 경우 다음의 거래가 제한될 수 있습니다.</p> 
                    <ul class="ul -bullet">
                        <li>투자상품 가입 후, 1개월 이내 대출 거래</li>
                        <li>대출 거래 후, 1개월 이내 투자상품 가입</li>
                    </ul> <!-- //ux 라이팅 수정 -->              
                    <div class="field">
                        <div class="checkbox -sm">
                            <input type="checkbox" id="total">
                            <label for="total">본인은 위 내용을 충분히 확인하고 이해
                                하였습니다.</label>
                        </div>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
