    <div class="page">

            <main class="contents">
                <div class="content">
                    <div>
                        <img src="/content/assets/imgs/img/utility/ico-resultconfirm.png" style="width:16.8rem;" alt="">

                    <div class="case-wrap -sm">
                        <h2 class="h1">포트폴리오 리밸런싱을 신청했어요</h2>

                    <div class="case-wrap -sm">

                                <dd>2023.10.26</dd>
                            </div>
                        </dl>
                    </div>
                </div>

                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <ul class="ul -bullet">

                                </li>
                                <li>
                                    거래결과는 [NH로보드림 > 포트폴리오 관리  > 거래이력] 화면에서 확인할 수 있습니다.
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons -half">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
