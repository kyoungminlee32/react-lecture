<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/fund.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">펀드 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 
                        - 숫자만 입력하는 Dimmed 없는 레이어 호출시 onclick="numKey.keyOpen(this)"
                        - 금액 입력하는 Dimmed 없는 레이어 호출시 onclick="numKey.keyOpen(this,'amount')"
                        - 둘다 num-call 클래스는 들어 가야함
                     -->                
                    
                    <div class="h2-group">                        
                        <h2 class="h2">
                            연간 납입한도를 설정해 주세요
                        </h2>
                    </div>
                    <!-- ui수정 240122 (마크업 변경) -->
                    <div class="field">
                        <div class="data-box">
                            <!-- <div class="data-box-title">잔여납입한도</div> --> <!-- [240206] 마크업삭제 -->
                            <div class="data-box-content">8,400,000원</div>
                        </div>
                        <div class="fit-buttons -right">
                            <button type="button" class="button -fit -xs">한도조회</button>                            
                        </div>
                    </div>                    
                    <!-- ui수정 240122 (마크업변경)) --> 
                    <div class="field">  
                        <!-- <label for="text" class="label">연간 납입 한도 설정</label> --> <!-- ui수정 240122 (label 삭제)) --> 
                        <div class="mix">
                            <div class="text -won">
                                <input type="tel" id="text1213" class="right num-call" onclick="numKey.keyOpen(this,'amount')" readonly placeholder=" 한도 설정 금액을 입력" readonly> <!-- ui수정 240122 (placeholder 문구변경)) --> 
                                <div class="won">원</div>                          
                            </div>                           
                            <div class="info-wrap">
                                <p class="info">전 금융기관 통합 연 600만원 이내</p>
                                <!-- <p class="message">잔여한도 이내로 입력해 주세요.</p>  case 잔여한도 이상 입력시 출력-->
                                <!-- <p class="info right point"><span>50</span>만원</p> --> <!-- ui수정 240122 (금액 삭제)) --> 
                            </div>
                        </div>             
                    </div>                     
                </div>

                <!-- 플로팅 버튼 -->
                <div class="floating-wrap">
                    <div class="floating-btn" role="button"> <!-- [240111] role="button" 추가 -->
                        <p>원금손실<br>가능상품</p>  <!-- ux 라이팅 수정 -->
                    </div>
                    <a class="floating_close" title="원금 손실가능 상품 플로팅버튼 닫기"></a>
                </div>
                <!-- //플로팅 버튼 -->   
            </main>
        </div>
    </div>
    
    
    <!-- 숫자 키패드 레이어 -->
    <div class="custom-key-layer" aria-hidden="true">
        <div class="amount-btn-wrap">
            <button type="button" value="100000" class="button numBtn -sm -fit">+10만</button>
            <button type="button" value="500000" class="button numBtn -sm -fit">+50만</button>
            <button type="button" value="1000000" class="button numBtn -sm -fit">+100만</button>
            <button type="button" value="10000000" class="button numBtn -sm -fit">+1,000</button>
        </div>
        <div class="custom-key-wrap">
            <button type="button" class="numBtn" value="1" title="숫자 1 입력">1</button>
            <button type="button" class="numBtn" value="2" title="숫자 2 입력">2</button>
            <button type="button" class="numBtn" value="3" title="숫자 3 입력">3</button>
            <button type="button" class="numBtn" value="4" title="숫자 4 입력">4</button>
            <button type="button" class="numBtn" value="5" title="숫자 5 입력">5</button>
            <button type="button" class="numBtn" value="6" title="숫자 6 입력">6</button>
            <button type="button" class="numBtn" value="7" title="숫자 7 입력">7</button>
            <button type="button" class="numBtn" value="8" title="숫자 8 입력">8</button>
            <button type="button" class="numBtn" value="9" title="숫자 9 입력">9</button>
            <button type="button" class="numBtn btn-temp" disabled  aria-hidden="true">NH</button>
            <button type="button" class="numBtn btn-amount" value="00" title="숫자 00입력" >00</button>
            <button type="button" class="numBtn" value="0" title="숫자 0 입력">0</button>
            <button type="button" class="numBtn btn-del" title="마지막 숫자 삭제">←</button>
        </div>
        <div class="buttons">
            <button type="button" class="button -lg -primary" onclick="numKey.keyClose()">확인</button>
        </div>
    </div>
    <!-- 숫자 키패드 레이어 -->

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        //10만, 50만.... 버튼 클릭시
        const amountBtn = document.querySelectorAll('.amount-btn-wrap button');
        amountBtn.forEach(amountBtn => {
            amountBtn.addEventListener('click',function () {
                let $targetInput;
                const $thisValLayer = amountBtn.closest('.custom-key-layer.-active');  //dim 없는 레이어 숫자 키패드
                const $thisValChoose = amountBtn.closest('.choose-account-Wrap');  //bottom sheet 숫자 키패드
                if ($thisValLayer !== null) {
                    $targetInput = numKey.numInput;
                } else if($thisValChoose !== null) {
                    $targetInput = $thisValChoose.querySelector('.choose-account-input input')
                }
                let $thisval = amountBtn.value;
                $targetInput.value = Number($thisval) + Number($targetInput.value);
            })
            
        });
        /* //키패드 키입력 예시 */
    </script>
    
</body>
</html>
