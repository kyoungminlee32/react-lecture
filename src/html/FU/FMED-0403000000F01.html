<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/fund.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">포트폴리오 관리</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="tabs">
                    <div class="outer">
                        <div class="inner">
                            <ul class="list">
                                <li class="item"><a href="javascript:void(0)">매수하기</a></li>
                                <li class="item"><a href="javascript:void(0)">매도하기</a></li>
                                <li class="item -active"><a href="javascript:void(0)">계좌관리</a></li>
                                <li class="item"><a href="javascript:void(0)">거래조회</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="content">
                    <div class="field">
                        <h3 class="h5">보유 포트폴리오 선택</h3>
                        <div class="select">
                            <button type="button" aria-haspopup="true">포트폴리오 명칭 선택</button>
                        </div>
                    </div>

                    <!-- 240517 결함:6654 ui변경 -->
                    <div class="case-wrap -lg">
                        <h4 class="h5">수익률 안내(문자메시지) 변경</h4>
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period--color1" id="period-point-color1-1" checked>
                                <label for="period-point-color1-1">매월</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period--color1" id="period-point-color1-2">
                                <label for="period-point-color1-2">받지 않음</label>
                            </div>
                        </div>
                    </div>

                    <div class="case-wrap -lg">
                        <h4 class="h5">목표ᆞ위험 수익률 변경</h4>

                        <div class="case-wrap -xs2">
                            <p class="label">목표수익률</label>
                            <div class="mix">
                                <div class="text -percent" data-clear="false">
                                    <div class="icon-plus">
                                        <input type="tel" id="gggs1" class="right num-call" placeholder="1 ~ 100% 이내로 입력" title="1 ~ 100% 이내로 입력"  onclick="numKey.keyOpen(this)" aria-haspopup="true">
                                        <div class="percent">%</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="case-wrap">
                            <p class="label">위험수익률</label>
                            <div class="mix">
                                <div class="text -percent" data-clear="false">
                                    <div class="icon-minus">
                                        <input type="tel" id="gggs2" class="right num-call" placeholder="1 ~ 100% 이내로 입력" title="1 ~ 100% 이내로 입력" onclick="numKey.keyOpen(this)" aria-haspopup="true">
                                        <div class="percent">%</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 2024-06-10 마크업 변경 위치 수정 -->
                        <h4 class="h5">리밸런싱 수신 여부 변경</h4>
                        <div class="case-wrap -xs2">
                            <div class="field">
                                <div class="box-radios">
                                    <div class="box-radio">
                                        <input type="radio" name="period2" id="box-radio2-1" checked>
                                        <label for="box-radio2-1">문자메시지</label>
                                    </div>
                                    <div class="box-radio">
                                        <input type="radio" name="period2" id="box-radio2-2">
                                        <label for="box-radio2-2">신청 안함</label>
                                    </div>
                                </div>
                            </div>
                            <dl class="dl -box">
                                <!-- 2024-06-10 삭제 -->
                                <!-- <div>
                                    <dt>이메일</dt>
                                    <dd>&& 이메일주소 %%</dd>
                                </div> -->
                                <div>
                                    <dt>휴대폰번호</dt>
                                    <dd>010-1234-1234</dd>
                                </div>
                            </dl>
                            <div class="case-wrap -xxs right">
                                <a href="javascript:void(0)" class="a -arrow">내 정보 수정</a>
                            </div>
                        </div>
                        <!-- //2024-06-10 마크업 변경 위치 수정 -->
                        <!-- <div class="field">
                            <div class="box-radios">
                                <div class="box-radio">
                                    <input type="radio" name="period2" id="box-radio2-1" checked>
                                    <label for="box-radio2-1">문자메시지</label>
                                </div>
                                <div class="box-radio">
                                    <input type="radio" name="period2" id="box-radio2-2">
                                    <label for="box-radio2-2">신청 안함</label>
                                </div>
                            </div>
                        </div> -->
                    </div>
                    <!-- // 240517 결함:6654 ui변경 -->
                    
                    <!-- [240307] 마크업변경 -->
                    <div class="case-wrap -lg">
                        <h3 class="h5">연결계좌 변경</h3>
                        <div class="select">
                            <button type="button" aria-haspopup="true" class="-fixed">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>통장(상품)명 또는 별칭</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                    <div class="amount">
                                        <div class="key">출금가능금액</div>
                                        <div class="value">
                                            <span>150,000,000</span>원
                                        </div>
                                    </div>
                                </div>
                            </button>
                        </div>
                    </div>
                    <!-- <div class="shortcut -lined -flor">
                        <ul>
                            <li><a href="javascript:void(0)">연결계좌 변경</a></li>
                            <li>
                                <a href="javascript:void(0)">포트폴리오 묶음 해제
                                    <p class="info">
                                        포트폴리오 묶음 해제를 실행하시면<br> 보유 포트폴리오가 일반 펀드로 전환됩니다.
                                    </p>
                                </a>
                            </li>
                        </ul>
                    </div> -->
                    <!-- //[240307] 마크업변경 -->
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>

    </script>
</body>
</html>
