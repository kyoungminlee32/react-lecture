<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/fund.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">펀드 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>   
                    <div class="h2-group">                        
                        <h2 class="h2"> <!-- [240126] 타이틀 추가 -->
                            출금계좌를 선택해 주세요
                        </h2>
                    </div>                                      
                    <div class="field">
                        <!-- <p class="label">출금계좌</p> [240205] 마크업 삭제 -->
                        <div class="select" style="display: none;"> <!-- [CASE] Default 계좌가 없을 경우 --> <!-- [240126] 위치이동 -->
                            <button type="button">출금계좌선택</button>
                        </div>
                        <div class="select"> <!-- [CASE] Default 계좌가 있을 경우  -->
                            <div class="button-type -fixed">
                                <div class="selection">
                                    <button type="button" aria-haspopup="true" data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </button>
                                    <div class="amount">
                                        <div class="key">출금가능금액</div>
                                        <div class="value">
                                            <span>
                                            <button type="button" class="refresh"><span class="hide">새로고침</span></button>
                                            150,000,000</span>원
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="checkbox -sm">
                            <input type="checkbox" id="checkbox-sm-checked02" checked="">
                            <label for="checkbox-sm-checked02">출금계좌와 동일하게 비밀번호 설정</label>
                        </div>
                    </div> 
                    <div class="field">
                        <label for="text1" class="label">신규계좌 비밀번호</label>
                        <div class="text">
                            <input type="password" class="num-call" id="text1" placeholder="비밀번호 4자리 입력" aria-haspopup="true" readonly>
                        </div>
                    </div>               
                </div>

                <!-- 플로팅 버튼 -->
                <div class="floating-wrap">
                    <div class="floating-btn" role="button"> <!-- [240111] role="button" 추가 -->
                        <p>원금손실<br>가능상품</p>  <!-- ux 라이팅 수정 -->
                    </div>
                    <a class="floating_close" title="원금 손실가능 상품 플로팅버튼 닫기"></a>
                </div>
                
                <!-- //플로팅 버튼 -->                 
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
