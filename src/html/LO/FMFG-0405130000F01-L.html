<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>(팝업)생애최초구입자</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>

<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">생애 최초 구입자</h1>
                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <ul class="ul -bullet">
                        <li>세대원 모두가 과거에 주택(분양권, 입주권 포함)을 소유한 사실이 없는 경우를 의미합니다.</li>
                        <li>세대원은 세대별 주민등록표상에 배우자, 직계존속(배우자의 직계존속 포함), 직계비속 및 그 배우자를 의미합니다.</li>
                        <li>배우자가 세대분리된 경우 배우자 및 그 배우자와 동일세대를 이루는 직계비속 및 그 배우자를 포함합니다.</li>
                    </ul>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE] 모두 “예“ 선택, 체크박스 선택 시 활성화 처리 -->
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                    <!-- //[CASE] 모두 “예“ 선택, 체크박스 선택 시 활성화 처리 -->
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <!-- 차트 관련js -->
    <script src="../../assets/libs/Chart/dist/Chart.js"></script>
    <script src="../../assets/libs/Chart/dist/Chart.min.js"></script>

    <script>
        Popup.open('popup');



    </script>
</body>

</html>
