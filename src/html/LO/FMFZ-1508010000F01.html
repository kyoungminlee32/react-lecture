<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출한도 조회</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 231205 h2-group 코드 변경 -->
                    <div class="h2-group">
                        <h2 class="h2">고객님의 자산정보를 심사하고 있어요</h2>
                    </div>
                    <ol class="ol -badge">
                        <li>
                            <span class="gadget">1단계</span>
                            <div class="title">자격심사</div>
                            주택도시보증공사 “기금e든든”에서 고객님의 자격심사를 진행해요.
                        </li>
                        <li>
                            <span class="gadget">2단계</span>
                            <div class="title">소득심사/우대금리</div>
                            고객님의 소득과 우대금리 사항을 파악해요.
                        </li>
                        <li>
                            <span class="gadget">3단계</span>
                            <div class="badges -gadgettitle">
                                <!-- 240312 ux라이팅 수정 -->
                                <span class="badge -greenline">심사 중</span>                            
                                <!-- //240312 ux라이팅 수정 -->  
                                <div class="title">자산심사</div>                          
                            </div>
                            <ul class="ul -bullet">
                                <li>고객님의 자산정보를 심사해요.</li>
                                <li>심사결과 적격의 경우 대출신청이 가능해요.</li>
                            </ul>
                            
                        </li>
                    </ol>
                </div>


                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary" disabled>대출 신청하기</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
