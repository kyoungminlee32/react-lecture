<!DOCTYPE html>
<html lang="ko">
<head>

                    <h1 class="title">대출 계약서류</h1>

                    <!-- 240425 헤더 수정 -->
                    <div class="funcs">

                </div>

            <main class="contents">

                    <div class="filter-bar">

                                <!-- 240405 코드 수정 -->
                                <li>
                                    <div class="info-detail">
                                        <a href="javascript:void(0)" class="a -arrow">2019년 12월 24일 이전 대출약정서 조회</a>
                                    </div>                
                                </li>
                                <!-- //240405 코드 수정 -->
                            </ul>
                            <!-- //240312 ux라이팅 수정 -->
                        </div>
                    </div>
                </div>
                
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
