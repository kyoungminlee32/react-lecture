<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청내역 조회</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="h2-group">
                        <h2 class="h2">신청정보를 확인 후 대출실행을 진행해 주세요</h2>
                    </div>

                    <div class="limit-point-box">
                        <!-- 240215 UX라이팅 수정 -->
                        <p class="p">대출금액 <span class="limit-point bk">1억5,000만원</span></p>
                        <!-- //240215 UX라이팅 수정 -->
                        <p class="p">대출금리<a href="javascript:void(0)" class="limit-point detail -arrow">5.80%</a></p>
                    </div>

                    <dl class="dl -box">
                        <div>
                            <dt>자동이체계좌</dt>
                            <dd>302-1234-5678-80</dd>
                        </div>
                        <div>
                            <!-- 240202 ux라이팅 수정 -->
                            <dt>이자 납입일</dt>
                            <!-- //240202 ux라이팅 수정 -->
                            <dd>매월 15일</dd>
                        </div>
                        <div>
                            <!-- 240326 재검토 -->
                            <dt>대출 만기일</dt>
                            <!-- // 240326 재검토 -->
                            <dd>2025.12.31</dd>
                        </div>
                    </dl>

                    <h4 class="h5">대출금 입금정보 (임대인 계좌정보)</h4>
                    <dl class="dl -box">
                        <div>
                            <dt>예금주</dt>
                            <dd>김농업</dd>
                        </div>
                        <div>
                            <dt>입금은행명</dt>
                            <dd>농협은행</dd>
                        </div>
                        <div>
                            <dt>대출금입금계좌</dt>
                            <dd>302-1234-5678-80</dd>
                        </div>
                    </dl>

                    <h4 class="h5">인지세 출금정보</h4>
                    <dl class="dl -box -half">
                        <div>
                            <dt>인지세(고객부담금)</dt>
                            <dd>150,000원(75,000원)</dd>
                        </div>
                    </dl>
                    <!-- ui 수정 240122 (코드 변경) -->
                    <div class="field">
                        <p class="label">계좌번호</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                </div>
                            </button>
                        </div>
                        <!-- 240219 코드 변경 -->
                        <div class="checkbox -sm">
                            <input type="checkbox" id="checkbox-smc" checked>
                            <label for="checkbox-smc">인지세 출금을 확인하고 동의합니다.</label>
                        </div>
                        <div class="info-detail">
                            <a href="javascript:void(0)" class="a -arrow">인지세 안내</a>
                        </div>
                        <!-- //240219 코드 변경 -->
                    </div>
                    <!-- [CASE] 초기값 -->
                    <!-- <div class="field">
                        <p class="label">계좌번호</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">계좌선택</button>
                        </div>
                    </div> -->
                    <!-- //ui 수정 240122 (코드 변경) -->
                    <div class="field">
                        <label for="text1" class="label">계좌 비밀번호</label>
                        <div class="text">
                            <input type="password" class="num-call" id="text1" value="1111" placeholder="비밀번호 4자리 입력" aria-haspopup="true" readonly>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">대출실행</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
