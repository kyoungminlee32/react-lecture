<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>상환방법선택_Bottom Sheet</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>
<body>
    <div id="layer" class="layer">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">상환방법을 선택해 주세요</h1>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="options">
                        <ul>
                            <li>
                                <button type="button" class="option -two -active">
                                    <p class="item">원금균등분할상환</p>
                                    <p class="item">원금과 이자를 함께 갚아요. 회차별로 이자가 줄어들어요.</p>
                                </button>
                            </li>
                            <li>
                                <button type="button" class="option -two">
                                    <p class="item">만기일시상환</p>
                                    <p class="item">대출기간 동안 이자만 갚다가 대출 만기일에 대출금을 한 번에 갚아요</p>
                                </button>
                            </li>
                            <li>
                                <button type="button" class="option -two">
                                    <p class="item">마이너스대출</p>
                                    <p class="item">원금과 이자를 수시로 갚아요. 한도약정(또는 미사용) 수수료가 발생해요.</p>
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Layer.open('layer');

        // 레이어 닫기(마지막 인자 기본값: false)
        // Layer.close('layer', function() {
        //     '콜백함수'
        // });

        // 레이어 닫기 + DOM 삭제
        // Layer.close('layer', function() {
        //     '콜백함수'
        // }, true);
    </script>
</body>
</html>
