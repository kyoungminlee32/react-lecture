<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>약관 동의</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출한도 조회</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="h2-group">
                        <!-- <p class="sub">보조메시지</p> -->
                        <h2 class="h2">
                            약관에 동의해 주세요
                        </h2>
                    </div>
                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="required-total01">
                                <label for="required-total01">[필수] 전체 동의</label>
                            </div>
                            <button type="button" class="more"><span class="hide">필수 전체 동의 약관</span></button>
                        </div>
                        <div class="panel">
                            <!-- 231201 동의서 내용 추가 -->
                            <div class="checkboxes -full">
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required1">
                                    <label for="required1">은행여신거래기본약관(가계용)</label>
                                    <button type="button" class="more"><span class="hide">약관</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required2">
                                    <label for="required2">NH모바일중도금대출 상품설명서</label>
                                    <button type="button" class="more"><span class="hide">약관</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required3">
                                    <label for="required3">가계대출 핵심설명서</label>
                                    <button type="button" class="more"><span class="hide">가계대출 핵심설명서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required4">
                                    <label for="required4">행정기관 개인(신용)정보 조회 위임동의서</label>
                                    <button type="button" class="more"><span class="hide">행정기관 개인(신용)정보 조회 위임동의서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required5">
                                    <label for="required5">[필수] 행정기관 개인(신용)정보 수집·이용 동의서</label>
                                    <button type="button" class="more"><span class="hide">시스템 이용 관련 개인(신용)동의서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required6">
                                    <label for="required6">국토교통부 주택소유확인 시스템 이용 관련 개인(신용)동의서</label>
                                    <button type="button" class="more"><span class="hide">국토교통부 주택소유확인 시스템 이용 관련 개인(신용)동의서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required7">
                                    <label for="required7">(여신)개인(신용)정보 수집이용동의서 (상품별 필수)</label>
                                    <button type="button" class="more"><span class="hide">(여신)개인(신용)정보 수집이용동의서(상품별 필수)</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required8">
                                    <label for="required8">[필수] 개인(신용)정보수집이용제공동의서</label>
                                    <button type="button" class="more"><span class="hide">동의서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required9">
                                    <label for="required9">개인(신용)정보의 수집이용제공조회동의서(보증서 신청용)</label>
                                    <button type="button" class="more"><span class="hide">수집이용제공조회동의서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required10">
                                    <label for="required10">개인(신용)정보 수집이용 및 제공 관련 고객 권리 안내문</label>
                                    <button type="button" class="more"><span class="hide">정보수집이용제공동의서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required11">
                                    <label for="required11">개인(신용)정보조회동의서</label>
                                    <button type="button" class="more"><span class="hide">정보수집이용제공동의서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required12">
                                    <label for="required12">개인(신용)정보 제3자 제공 동의서</label>
                                    <button type="button" class="more"><span class="hide">필수동의서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required13">
                                    <label for="required13">통신사 서비스 이용약관 동의</label>
                                    <button type="button" class="more"><span class="hide">필수동의서</span></button>
                                </div>
                            </div>
                            <!-- //231201 동의서 내용 추가 -->
                        </div>
                    </div>

                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="optional-total02">
                                <label for="optional-total02">금융상품 중요사항 확인</label>
                            </div>
                            <button type="button" class="more"><span class="hide">금융상품 중요사항 확인</span></button>
                        </div>
                    </div>

                    <!-- 240514 약관추가 -->
                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="optional-total03">
                                <label for="optional-total03">여신비용 자동 출금 동의</label>
                            </div>
                            <!-- [231220] 접근성 관련 변경 버튼 -> span -->
                            <span class="more expand"></span>
                        </div>
                        <div class="panel">
                            <span class="info">다음의 비용에 대하여 대출금 입금 계좌에서 별도의 지급청구서 작성 없이 무통장 출금처리 하거나 대출금에서 차감하는 것에
                                동의합니다.</span>
                            <!-- 2024-07-25 항목 수정 및 추가 -->
                            <ul class="ul -bullet">
                                <li>수입인지대금</li>
                                <li>보증료 또는 보험료</li>
                                <li>국민주택채권매입비</li>
                            </ul>
                            <!-- //2024-07-25 항목 수정 및 추가 -->
                            <span class="info">단, 발행 익일 이후에는 발행 취소가 불가하여 일부 손실이 발생할 수 있습니다.</span>
                        </div>
                    </div>
                    <!-- // 240514 약관추가 -->

                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="required-total">
                                <label for="required-total">[선택] 전체 동의</label>
                            </div>
                            <button type="button" class="more"><span class="hide">선택 동의 약관</span></button>
                        </div>
                        <div class="panel">
                            <div class="checkboxes -full">
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required01">
                                    <!-- 240104 UX라이팅 수정 시작 -->
                                    <label for="required01">[선택] 개인(신용)정보 수집·이용 동의 (상품서비스 안내 등)</label>
                                    <!-- //240104 UX라이팅 수정 시작 -->
                                    <button type="button" class="more"><span class="hide">약관</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required02">
                                    <label for="required02">[선택] 개인(신용)정보 수집·이용·제공 동의 (상품서비스 안내 등)(농협금융지주 자회사간 상호 정보
                                        제공용)</label>
                                    <button type="button" class="more"><span class="hide">약관</span></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 240326 재검토 -->
                    <p class="agree-message-2">
                        약관 및 상품 주요 설명, 개인(신용)정보 수집·이용·제공에 관한 사항 및 유의사항과 중요사항을 충분히 읽고 확인한 후 금융상품에 가입합니다.
                    </p>
                    <!-- //240326 재검토 -->

                </div>

                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE]필수 항목을 선택후 활성화 -->
                        <button type="button" class="button -lg -primary" disabled>다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
