<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>모바일 서류제출</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">배우자·세대원 정보제공 동의</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">
                        <h2 class="h2">안내사항과 약관을 확인해 주세요</h2>
                        <div class="case-wrap -xs">
                            <ul class="ul -bullet">
                                <li>동의하신 정보는 NH농협은행 대출 신청 영업점에서 대출 심사 시 활용됩니다.</li>
                                <li>자세한 사항은 대출 신청 영업점에 문의하여 주시기 바랍니다.</li>
                            </ul>
                        </div>    
                    </div>
                    <div class="field">
                        <p class="label">상품명</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">NH모바일전세대출+</button>
                        </div>
                    </div>
                    <div class="agree">
                        <!-- 240405 코드 추가 -->
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="required-total01">
                                <label for="required-total01">[필수] 전체 동의</label>
                            </div>
                            <button type="button" class="more"><span class="hide">필수 전체 동의 약관</span></button>
                        </div>
                        <!-- //240405 코드 추가 -->
                        <div class="panel">
                            <div class="checkboxes -full checktop">
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="optional1">
                                    <label for="optional1">개인(신용)정보 수집 · 이용 · 제공 동의서(상품별 필수)(국토교통부시스템 주택소유확인용)</label>
                                    <button type="button" class="more"><span class="hide">약관</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="optional2">
                                    <label for="optional2">개인(신용)정보 제3자 제공 동의서(상품별 필수)(국토교통부시스템 주택소유확인용)</label>
                                    <button type="button" class="more"><span class="hide">약관</span></button>
                                </div>
                            </div>
                            <!-- 240405 중복항목 삭제 -->
                        </div>
                    </div>                
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg">취소</button>
                        <button type="button" class="button -lg -primary" disabled>확인</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
