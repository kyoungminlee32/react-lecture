<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>소득금액 정보 확인</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>
                    <h1 class="title">대출신청</h1>   <!-- 240326 재검토 -->
                    <div class="funcs">
                        <button type="button" class="func -home"><span class="hide">홈</span></button>
                        <button type="button" class="func -menu">
                            <div class="hide">menu</div>
                        </button>
                    </div>
                </div>
            </header>

            <div class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 231205 h2-group 추가 -->
                    <div class="h2-group">
                        <h2 class="h2">소득금액 정보를 확인해 주세요</h2>
                    </div>
                    <div class="field">
                        <div class="data-box">
                            <div class="data-box-title">소득금액 확인</div>
                            <div class="data-box-content">20,000,000원</div>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">소득금액 확인란에 확인된 소득이 있으신가요?</p>
                        <div class="box-radios">
                            <div class="box-radio">
                                <!-- ui 수정 240122 (input에 checked 추가) -->
                                <input type="radio" name="period" id="box-radio11-12" checked>
                                <label for="box-radio11-12">예</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period" id="box-radio11-22">
                                <label for="box-radio11-22">아니요</label>   <!-- 240326 재검토 -->
                            </div>
                        </div>
                    </div>
                    <div class="field">
                        <!-- 240318 ux라이팅 수정 -->
                        <label for="text" class="label">지방세 체납 여부</label>
                        <div class="text">
                            <!-- 240207 value값 수정 -->
                            <input type="text" id="text" readonly value="체납 없음">
                        </div>
                        <!-- 240318 ux라이팅 수정 -->
                    </div>

                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE] 모두 “예“ 선택, 체크박스 선택 시 활성화 처리 -->
                        <button type="button" class="button -lg -primary" disabled>다음</button>
                    </div>
                    <!-- //[CASE] 모두 “예“ 선택, 체크박스 선택 시 활성화 처리 -->
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
