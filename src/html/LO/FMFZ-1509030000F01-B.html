<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>(바텀쉬트)현재 고객님의 대출신청 자격 확인1</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>
<body>
    <div id="layer" class="layer">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">현재 고객님의 대출신청 자격을 확인해 주세요</h1>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="options">
                        <ul>
                            <li>
                                <button type="button" class="option -active">
                                    세대주
                                </button>
                            </li>
                            <li>
                                <button type="button" class="option">
                                    세대원
                                </button>
                            </li>
                        </ul>
                        <!-- [CASE] [세대원] 선택 시  -->
                        <div class="line-box">
                            <h3 class="title">세대주 인정요건을 선택해 주세요.</h3>
                            <div class="radio-row-box">
                                <div class="radio -sm">
                                    <input type="radio" id="radio-sm-c" checked>
                                    <label for="radio-sm-c">세대주의 세대원인 배우자</label>
                                </div>
                                <div class="radio -sm">
                                    <input type="radio" id="radio-sm-c2">
                                    <label for="radio-sm-c2">
                                        <!-- 2024-07-25 문구 수정 -->
                                        <span>세대주(예정자)</span> 
                                        <!-- 2024-07-25 문구 수정 -->
                                        <p class="p">주의 : 임차목적물에 대출신청일 현재 주민등록등본상 동일한 세대를 구성하고 있는 세대원만 전입하는 경우에 선택가능</p>
                                    </label>
                                    
                                </div>
                                <!-- ui수정 240315 (기획 요청 삭제) -->
                                <!-- <div class="radio -sm">
                                    <input type="radio" id="radio-sm-c3">
                                    <label for="radio-sm-c3">해당사항 없음</label>
                                </div> -->
                                <!-- //ui수정 240315 (기획 요청 삭제) -->
                            </div>
                        </div>
                        <!-- //[CASE] [세대원] 선택 시  -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Layer.open('layer');

        // 레이어 닫기(마지막 인자 기본값: false)
        // Layer.close('layer', function() {
        //     '콜백함수'
        // });

        // 레이어 닫기 + DOM 삭제
        // Layer.close('layer', function() {
        //     '콜백함수'
        // }, true);
    </script>
</body>
</html>
