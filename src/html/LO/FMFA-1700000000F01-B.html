<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>(팝업)인지세안내</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <!-- 240105 전체수정 -->
    <div id="layer" class="layer">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <!-- 240119 ux라이팅 수정 -->
                    <h1 class="title">대출금이 5,000만원을 초과하면 <br> 인지세를 내야해요</h1>
                    <!-- //240119 ux라이팅 수정 -->
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <ul class="ul -bullet">
                        <li>인지세란 대출을 받을 때 내는 세금이에요.</li>
                        <!-- 240227 ux라이팅 수정 -->
                        <li>고객님과 은행이 50%씩 부담해요</li>
                        <li>대출 실행일에 대출금 입금계좌에서 자동 납부돼요.</li>
                        <!-- //240227 ux라이팅 수정 -->
                    </ul>
                    <div class="table">
                        <table>
                            <caption><span class="hide">대출금액에 따른 은행 부담과 고객 부담</span></caption>   <!-- [240503]캡션 문구 수정 -->
                            <colgroup>
                                <col style="width:33.3%">
                                <col style="width:33.3%">
                                <col style="width:33.3%">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th scope="col">대출금액</th>
                                    <th scope="col">은행 부담</th>
                                    <th scope="col">고객 부담</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <!-- 240227 ux라이팅 수정 -->
                                    <td>5,000만원 이하</td>
                                    <!-- //240227 ux라이팅 수정 -->
                                    <td>0원</td>
                                    <td>0원</td>
                                </tr>
                                <tr>
                                    <td>-1억원 이하</td>
                                    <td>35,000원</td>
                                    <td>35,000원</td>
                                </tr>
                                <tr>
                                    <td>-10억원 이하</td>
                                    <td>75,000원</td>
                                    <td>75,000원</td>
                                </tr>
                                <tr>
                                    <td>-10억원 초과</td>
                                    <td>175,000원</td>
                                    <td>175,000원</td>
                                </tr>

                            </tbody>
                        </table>
                    </div>
                    <!-- ui수정 240122 (클래스명 수정) -->
                    <dl class="dl -table-bottom-list -box">
                        <div>
                            <dt>합계액</dt>
                            <dd>70,000원</dd>
                        </div>
                        <div>
                            <dt>고객부담금액</dt>
                            <dd>35,000원</dd>
                        </div>
                    </dl>
                    <!-- ui수정 240122 (클래스명 수정) -->
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Layer.open('layer');

        // 레이어 닫기(마지막 인자 기본값: false)
        // Layer.close('layer', function() {
        //     '콜백함수'
        // });

        // 레이어 닫기 + DOM 삭제
        // Layer.close('layer', function() {
        //     '콜백함수'
        // }, true);
    </script>
</body>

</html>
