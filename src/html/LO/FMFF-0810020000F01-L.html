                </div>

                    <div class="options">

                                <button type="button" class="option -two -active">

                                    <!-- 240207 ux라이팅 수정 -->
                                    <p class="item">신청한 대출금액 전액을 한 번에 입출금계좌로 입금 받는 방법으로, 상환한 금액을 다시 사용할 수 없습니다.</p>
                                    <!-- //240207 ux라이팅 수정 -->
                                </button>
                            </li>
                            <li>
                                <button type="button" class="option -two">
                                    <p class="item">한도거래(마이너스통장 대출)</p>
                                    <!-- 240207 ux라이팅 수정 -->
                                    <p class="item">거래하고 있는 계좌를 이용해 신청한 한도 내에서 돈을 수시로 빌려 쓰고, 만기일에 한도금액을 상환합니다.</p>
                                    <!-- //240207 ux라이팅 수정 -->
