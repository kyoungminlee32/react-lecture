<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>자동이체와 우대정보)바닥페이지</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <!-- 240119 코드 전체 변경 -->
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <!-- 240130 ux라이팅 수정 -->
                        <h2 class="h2">자동이체와 우대정보를 <br> 확인해 주세요</h2>
                        <!-- //240130 ux라이팅 수정 -->
                    </div>
                    <dl class="dl -box -row -w50">
                        <div>
                            <dt>신청금액</dt>
                            <dd>3,500만원</dd>
                        </div>
                        <div>
                            <!-- 240126 ux라이팅 수정 -->
                            <dt><a href="javascript:void(0)" class="a -arrow">예상금리</a></dt>
                            <!-- 240126 ux라이팅 수정 -->
                            <dd class="point">2.31%</dd>
                        </div>
                    </dl>
                    <!-- 240305 accounts-box 전체 수정 -->
                    <div class="accounts-box case-wrap">
                        <h4 class="h5">대출 상환정보</h4>                    
                        <div class="account">
                            <!-- 240213 data-bankcode삭제 -->
                            <div class="info">
                                <span class="name">
                                    <span>신한은행</span>
                                </span>
                                <span class="account-number">
                                    <span>111-1234-5678-99</span>
                                </span>
                            </div>
                            <dl class="dl">
                                <div>
                                    <dt>총 상환 금액</dt>
                                    <dd>450,000,000원</dd>
                                </div>
                                <div>
                                    <dt>대출잔액</dt>
                                    <dd>330.000.000원</dd>
                                </div>
                                <div>
                                    <dt>이자</dt>
                                    <dd>98,000,000원</dd>
                                </div>
                                <div>
                                    <dt>중도상환해약금</dt>
                                    <dd>98,000,000원</dd>
                                </div>
                                <div>
                                    <dt>기타비용</dt>
                                    <dd>98,000,000원</dd>
                                </div>
                            </dl>
                        </div>
                    </div>
                    <!-- ui수정 240122 (코드 변경 , 초기값 문구 변경) -->
                    <div class="field">
                        <!-- 240130 ux라이팅 수정 -->
                        <p class="label">자동이체계좌</p>
                        <!-- //240130 ux라이팅 수정 -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                </div>
                            </button>
                        </div>
                    </div>
                    <!-- [CASE] 초기값 -->
                    <!-- <div class="field">
                        <p class="label">자동이체 계좌</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">자동이체 계좌 선택</button>
                        </div>
                    </div> -->
                    <!-- //ui수정 240122 (코드 변경 , 초기값 문구 변경) -->
                    <div class="field">
                        <p class="label">이자 납입일</p>
                        <div class="select">
                            <!-- 240305 ux라이팅 수정 -->
                            <button type="button" aria-haspopup="true">매월 3일</button>
                            <!-- //240305 ux라이팅 수정 -->
                        </div>
                    </div>
                    <div class="field">
                        <div class="title-group">
                            <div class="inner">
                                <!-- 240130 ux라이팅 수정 -->
                                <span class="title">보증한도 우대 대상</span>
                            </div>
                            <a href="javascript:void(0)" class="a -arrow">서류 안내</a>                
                        </div>            
                        <div class="select">
                            <button type="button" aria-haspopup="true">단일 선택</button>
                            <p class="info">보증한도 우대 대상 확인서류를 제출해 주세요.</p>
                                <!-- //240130 ux라이팅 수정 -->
                        </div>
                        <!-- [CASE] 보증료 할인 대상일 경우 -->
                        <!-- <span class="title">보증료 할인 대상</span>
                        <div class="select">
                            <button type="button" aria-haspopup="true">모두 선택</button>
                            <p class="info">보증료 할인 대상 확인서류를 제출해 주세요.</p>
                        </div> -->
                        <!-- //[CASE] 보증료 할인 대상일 경우 -->
                    </div>
                </div>
                <!-- 240119 코드 전체 변경 -->
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
