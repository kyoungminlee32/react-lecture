<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출약정서 작성</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">대출약정 신청내역을 확인해 주세요</h2>
                    </div>
                    
                    <!-- 240228 수정 -->
                    <div class="account">
                        <!-- 240320 data-code 로고 삭제 -->
                        <div type="button" class="info">
                            <span class="name">
                                <span>(가계일반)NH모바일아파트대출2.0</span>
                            </span>
                            <!-- 240320 계좌 삭제 -->
                        </div>
                        
                        <div class="case-wrap -sm">
                            <dl class="dl">
                                <div>
                                    <!-- 240312 ux라이팅 수정 -->
                                    <dt>신청일</dt>
                                    <!-- //240312 ux라이팅 수정 -->
                                    <dd>2023.10.05</dd>
                                </div>
                                <div>
                                    <dt>구분</dt>
                                    <dd>신용대출</dd>
                                </div>
                                <div>
                                    <dt>서류명</dt>
                                    <dd>대출거래약정서(가계용)_은행용 약정서</dd>
                                </div>
                            </dl>
                        </div>
                    </div>
                    <!-- //240228 수정 -->
                </div>
                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <!-- 240312 ux라이팅 수정 -->
                            <ul class="ul -bullet">
                                <li>작성한 대출관련 약정서류 확인 및 다운로드는 인터넷 금융상품몰 홈페이지(PC)에서만 할 수 있습니다.</li>
                                <li>대출 신청일로부터 5년간 신청내역이 보관됩니다.</li>
                                <li>보관 이후 약정서 사본은 해당 희망 관리점에서 신청할 수 있습니다.</li>
                            </ul>
                            <!-- //240312 ux라이팅 수정 -->
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <!-- 240326 재검토 -->
                        <button type="button" class="button -lg -primary">확인</button>
                        <!-- // 240326 재검토 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
