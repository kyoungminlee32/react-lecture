    <title>대출이동 불가 안내</title>

    <link rel="stylesheet" href="../../assets/css/loan.css">

<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">대출이동 불가 안내</h1>

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <!-- 2024-06-06 page 아이콘 변경 (오류) -->
                    <div class="page-icon -type-error" aria-hidden="true"></div>

                    <!-- <div class="page-img">
                        <img src="/content/assets/imgs/img/utility/ico-incongruity.png" style="width:10rem"
                            alt="모바일신분증 인증 예시">
                    </div> -->
                    <div class="h2-group">
                        <h2 class="h2">
                            DSR 40% 금액보다 대환대상 잔액이 클 경우 대출이동이 불가합니다.
                        </h2>
                    </div>
                    <dl class="dl -box case-box4 case-wrap">
                        <div>
                            <dt>대환대상 총 대출잔액</dt>
                            <dd>800,000,000원</dd>
                        </div>
                        <div>
                            <dt>
                                DSR 40% 금액
                                <span class="tooltip">
                                    <button type="button" class="trigger">
                                        <span class="hide">툴팁</span>
                                    </button>
                                    <span class="panel">
                                        <span class="title">DSR(Debt service ratio)</span>
                                        <span class="t-content">
                                            <span>
                                                DSR은 총 부채 원리금상환비율(Debt Savings Ratio)로, 대출의 한도를 정하는 방법 중 하나입니다. 1년간 버는 소득에 비해 빚을 갚는 돈(상환액)이 얼마인지 정하는 기준입니다. 예를 들어 DSR 40%는 1년에 1억을 벌 때, 1년간 대출 상환액이 4천만원 이라는 의미입니다.
                                            </span>
                                        </span>
                                    <!-- //240130 ux라이팅 수정 -->
                                    </span>
                                </span>
                            </dt>
                            <dd>800,000,000원</dd>
                        </div>
                    </dl>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- <button type="button" class="button -lg">취소</button> -->
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
