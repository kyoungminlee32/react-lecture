<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>모바일 서류제출</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <!-- 240108 ux 라이팅 수정 -->
                        <h2 class="h2">서류 제출을 위해 정보를 확인해 주세요</h2>
                        <!-- //240108 ux 라이팅 수정 -->

                    </div>

                    <div class="field">
                        <!-- 240206 ux라이팅 수정 -->
                        <p class="label">시·도</p>
                        <!-- //240206 ux라이팅 수정 -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">서울특별시</button>
                        </div>
                    </div>
                    <div class="field">
                        <!-- 240306 ux라이팅 수정 -->
                        <p class="label">시·군·구</p>
                        <!-- //240306 ux라이팅 수정 -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">은평구</button>
                        </div>
                    </div>
                    <div class="field">
                        <label for="phone" class="label">가족정보</label>
                        <div class="mix">
                            <!-- select 크기 조정 flex-3으로 변경 -->
                            <div class="select flex-3">
                                <button type="button" class="left-side" aria-haspopup="true" title="관계 선택">관계</button>
                            </div>
            
                            <div class="text flex-7" data-clear="false">
                                <input type="tel" class="right-side num-call" id="phone" placeholder="가족 이름 입력" aria-haspopup="true" readonly>
                            </div>
                            <div class="info-wrap">
                                <!-- 240108 ux라이팅 수정 -->
                                <!-- 240326 재검토 -->
                                <p class="info">부, 모, 배우자, 자녀 중 한 사람의 가족정보를 입력</p>
                                <!-- // 240326 재검토 -->
                                <!-- //240108 ux라이팅 수정 -->
                            </div>
                        </div>
                    </div>
                </div>
                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <!-- 240326 재검토 -->
                            <!-- 2024-05-10 문구 수정 -->
                            <p class="p">공동인증서나 민간인증서로 인증 후 대출 신청에 필요한 서류를 확인하여 제출합니다.<br>
                                (모바일 서류제출 가능시간 : 08시 ~ 22시)</p>
                            <!-- //2024-05-10 문구 수정 -->
                            <!-- // 240326 재검토 -->
                        </div>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE]모든 항목 채워지면 활성화 -->
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
