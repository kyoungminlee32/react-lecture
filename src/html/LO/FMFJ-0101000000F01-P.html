<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">
</head>
<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">미리보기</h1>

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <!-- 240214 스와이퍼 추가 -->
                    <div class="img-slide-wrap">
                        <div class="img-slide-inner">
                            <div class="swiper">
                                <div class="swiper-wrapper">
                                    <div class="swiper-slide"><img src="../../assets/imgs/img/deposit/img-FMDB-0501000000F01-P-1.png" alt="img1"></div>
                                    <div class="swiper-slide"><img src="../../assets/imgs/img/deposit/img-FMDB-0501000000F01-P-2.png" alt="img2"></div>
                                    <div class="swiper-slide"><img src="../../assets/imgs/img/deposit/img-FMDB-0501000000F01-P-3.png" alt="img3"></div>
                                </div>
                                <div class="swiper-pagination"></div>
                            </div> 
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg">재등록</button>
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');

        var swiper = new Swiper('.swiper',{
            // loop : true,
            autoHeight : false,
            observer : true,
            observeParents : true,
            spaceBetween: 16,
            // pagination : {
            //     el : '.swiper-pagination',
            //     clickable : true
            // },
            a11y : {
                prevSlideMessage : '이전슬라이드',
                nextSlideMessage : '다음슬라이드',
                slideLabelMessage : '총{{slidesLength}}장의 슬라이드 중 {{index}}번 슬라이드 입니다.'
            }
        });
    </script>
</body>
</html>
