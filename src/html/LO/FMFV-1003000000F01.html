<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <!-- 240318 ux라이팅 수정 -->
                        <h2 class="h2">보증 승인상태를 확인해 주세요</h2>
                        <!-- //240318 ux라이팅 수정 -->
                    </div>
                    <!-- ui전체수정 240304-->
                    <dl class="dl -bordered inapprove">
                        <div class="approve-wrap -bgtype"><!-- ui수정 240122 (클래스 추가 : -bgtype ) -->
                            <!-- 240304 ux라이팅 수정 -->
                            <div class="warranty-text">승인상태</div>
                            <!-- //240304 ux라이팅 수정 -->
                            <!-- [CASE] 승인:-success, 심사중:-ing, 대출불가:-fail -->
                            <div class="state-text -fail">불가</div>
                            <!-- // [CASE] 승인:-success, 심사중:-ing, 대출불가:-fail -->
                        </div>
                        <div>
                            <dt>재단 관할점</dt>
                            <dd>OO지역신용보증재단</dd>
                        </div>
                        <div>
                            <!-- 240318 ux라이팅 수정 -->
                            <dt>재단 담당자</dt>
                            <!-- //240318 ux라이팅 수정 -->
                            <dd>김금상</dd>
                        </div>
                        <div>
                            <!-- 240108 dt문구수정 -->
                            <dt>전화번호</dt>
                            <dd>000-0000-0000</dd>
                        </div>
                    </dl>
                    <p class="message">재단에서 보증 심사 결과 거절되었어요. 자세한 내용은 지역신용보증대단으로 문의해 주세요</p>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
                <!-- //ui전체수정 240304-->
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
