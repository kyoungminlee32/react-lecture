<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>약관 동의</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <!-- 240206 프로그래스바 추가 -->
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <!-- 240227 ux라이팅 수정 -->
                        <h2 class="h2">
                            약관에 동의해 주세요
                        </h2>
                        <!-- //240227 ux라이팅 수정 -->
                    </div>
                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="required-total01">
                                <label for="required-total01">[필수] 전체 동의</label>
                            </div>
                            <button type="button" class="more"><span class="hide">필수 전체 동의 약관</span></button>
                        </div>
                        <div class="panel">
                            <div class="checkboxes -full">
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required1">
                                    <label for="required1">은행여신거래기본약관(기업)</label>
                                    <button type="button" class="more"><span class="hide">약관</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required2">
                                    <label for="required2">기업대출상품설명서</label>
                                    <button type="button" class="more"><span class="hide">상품설명서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required3">
                                    <label for="required3">여신거래약정서(Ⅰ형) (기업형)</label>
                                    <button type="button" class="more"><span class="hide">대출거래약정서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required4">
                                    <label for="required4">추가약정서(기업여신 금리우대용)</label>
                                    <button type="button" class="more"><span class="hide">동의서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required5">
                                    <label for="required5">(지역신보)신용보약정서(개별거래-개별보증용) 비대면용</label>
                                    <button type="button" class="more"><span class="hide">동의서</span></button>
                                </div>
                                <!-- 240207 동의내역서 추가 -->
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required6">
                                    <label for="required6">CD수익률 표준명세서</label>
                                    <button type="button" class="more"><span class="hide">CD수익률 표준명세서</span></button>
                                </div>
                                <!-- //240207 동의내역서 추가 -->
                            </div>
                        </div>
                    </div>
                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="optional-total02">
                                <label for="optional-total02">금융상품 중요사항 확인</label>
                            </div>
                            <button type="button" class="more"><span class="hide">금융상품 중요사항 확인</span></button>
                        </div>
                    </div>
                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="required-total">
                                <label for="required-total">[선택] 전체 동의</label>
                            </div>
                            <button type="button" class="more"><span class="hide">선택 동의 약관</span></button>
                        </div>
                        <div class="panel">
                            <div class="checkboxes -full">
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required01">
                                    <label for="required01">[선택] 개인(신용)정보 수집·이용 동의 (상품서비스 안내 등)</label>
                                    <button type="button" class="more"><span class="hide">약관</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required02">
                                    <label for="required02">[선택] 개인(신용)정보 수집·이용·제공 동의 (상품서비스 안내 등)(농협금융지주 자회사간 상호 정보 제공용)</label>
                                    <button type="button" class="more"><span class="hide">약관</span></button>
                                </div>
                            </div>
                        </div>
                    </div>
                            <!-- 240318 ux라이팅 수정 -->
                    <div class="check-Wrap">
                        <div class="checkbox">
                            <input type="checkbox" id="checkbox-a" checked>
                            <label for="checkbox-a">지역신용보증재단에 보증료 납부는 별도의 지급 청구서/입금 의뢰서 작성없이 보증료 출금계좌에서 무통장 출금하여 재단 계좌에 입금하는 것에 동의합니다.</label>
                        </div>
                        <div class="checkbox">
                            <input type="checkbox" id="checkbox-b" checked>
                            <label for="checkbox-b">수입인지세가 발생하면 대출금 입금 계좌에서 별도의 지급 청구서 작성 없이 무통장 출금 처리 하거나 대출금에서 차감하는 것에 동의합니다.</label>
                        </div>
                        <div class="checkbox">
                            <input type="checkbox" id="checkbox-c" checked>
                            <label for="checkbox-c">본인은 위 약관과 동의서에 대한 주요 내용을 충분히 확인하고 대출을 신청합니다.</label>
                        </div>
                    </div>
                    <!-- //240318 ux라이팅 수정 -->
                    <!-- 240326 재검토 -->
                    <p class="agree-message-2">
                        약관 및 상품 주요 설명, 개인(신용)정보 수집·이용·제공에 관한 사항 및 유의사항과 중요사항을 충분히 읽고 확인한 후 금융상품에 가입합니다.
                    </p>
                </div>
                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <!-- 240318 ux라이팅 수정 -->
                            <ul class="ul -bullet">
                                <li>수입인지세 : 대출금이 5,000만원을 초과하면 대출금 구간에 따라 차등 부과됩니다. 고객님과 은행이 각각 50%씩 부담합니다.</li>
                            </ul>
                            <!-- //240318 ux라이팅 수정 -->
                        </div>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE]필수 동의, 금융상품 중요사항 확인 및 하단 체크박스 모두 선택해야 다음 버튼 활성화(선택 동의 제외) -->
                        <button type="button" class="button -lg -primary" disabled>다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
