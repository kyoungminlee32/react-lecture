<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">
</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <!-- 240326 재검토 -->
                    <h1 class="title">대출신청내역 조회</h1>
                    <!-- // 240326 재검토 -->

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <!-- 240201 코드 수정 -->
                    <div class="accounts-box">
                        <!-- 240408 코드 위치 변경 -->
                        <div class="h2-group">
                            <h2 class="h2">대출 신청내역을 확인해 주세요</h2>
                            <p class="desc">비대면으로 3개월 이내 신청한 내역입니다.</p>
                        </div>
                        <!-- // 240408 코드 위치 변경 -->
                        <div class="accounts">
                            <div class="account">
                                <div data-bankcode="011" class="info">
                                    <span class="name">
                                        <span>NH아낌e-보금자리론</span>
                                    </span>
                                    <span class="account-number">
                                        <span>NH농협은행</span>
                                        <span>302-1234-5678-81</span>
                                    </span>
                                </div>

                                <div class="case-wrap -sm">
                                    <!-- 2024-05-10 항목 현행화 -->
                                    <dl class="dl">
                                        <div>
                                            <dt>신청일</dt>
                                            <dd>2023.10.04</dd>
                                        </div>
                                        <div>
                                            <dt>희망 관리점</dt>
                                            <dd>서대문지점(02-1234-5678)</dd>
                                        </div>
                                        <div>
                                            <dt>대출신청금액</dt>
                                            <dd>200,000,000원</dd>
                                        </div>
                                        <div>
                                            <!-- 240312 ux라이팅 수정 -->
                                            <dt>진행 상태</dt>
                                            <!-- //240312 ux라이팅 수정 -->
                                            <dd>약관/설명서/정보제공동의</dd>
                                        </div>
                                        <!-- <div>
                                            <dt>대출잔액</dt>
                                            <dd>150,000,000원</dd>
                                        </div>
                                        
                                        <div>
                                            <dt>대출금리</dt>
                                            <dd>4.8%</dd>
                                        </div>
                                        
                                        <div>
                                            <dt>만기일</dt>
                                            <dd>2033.10.04</dd>
                                        </div> -->
                                    </dl>
                                    <!-- 2024-05-10 항목 현행화 -->

                                    <div class="fit-buttons -right">
                                        <!-- 240326 재검토 -->
                                        <button type="button" class="button -fit -sm">대출 진행 현황 확인</button>
                                        <!-- // 240326 재검토 -->
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="more-button">더보기(1/50)</button>
                    </div>

                    <!-- [CASE]대출신청 내역 없는 경우 -->
                    <div class="result -sm">
                        <!-- 240408 ux라이팅 수정 -->
                        <p class="message">대출신청 내역이 없습니다.</p>
                    </div>
                    <!-- //[CASE]대출신청 내역 없는 경우 -->

                    <!-- //240201 코드 수정 -->
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
