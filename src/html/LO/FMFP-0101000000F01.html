<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>공무원을 위한 대출</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">타이틀</h1>

                    <div class="funcs">
                        <button type="button" class="func -home"><span class="hide">홈</span></button>
                        <button type="button" class="func -menu"><span class="hide">전체메뉴</span></button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="product-detail-wrap -gate-type">
                        <!-- 상품 안내 영역 -->
                        <div class="procuct-summary">
                            <div class="info-area">
                                <div class="title-area">
                                    <p class="top-para">한 번에 편하게 제안드립니다.</p>   <!-- 240320 ux 라이팅 수정 --> 
                                    <h2>공무원을 위한 신용대출</h2>
                                </div><!-- //.title-area -->
                                
                                <div class="subtitle-area">
                                    <div class="product-cost-area">
                                        <div class="inner -other">
                                            <dl>
                                                <dt>최대한도</dt>
                                                <dd class="point">3억원</dd>
                                            </dl>
                                            <dl>
                                                <dt>최저</dt>
                                                <dd class="point">4.86%</dd>
                                                <dd class="cost-para">yyyy.mm.dd기준</dd>
                                            </dl>
                                        </div>
                                    </div>
                                </div><!-- //.subtitle-area -->
                            </div><!-- //.info-area -->

                            <!-- 비주얼영역 애니메이션 있는 경우  jsDetailAni 클래스 추가 -->
                            <ul class="product-visual-list">
                                <li class="FMFP-0101000000F01_1">
                                    <div class="inner">
                                        <h3>공무원 전용 비대면 즉시대출<br>한 번에 간편하게</h3>
                                    </div>
                                </li>
                            </ul>

                            <div class="loan-condition">
                                <p class="top-para">공무원 대출이 드리는<br>특별혜택 3가지</p>
                                <ul class="offical-benefit-list">
                                    <li class="benefit-01">
                                        <div class="benefit-item">
                                            <div class="benefit-flag">혜택 1</div>
                                            <div class="subject">든든한 한도 최대 3억</div>
                                        </div>
                                    </li>
                                    <li class="benefit-02">
                                        <div class="benefit-item">
                                            <div class="benefit-flag">혜택 2</div>
                                            <div class="subject">합리적인 우대금리 최고 1.0%</div>   <!-- [240617]텍스트 변경 -->
                                        </div>
                                    </li>
                                    <li class="benefit-03">
                                        <div class="benefit-item">
                                            <div class="benefit-flag">혜택 3</div>
                                            <div class="subject">간편한 절차 비대면 즉시대출</div>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                        </div><!-- //.procuct-summary -->
                        <!-- //상품 안내 영역 -->

                        <div class="product-gate-list -border-type">
                            <div class="shortcut">
                                <ul>
                                    <li><a href="javascript:void(0)">NH공무원대출</a></li>
                                    <li><a href="javascript:void(0)">e-채움공무원가계자금대출</a></li>
                                </ul>
                            </div>
                        </div>

                        
                    </div><!-- //.product-detail-wrap -->
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <!-- <button type="button" class="button -lg">취소</button> -->
                        <button type="button" class="button -lg -primary">신청하기</button>   <!-- 통테 ux-라이팅 반영 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>

</html>
