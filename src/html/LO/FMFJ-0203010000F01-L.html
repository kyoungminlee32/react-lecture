<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">
</head>
<body>
    <div id="layer" class="layer" aria-labelledby="coupon-head" role="region">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">대출금리를 확인해 주세요</h1>
                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>
            <div class="contents">
                <div class="content">
                    <!-- 240110 dl 전체 변경 -->
                    <dl class="dl -box limit-point-box">
                        <div>
                            <dt>대출금액</dt>
                            <dd>150,000,000원</dd>
                        </div>
                        <!-- 240112 dd_doojul 클레스 추가 -->
                        <div class="dd_doojul">
                            <dt>대출금리</dt>
                            <!-- 240117 limit-point > span 추가-->
                            <dd class="limit-point"><span>5.80%</span><div>(MOR 12개월, 2023.08.10기준)</div></dd>
                        </div>
                    </dl>
                    <dl class="dl case-box">
                        <div>
                            <dt>기준금리</dt>
                            <!-- 240311 +삭제 -->
                            <dd>2.20%</dd>
                        </div>
                        <div>
                            <dt>가산금리</dt>
                            <!-- 240311 +삭제 -->
                            <dd>1.90%</dd>
                        </div>
                        <div>
                            <dt>우대금리</dt>
                            <dd>-0.50%</dd>
                        </div>
                        <div class="case">
                            <dt>신용(체크)카드(3개월) 50만원 이상</dt>
                            <dd>0.20%</dd>
                        </div>
                        <div class="case">
                            <dt>급여이체(매월) 50만원 이상</dt>
                            <dd>0.20%</dd>
                        </div>
                        <div class="case">
                            <dt>자동이체(매월) 3건 이상</dt>
                            <dd>0.10%</dd>
                        </div>
                        <div class="case">
                            <dt>단기변동금리(1년 이하)</dt>
                            <dd>0.10%</dd>
                        </div>
                        <div class="case">
                            <dt>농업인우대</dt>
                            <dd>0.10%</dd>
                        </div>
                        <div class="case">
                            <dt>보증서담보(서울보증보험 제외)</dt>
                            <dd>0.20%</dd>
                        </div>
                    </dl>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Layer.open('layer');

        // 레이어 닫기(마지막 인자 기본값: false)
        // Layer.close('layer', function() {
        //     '콜백함수'
        // });

        // 레이어 닫기 + DOM 삭제
        // Layer.close('layer', function() {
        //     '콜백함수'
        // }, true);
    </script>
</body>

</html>
