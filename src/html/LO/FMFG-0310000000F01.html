<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>예상금리 확인</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출한도 조회</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">예상금리를 확인해 주세요</h2>
                    </div>
                    <dl class="dl -bordered case-box4">
                        <!-- ux라이팅 수정 240307 -->
                        <span class="title">주택금융공사(일반 대출)</span>
                        <!-- //ux라이팅 수정 240307 -->
                        <div>
                            <!-- 240307 ux라이팅 수정 -->
                            <dt>가능금액</dt>
                            <dd>7,000만원</dd>
                            <!-- //240307 ux라이팅 수정 -->
                        </div>
                        <div>
                            <dt>예상금리</dt>
                            <dd>1.92%</dd>
                        </div>
                        <div>
                            <dt>예상 보증료 (고객 부담금)</dt>
                            <dd>15만원</dd>
                        </div>
                    </dl>
                    <!-- 240429 문구 추가 -->
                    <p class="message">실제 적용금리는 대출 실행일에 확정됩니다.</p>
                    <!-- //240429 문구 추가 -->
                    <div class="field">
                        <!-- 240110 ux라이팅 수정 -->
                        <label for="text" class="label">대출 신청금액</label>
                        <!-- //240110 ux라이팅 수정 -->
                        <div class="mix">
                            <div class="text -won">
                                <!-- 231205 value값 수정 -->
                                <input type="tel" id="text" class="right num-call" value="700,000,000"
                                    aria-haspopup="true" readonly>
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="info right point">칠억원</p>
                            </div>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">대출기간</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">26개월</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">기준금리</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">변동금리 (MOR 6개월)</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">대출용도</p>
                        <!-- 231229 readonly 삭제 -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">대출상환</button>
                        </div>
                        <!-- //231229 readonly 삭제 -->
                    </div>
                    <div class="field">
                        <label for="bbss" class="label">상환방법</label>
                        <!-- 231229 select => text 변경 -->
                        <div class="text">
                            <input type="text" id="bbss" readonly value="일시상환">
                        </div>
                        <!-- //231229 select => text 변경 -->
                    </div>
                    <!-- 240214 버튼 추가 -->
                    <div class="case-wrap -sm">
                        <!-- 2024-06-10 클래스(-secondary) 추가 (DFCT-2024-0000009543) -->
                        <button type="button" class="button -lg -secondary">나의 예상금리 알아보기</button>
                        <!-- //2024-06-10 클래스(-secondary) 추가 (DFCT-2024-0000009543) -->
                    </div>
                    <!-- //240214 버튼 추가 -->
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
