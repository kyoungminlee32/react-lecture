<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>약관 동의</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출기한연기</h1>

                    <!-- 240425 헤더 수정 -->
                    <div class="funcs">
                        <button type="button" class="func -home"><span class="hide">홈</span></button>
                        <button type="button" class="func -menu"><span class="hide">전체메뉴</span></button>
                    </div>
                    <!-- //240425 헤더 수정 -->
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">
                            약관 및 동의서를 확인해 주세요
                        </h2>
                    </div>
                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="required-total01">
                                <label for="required-total01">[필수] 전체 동의</label>
                            </div>
                            <button type="button" class="more"><span class="hide">필수 전체 동의 약관</span></button>
                        </div>
                        <div class="panel">
                            <div class="checkboxes -full">
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required1">
                                    <label for="required1">은행여신거래기본약관(가계용)</label>
                                    <button type="button" class="more"><span class="hide">은행여신거래기본약관(가계용)</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required3">
                                    <label for="required3">개인(신용)정보수집이용제공동의서</label>
                                    <button type="button" class="more"><span class="hide">개인(신용)정보수집이용제공동의서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required2">
                                    <label for="required2">개인(신용)정보조회동의서</label>
                                    <button type="button" class="more"><span class="hide">개인(신용)정보조회동의서</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required6">
                                    <label for="required6">공공마이데이터개인(신용)정보수집이용제공필수적동의서(전체)(여신거래용)</label>
                                    <button type="button" class="more"><span class="hide">공공마이데이터개인(신용)정보수집이용제공필수적동의서(전체)(여신거래용)</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required7">
                                    <label for="required7">행정기관 개인(신용)정보 수집이용동의서(필수)</label>
                                    <button type="button" class="more"><span class="hide">행정기관 개인(신용)정보 수집이용동의서(필수)</span></button>
                                </div>
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required8">
                                    <label for="required8">행정기관 개인(신용)정보 조회 위임동의서</label>
                                    <button type="button" class="more"><span class="hide">행정기관 개인(신용)정보 조회 위임동의서</span></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <p class="agree-message-2">
                        본인은 위 동의서에 대한 주요내용을 충분히 확인하고 정보조회에 동의합니다.
                    </p>

                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE]필수 항목을 선택후 활성화 -->
                        <button type="button" class="button -lg -primary" disabled>다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
