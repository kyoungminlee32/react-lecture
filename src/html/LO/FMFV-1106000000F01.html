<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청정보확인</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">
                        <h2 class="h2">보증서 발급정보를 확인해 주세요</h2>
                    </div>
                    <dl class="dl -box case-box2">
                        <div>
                            <!-- 240206 ux라이팅 수정 -->
                                <dt>사업자등록번호</dt>
                                <!-- 240206 ux라이팅 수정 -->
                            <dd>000-00-00000</dd>
                        </div>
                        <div>
                            <dt>기업체명</dt>
                            <dd>농협카페</dd>
                        </div>
                        <div>
                            <dt>대표자명</dt>
                            <dd>김농협</dd>
                        </div>
                        <div>
                            <!-- 240129 ux라이팅 수정 -->
                            <dt>대출 예정금액</dt>
                            <!-- //240129 ux라이팅 수정 -->
                            <dd>20,000,000원</dd>
                        </div>
                        <div>
                            <dt>신용보증원금</dt>
                            <dd>20,000,000원</dd>
                        </div>
                        <div>
                            <dt>발급일자</dt>
                            <dd>2023.10.31</dd>
                        </div>
                        <div>
                            <dt>보증기한</dt>
                            <dd>2025.00.00</dd>
                        </div>
                    </dl>
                    <!-- 240108 case-wrap 코드 변경 -->
                    <div class="case-wrap -sm">
                        <button type="button" class="button -lg">보증서 발급 확인</button>

                        <!-- [CASE] [보증서 발급 확인] 버튼 선택 시 노출 -->
                        <!-- <button type="button" class="button -lg">보증서 발급 완료</button> -->
                        <!-- // [CASE] [보증서 발급 확인] 버튼 선택 시 노출 -->
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
