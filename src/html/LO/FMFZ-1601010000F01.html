    <div class="page">

                    <h1 class="title">대출신청</h1>

                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">
                        <h2 class="h2">유효한 확약서를 선택해 주세요</h2>
                    </div>

                        <li>고객님의 유효한 확약정보를 확인해 주세요</li>

                        <li>대출금액, 금리, 기간, 상환방법, 유효기간에 대한 정보가 한국주택금융공에서 고객에게 문자로 발송됩니다.</li>
                        <li>비대면에서 신청 가능한 대출은 대출 유효기간으로 부터 10영업일 이내 입니다.</li>  <!-- [240829]추가 -->
