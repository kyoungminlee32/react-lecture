<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청정보확인</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">
                        <!-- 231214 h2 문구 수정 -->
                        <!-- 240126 ux라이팅 수정 -->
                        <h2 class="h2">대출 신청정보를 확인해 주세요</h2>
                        <!-- //240126 ux라이팅 수정 -->
                    </div>
                    <div class="limit-point-box">
                        <p class="p">대출 가능금액 <span class="limit-point bk">2,000만원</span></p>
                        <!-- 240117 limit-point > span 추가 -->
                        <!-- <p class="p">대출금리 <a href="javascript:void(0)" class="limit-point detail -arrow"><span>2.52%</span><span>(3개월 MOR+1.64%, 2023.10.31 기준)</span></a></p> -->
                        <!-- ui수정 240122  -->
                        <p class="p">대출금리 <span class="limit-point detail">2.52%</span></p>
                        <!-- //ui수정 240122  -->
                    </div>
                    
                    <div class="case-wrap -xs"><!-- ui수정 240122 (클래스명 변경)  -->
                        <dl class="dl -box case-box2">
                            <div>
                                <dt>대출기간</dt>
                                <dd>OO년</dd>
                            </div>
                            <div>
                                <!-- 240105 UX라이팅 수정 -->
                                <dt>상환방법</dt>
                                <!-- //240105 UX라이팅 수정 -->
                                <dd>O년 거치/O년 OO균등분할</dd>
                            </div>
                            <div>
                                <dt>원금/이자 납입주기</dt>
                                <dd>O월</dd>
                            </div>
                            <div>
                                <dt>상환일</dt>
                                <dd>25일</dd>
                            </div>
                            <div>
                                <dt>대출용도</dt>
                                <dd>운전자금</dd>
                            </div>
                            <div>
                                <!-- 240129 UX라이팅 수정 -->
                                <dt>이자 납입계좌</dt>
                                <!-- //240129 UX라이팅 수정 -->
                                <dd>000-0000-00-00</dd>
                            </div>
                        </dl>
                    </div>

                    <!-- ui수정 240122 (위치 이동)  -->
                    <div class="field">
                            <!-- 240318 ux라이팅 수정 -->
                        <p class="label">기준금리</p>
                            <!-- 240318 ux라이팅 수정 -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">3개월 MOR</button>
                        </div>
                    </div>
                    <div class="case-wrap -xxs">
                        <button type="button" class="button -lg">원리금상환 예상액 확인</button>
                    </div>
                    <!-- ui수정 240122 (위치 이동)  -->

                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
