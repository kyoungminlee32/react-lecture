<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">대출신청에 필요한 기본정보를 입력해 주세요</h2>
                    </div>
                    
                    <div class="field">
                        <!-- 240110 ux라이팅 수정 -->
                        <label for="text" class="label">대출 신청금액</label>
                        <!-- //240110 ux라이팅 수정 -->
                        <div class="mix">
                            <div class="text -won">
                                <input type="tel" id="text" class="right num-call" value="30,000,000" aria-haspopup="true" readonly>
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="info right point">삼천만원</p>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <p class="label">부가세/면세 대상 여부</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">부가세사업자</button>
                        </div>
                    </div>

                    <!-- ui수정 240513 -->
                    <div class="field">
                        <p class="label">신청보증재단
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <span class="panel">
                                    <span class="t-content">
                                        - 지역신용보증재단 선택 시 사업장 주소지 재단으로 선택해 주세요.<br>
                                        재단 오류 선택 시 보증신청이 제한될 수 있습니다.<br>
                                        예시) 사업장 주소  기준 선택 방법<br>
                                        서울특별시 중구 충정로 → ‘서울지역보증재단’<br>
                                        세종시는 ‘충남지역보증재단’을 선택하세요.
                                    </span>
                                </span>
                            </span>
                        </p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">OO신용보증재단</button>
                        </div>
                    </div>
                    <!-- // ui수정 240513 -->
                    
                    <!-- 240129 코드 추가 -->
                    <div class="field">
                        <div class="label">
                            <label for="search01">권유직원</label>
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <span class="panel">
                                    <span class="t-content">
                                        상품가입에 도움을 준 직원번호(숫자 8자리)를 “권유 직원 조회”로 검색하실 수 있습니다.
                                    </span>
                                </span>
                            </span>
                        </div>
                        <div class="box-radios -point">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color03" id="period-point-color1-03" checked>
                                <label for="period-point-color1-03">등록함</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color03" id="period-point-color1-04" >
                                <label for="period-point-color1-04">등록 안함</label>
                            </div>
                        </div>
                        <!-- [CASE] 등록 -->
                        <div class="text-wrap">
                            <div class="mix">
                                <div class="text">
                                    <input type="text" class="left-side fake-readonly" data-id="search01" value="%검색직원명(Num)%" title="희망 관리점" readonly>
                                </div>
                                <div class="space -lined search">
                                    <button type="button" class="icon-button -search" aria-haspopup="true"><span class="hide">조회</span></button>
                                </div>
                            </div>
                        </div>
                        <!-- //[CASE] 등록 -->
                    </div>
                    <div class="field">
                        <label for="search03" class="label">희망 관리점</label>
                        <div class="mix">
                            <div class="text">
                                <input type="text" class="left-side fake-readonly" id="search03" value="희망 관리점 찾기" title="희망 관리점" readonly>
                            </div>
                            <div class="space -lined search">
                                <button type="button" class="icon-button -search" aria-haspopup="true"><span class="hide">조회</span></button>
                            </div>
                        </div>
                        <p class="message">방문할 수 있는 영업점을 선택해 주세요. (대기업RM센터 제외)</p>
                    </div> 
                    <!-- //240129 코드 추가 -->
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
