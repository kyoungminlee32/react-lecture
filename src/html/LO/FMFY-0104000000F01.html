<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청 정보 입력_바닥 페이지</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">
                        <h2 class="h2">대출 신청정보를 입력해 주세요</h2>
                    </div>
                    <dl class="dl -box -row -w50">
                        <div>
                            <dt>대출한도</dt>
                            <dd>3,500만원</dd>
                        </div>
                        <div>
                            <dt>국가보훈대상</dt>
                            <dd class="point">제대군인</dd>
                        </div>
                    </dl>
                    <div class="field">
                        <!-- 240110 ux라이팅 수정 -->
                        <label for="text" class="label">대출 신청금액</label>
                        <!-- //240110 ux라이팅 수정 -->
                        <div class="mix">
                            <div class="text -won">
                                <!-- 231205 value값 수정 -->
                                <input type="tel" id="text" class="right num-call" value="700,000,000" aria-haspopup="true" readonly>
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="info right point">칠억원</p>
                            </div>
                        </div>
                    </div>
                    <!-- [CASE] 에러 -->
                    <!-- <div class="field -error">
                        <label for="text" class="label">대출 신청금액</label>
                        <div class="mix">
                            <div class="text -won" data-clear="false">
                                <input type="tel" id="tt123" class="right num-call" value="70000000" aria-haspopup="true" readonly>
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="message">한도안내 or 한도체크값 출력 / 입력 오류 알림 내용 출력</p>
                            </div>
                        </div>
                    </div> -->
                    <!-- //[CASE] 에러 -->
                    <div class="field">
                        <p class="label">상환방법</p>
                        <div class="select">
                            <button type="button" readonly>원금균등분할상환</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">이자 납입일</p>
                        <div class="select">
                            <button type="button" readonly>매월 dd일</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">대출 만기일</p>
                        <div class="select">
                            <button type="button" readonly>yyyy.mm.dd</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">대출금 입금계좌(이자 납입계좌)</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                </div>
                            </button>
                        </div>
                    </div>

                    <div class="field">
                        <p class="label">자금 용도</p>   <!-- ux 라이팅 수정 --> 
                        <div class="select">
                            <button type="button" aria-haspopup="true">자금용도 선택</button>
                        </div>
                    </div>  
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary" disabled>다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
