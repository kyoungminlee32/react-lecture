<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>약관 동의</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출한도 조회</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">
                            배우자·세대원 정보제공 동의를 <br> 진행해 주세요
                        </h2>
                    </div>
                    <div class="case-wrap">
                        <div class="h4-group">
                            <h3 class="h5">대출신청 정보</h3>
                        </div>                        
                        <dl class="dl -box">
                            <div>
                                <dt>신청인</dt>
                                <dd>김금상</dd>
                            </div>
                            <div>
                                <dt>대출상품</dt>
                                <dd>(가계일반)NH모바일아파트대출2.0</dd>
                            </div>
                        </dl>
                    </div>
                    <div class="case-wrap">
                        <div class="agree">
                            <div class="title">
                                <div class="checkbox -sm">
                                    <input type="checkbox" id="required-total01">
                                    <label for="required-total01">[필수] 전체 동의</label>
                                </div>
                                <button type="button" class="more"><span class="hide">필수 전체 동의 약관</span></button>
                            </div>
                            <div class="panel">
                                <div class="checkboxes -full">
                                    <div class="checkbox -sub">
                                        <input type="checkbox" id="required1">
                                        <label for="required1">[필수] 개인(신용)정보수집이용제공동의서</label>
                                        <button type="button" class="more"><span class="hide">약관</span></button>
                                    </div>
                                    <div class="checkbox -sub">
                                        <input type="checkbox" id="required2">
                                        <label for="required2">개인(신용)정보조회동의서</label>
                                        <button type="button" class="more"><span class="hide">개인(신용)정보조회동의서</span></button>
                                    </div>
                                    <div class="checkbox -sub">
                                        <input type="checkbox" id="required3">
                                        <label for="required3">국토교통부 주택소유확인 시스템 이용 관련 개인(신용)동의서</label>
                                        <button type="button" class="more"><span class="hide">국토교통부 주택소유확인 시스템 이용 관련 개인(신용)동의서</span></button>
                                    </div>
                                    <div class="checkbox -sub">
                                        <input type="checkbox" id="required4">
                                        <label for="required4">개인(신용)정보 수집이용 및 제공 관련 고객 권리 안내문</label>
                                        <button type="button" class="more"><span class="hide">개인(신용)정보 수집이용 및 제공 관련 고객 권리 안내문</span></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE] 동의 완료 시 버튼 활성화 -->
                        <button type="button" class="button -lg -primary" disabled>다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
