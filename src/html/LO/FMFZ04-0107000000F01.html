<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청 정보 입력_바닥 페이지</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">대출 신청정보를 입력해 주세요</h2>
                    </div>
                    <dl class="dl -box -row -w50">
                        <div>
                            <dt>대출한도</dt>
                            <dd>5,000만원</dd>
                        </div>
                        <div>
                            <dt> <a href="javascript:void(0)" class="a -arrow">대출금리</a></dt>
                            <dd class="point">4.82%</dd>
                        </div>
                    </dl>
                    <div class="field">
                        <!-- 240308 UX 라이팅 수정 -->
                        <p class="label">연금수령계좌</p>
                        <!-- // 240308 UX 라이팅 수정 -->
                        <!-- [CASE] 사고계좌 계좌 선택시 -->
                        <!-- <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                </div>
                            </button>
                        </div> -->

                        <!-- 2024-05-27 계좌 선택으로 변경 -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                </div>
                            </button>
                        </div>
                        <!-- //2024-05-27 계좌 선택으로 변경 -->

                        
                        <!-- <div class="account">
                            <div data-bankcode="011" class="info">
                                <span class="name">
                                    <span>주거래우대통장</span>
                                </span>
                                <span class="account-number">
                                    <span>NH농협</span>
                                    <span>111-1234-5678-99</span>
                                </span>
                            </div>
                        </div> -->
                    </div>
                    <div class="field">
                        <label for="text" class="label">대출 신청금액</label>
                        <div class="mix">
                            <div class="text -won">
                                <input type="tel" id="text" class="right num-call" value="700,000,000" aria-haspopup="true" readonly>
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="info right point">칠억원</p>
                            </div>
                        </div>
                        <!-- [CASE] 사고계좌 계좌 선택시 -->
                        <!-- <div class="mix">
                            <div class="text -won">
                                <input type="tel" id="text" class="right num-call" value="" aria-haspopup="true" placeholder="대출 신청금액 입력" disabled>
                                <div class="won">원</div>
                            </div>
                        </div> -->
                    </div>
                    <div class="field">
                        <p class="label">상환방법</p>
                        <!-- [CASE] 사고계좌 계좌 선택시 disabled -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">상환방법 선택</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">대출기간</p>
                        <!-- [CASE] 사고계좌 계좌 선택시 disabled -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">대출기간 선택</button>
                        </div>
                    </div>
                    <!-- [CASE] 만기일시상환, 마이너스대출 선택 시 --> <!-- 240326 재검토(마크업추가) -->
                    <div class="field">
                        <label for="bbss" class="label">대출기간</label>
                        <div class="text">
                            <input type="text" id="bbss" readonly value="1년">
                            <p class="info">만기일시상환, 마이너스통장의 경우 대출기간은 1년입니다.</p>
                        </div>
                    </div>
                    <!-- //[CASE] 만기일시상환, 마이너스대출 선택 시 --> <!-- 240326 재검토(마크업추가) -->
                    <div class="field">
                        <!-- 240207 p문구 수정 -->
                        <p class="label">기준금리</p>
                        <!-- [CASE] 사고계좌 계좌 선택시 disabled -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">기준금리 선택</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">이자 납입일</p>
                        <!-- [CASE] 사고계좌 계좌 선택시 disabled -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">이자 납입일 선택</button> <!-- 240326 재검토 -->
                            <p class="info">매월 말일을 원하시는 경우 31일로 지정해 주세요</p>
                        </div>
                    </div>
                    <div class="field"><!-- 240326 재검토 -->
                        <p class="label">대출금 입금계좌(이자 납입계좌)</p> 
                        <!-- [CASE] 사고계좌 계좌 선택시 disabled -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>통장(상품)명 또는 별칭</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                </div>
                            </button>
                        </div>
                        <!-- 240412 하단 문구 추가 -->
                        <!-- [CASE] 원(리)금균등분할상환 경우 -->
                        <div class="text">
                            <p class="info">대출 원리금/이자는 대출금 입금계좌에서 자동이체 됩니다. <br> 자동이체 계좌변경은  자동이체 메뉴를 이용해주시기 바랍니다.</p>
                        </div>
                        <!-- //[CASE] 원(리)금균등분할상환 경우 -->
                    </div><!-- //240326 재검토 -->
                    <!-- [CASE] 상환방법 마이너스 선택시 -->
                    <div class="field">
                        <p class="label">마이너스대출 계좌(이자 납입계좌)</p>
                        <!-- [CASE] 사고계좌 계좌 선택시 disabled -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">계좌선택</button>
                            <p class="info">대출이자는 약정계좌에서 자동이체됩니다.</p>
                        </div>
                    </div>
                    <!-- // [CASE] 상환방법 마이너스 선택시 -->
                    <div class="field">
                        <p class="label">자금용도</p>
                        <!-- [CASE] 사고계좌 계좌 선택시 disabled -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">자금용도 선택</button>
                        </div>
                    </div>
                    <!-- [CASE] 대출신청 금액이나 대출만기일을 변경할 경우 금리 재조회 버튼 활성화 -->
                    <div class="case-wrap -sm">
                        <div class="case-wrap -sm">
                            <!-- 2024-06-11 수정 -->
                            <button type="button" class="button -lg -secondary" onclick="goTopPage()">금리 다시 계산하기</button>
                            <!-- 2024-06-11 수정 -->
                        </div>
                    </div>
                    <!-- //[CASE] 대출신청 금액이나 대출만기일을 변경할 경우 금리 재조회 버튼 활성화 -->
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE]모든 항목 채워지면 활성화 -->
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
