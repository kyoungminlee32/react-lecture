<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>기혼_서민실수요자 미 대상</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 231208 h2 문구수정 -->
                    <div class="h2-group">
                        <h2 class="h2">배우자 정보를 입력해 주세요</h2>
                    </div>
                    <!-- 240306 ui 수정 -->
                    <div class="field">
                        <p class="label">기혼/미혼</p>
                        <div class="box-radios -point">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color01" id="period-point-color1-1" checked>
                                <label for="period-point-color1-1">기혼</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color01" id="period-point-color1-2">
                                <label for="period-point-color1-2">미혼</label>
                            </div>
                        </div>
                    </div>
                    <!-- //240306 ui 수정 -->
                    <div class="field">
                        <p class="label">배우자 세대분리</p>
                        <div class="box-radios -point">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color01" id="period-point-color1-1" checked>
                                <label for="period-point-color1-1">동일세대</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color01" id="period-point-color1-2">
                                <label for="period-point-color1-2">세대분리</label>
                            </div>
                        </div>
                        <!-- [231220] 박스라디오 하단 info 공통으로 맞춤 -->
                        <p class="info">세대분리의 경우 배우자 서류제출을 위해 ‘정부24’에 민간인증서나 공동인증서가 등록되어야 합니다.</p>
                    </div>
                    <div class="field">
                        <p class="label">소유구분</p>
                        <div class="box-radios -point">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color02" id="period-point-color1-3" checked>
                                <label for="period-point-color1-3">단독 명의</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color02" id="period-point-color1-4">
                                <label for="period-point-color1-4">부부 공동명의</label>
                            </div>
                        </div>
                        <!-- [231220] 박스라디오 하단 info 공통으로 맞춤 -->
                        <p class="info -bullet">배우자가 본인명의의 휴대폰을 사용하고 있어야 대출 진행이 가능합니다.</p>
                        <p class="info -bullet">부부공동명의의 경우 배우자 서류제출을 위해 정부24’, ’국세청 홈택스’에 민간인증서나 공동인증서가 등록되어야 합니다.</p>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- <button type="button" class="button -lg">취소</button> -->
                        <button type="button" class="button -lg -primary -disabled">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
