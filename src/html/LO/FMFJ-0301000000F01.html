<!DOCTYPE html>

<head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <!-- 240326 재검토 -->
                    <h1 class="title">대출신청내역 조회</h1>
                    <!-- // 240326 재검토 -->

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">담보 오피스텔의 등기필정보를 입력해 주세요</h2>
                    </div>

                    <div class="title-group">
                        <div class="inner">
                            <h4 class="h5">등기필정보</h4>
                        </div>
                        <a href="javascript:void(0)" class="a -arrow">등기필정보 입력 안내</a>                
                    </div>
                    
                    <div class="field">
                        <label for="rrn1" class="label multi-label">일련번호</label>                   
                        <div class="mix id-number">
                            <div class="text" data-clear="false">
                                <input type="tel" class="left-side num-call" id="rrn1" value="" placeholder="4자리" maxlength="4" title="첫번재 일련번호 4자리" aria-haspopup="true" readonly>
                            </div>
            
                            <div class="dash">-</div>
                            <div class="text" data-clear="false">
                                <input type="tel" class="mid-side num-call" id="rrn1" value="" placeholder="4자리" title="두번재 일련번호 4자리" maxlength="4" aria-haspopup="true" readonly>
                            </div>
                            <div class="dash">-</div>
                            <div class="text" data-clear="false">
                                <input type="tel" class="right-side num-call" data-id="rrn1" value="" placeholder="4자리" title="세번재 일련번호 4자리" maxlength="4" aria-haspopup="true" readonly>
                            </div>
                        </div>
                    </div>

                    <h4 class="h5">비밀번호</h4>
                    <p class="p">사용하지 않은 비밀번호 3개를 선택하여 입력해 주세요.</p>

                    <div class="field">
                        <label for="rrn2" class="label multi-label">비밀번호 1</label>
                        <div class="mix id-number">
                            <div class="text" data-clear="false">
                                <input type="password" class="left-side num-call" id="rrn2" value="" placeholder="숫자 2자리" title="비밀번호 앞 2자리" maxlength="2"  aria-haspopup="true" readonly>
                            </div>
            
                            <div class="dash">-</div>
            
                            <div class="text" data-clear="false">
                                <input type="password" class="right-side num-call" data-id="rrn2" value="" placeholder="숫자 4자리" title="비밀번호 뒤 4자리" maxlength="4"  aria-haspopup="true" readonly>

                    </div>

                        <div class="box-radios -point">

                                <input type="radio" name="period-point-color03" id="period-point-color1-3" checked="">

                                <input type="radio" name="period-point-color03" id="period-point-color1-4">

                            </div>

                                    <input type="tel" class="left-side num-call" id="rrn5" value="" placeholder="4자리" maxlength="4" title="첫번재 일련번호 4자리" aria-haspopup="true" readonly>

                                <div class="dash">-</div>

                            </div>

                            <p class="p">비밀번호는 사용하지 않은 것 중 3개를 선택하여 입력해 주세요.</p>
                        </div>
    
                        <div class="field">
                            <label for="rrn6" class="label multi-label">비밀번호 1</label>
                            <div class="mix id-number">
                                <div class="text" data-clear="false">
                                    <input type="password" class="left-side num-call" id="rrn6" value="" placeholder="숫자 2자리" title="비밀번호 앞 2자리" maxlength="2"  aria-haspopup="true" readonly>

                        </div>

                <div class="fixer">
