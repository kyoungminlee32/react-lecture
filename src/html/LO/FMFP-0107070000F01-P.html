<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>상환스케줄</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">

    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>
<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">상환 스케줄</h1>   <!-- ux 라이팅 수정 --> 

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <dl class="dl -box">
                        <div>
                            <dt>대출금액</dt>
                            <dd>42,000,000원</dd>
                        </div>
                        <div>
                            <dt>대출금리</dt>
                            <dd>2.95 %</dd>
                        </div>
                        <div>
                            <dt>대출기간</dt>
                            <dd>1년</dd>
                        </div>
                        <div>
                            <dt>상환방법</dt>
                            <dd>원금균등분할상환</dd>
                        </div>
                    </dl>
                    <p class="message">대출금리에 따라 월 상환금이 변경될 수 있습니다.</p>
                    <h4 class="h5">월별 상환 스케줄 상세</h4>   <!-- ux 라이팅 수정 -->                  
                    <!-- 240304 -pop추가 -->
                    <div class="table -pop">
                        <table>
                            <caption><span class="hide">회차에 따른 월별 상환 스케줄(원금, 이자, 상환금)</span></caption>   <!-- [240503]캡션 문구 수정 -->
                            <colgroup>
                                <col style="width:15%">
                                <col style="width:30%">
                                <col style="width:23%">
                                <col style="width:32%">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th scope="col">회차</th>
                                    <th scope="col">원금</th>
                                    <th scope="col">이자</th>
                                    <th scope="col">상환금</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1</td>
                                    <td>680,000</td>
                                    <td>8,000</td>
                                    <td>688,000</td>
                                </tr>
                                <tr>
                                    <td>2</td>
                                    <td>680,000</td>
                                    <td>8,000</td>
                                    <td>688,000</td>
                                </tr>
                                <tr>
                                    <td>3</td>
                                    <td>680,000</td>
                                    <td>8,000</td>
                                    <td>688,000</td>
                                </tr>
                                <tr>
                                    <td>4</td>
                                    <td>680,000</td>
                                    <td>8,000</td>
                                    <td>688,000</td>
                                </tr>

                            </tbody>
                        </table>
                    </div>

                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');
    </script>

</html>
