<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청정보확인</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">
                        <!-- 231214 h2 문구 수정 -->
                        <!-- 240126 ux라이팅 수정 -->
                        <h2 class="h2">대출 신청정보를 확인해 주세요</h2>
                        <!-- //240126 ux라이팅 수정 -->
                    </div>
                    <div class="limit-point-box">
                        <p class="p">대출 가능금액 <span class="limit-point bk">1,000만원</span></p>
                        <!-- ui 수정 240122 (코드 수정) -->
                        <p class="p">예상금리 <span class="limit-point">2.52%</span></p>
                    </div>
                    <div class="dls -box" data-role="fold">
                        <button type="button" class="more" data-role ="marker"><span>더보기</span></button>
                        <dl class="dl">
                            <div>
                                <dt>거래구분</dt>
                                <dd>일반자금 <div>(NH e사장님바로대출)</div></dd>
                            </div>
                            <div>
                                <!-- 240131 ux 라이팅 수정  -->
                                <dt>대출 신청금액</dt>
                                <!-- //240131 ux 라이팅 수정  -->
                                <dd>10,000,000원</dd>
                            </div>
                            <div data-role="hidden">
                                <dt>상환방법</dt>
                                <dd>만기일시상환</dd>
                            </div>
                            <div data-role="hidden">
                                <!-- 240307 ux 라이팅 수정  -->
                                <dt>대출 신규일</dt>
                                <!-- //240307 ux 라이팅 수정  -->
                                <dd>2023.10.16</dd>
                            </div>
                            <div data-role="hidden">
                                <!-- 240307 ux 라이팅 수정  -->
                                <dt>대출 만료일</dt>
                                <!-- //240307 ux 라이팅 수정  -->
                                <dd>2023.10.16</dd>
                            </div>
                            <div data-role="hidden">
                                <!-- 240131 ux 라이팅 수정  -->
                                <dt>예상금리</dt>
                                <!-- //240131 ux 라이팅 수정 -->
                                <dd>2.52%<div>(3개월 MOR)</div></dd>   <!-- 240326 재검토 -->
                            </div>
                            <div data-role="hidden">
                                <!-- 240318 ux라이팅 수정 -->
                                <dt>부가세/면세 대상 여부</dt>
                                <!-- //240318 ux라이팅 수정 -->
                                <dd>면세사업자</dd>
                            </div>
                            <div data-role="hidden">
                                <dt>대출금 입금계좌</dt>
                                <dd>302-1234-5678-80</dd>
                            </div>
                            <div data-role="hidden">
                                <!-- 240131 ux 라이팅 수정  -->
                                <dt>이자 납입일</dt>
                                <dd>매월 10일</dd>
                                <!-- //240131 ux 라이팅 수정  -->
                            </div>
                            <div data-role="hidden">
                                <dt>한도약정 수수료 납부방법</dt>
                                <dd>한도약정수수료</dd>
                            </div>
                            <div data-role="hidden">
                                <!-- 240131 ux 라이팅 수정  -->
                                <dt>인지세</dt>
                                <!-- //240131 ux 라이팅 수정  -->
                                <dd>75,000원</dd>
                            </div>
                            <div data-role="hidden">
                                <!-- 240131 ux 라이팅 수정  -->
                                <dt>희망 관리점</dt>
                                <!-- //240131 ux 라이팅 수정  -->
                                <dd>농협은행 불광점</dd>
                            </div>
                        </dl>
                    </div>
                    <!-- //ui 수정 240122 (코드 수정) -->
                    <div class="agree-box">
                        <!-- 240318 전자약정 삭제 -->
                        <div class="agree">
                            <div class="title">
                                <!-- 240327 -sub -readonly 추가 -->
                                <div class="checkbox -sub -readonly">
                                    <input type="checkbox" id="optional-total02">
                                    <label for="optional-total02">대출 약정서</label>   <!-- 240326 재검토 -->
                                </div>
                                <button type="button" class="more"><span class="hide">대출 약정서</span></button>
                            </div>
                        </div>
                    </div>
                    <div class="field">
                        <!-- 240131 ux 라이팅 수정  -->
                        <p class="label">계약서류 받는 방법</p>
                        <!-- //240131 ux 라이팅 수정  -->
                        <div class="box-radios -point" role="tablist">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="tab01" checked>
                                <label for="tab01">이메일</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="tab02">
                                <!-- 240119 ux라이팅 수정 -->
                                <label for="tab02">문자메시지</label>
                                <!-- //240119 ux라이팅 수정 -->
                            </div>
                        </div>
                        <!-- [CASE] id="tab01"의 콘텐트 -->
                        <!-- [에러] text -error-->
                        <div class="text">
                            <input type="text" id="field1" value="ABC123@gmail.com" title="이메일">
                            <!-- [CASE] 에러메세지-->
                            <!-- <p class="message">입력 오류 알림 내용 출력</p> -->
                            <!-- //[CASE] 에러메세지-->
                            <!-- 240318 info삭제  -->
                            <!-- <p class="info">대출 계약서류는 이메일로 보내드립니다.</p> -->
                        </div>
                        <!-- //[CASE] id="tab01"의 콘텐트 -->

                        <!-- [CASE] id="tab02"의 콘텐트 -->
                        <div class="mix">
                            <div class="select flex-3">
                                <button type="button" class="left-side" aria-haspopup="true"
                                    title="휴대폰 앞자리 선택">010</button>
                            </div>
                            <div class="text flex-7" data-clear="false">
                                <input type="tel" class="right-side num-call" placeholder="-없이 입력" title="010제외한 휴대전화번호"
                                    readonly>
                            </div>
                            <!-- [CASE] 에러메세지-->
                            <!-- <p class="message -error">입력 오류 알림 내용 출력</p> -->
                            <!-- //[CASE] 에러메세지-->
                            <!-- 240318 info삭제  -->
                            <!-- <p class="info">대출 계약서류는 문자메시지로 보내드립니다.</p> -->
                        </div>
                        <!-- //[CASE] id="tab02"의 콘텐트 -->
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">대출 신청하기</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
</body>

</html>
