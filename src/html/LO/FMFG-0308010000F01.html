<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>기타주택 검색</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출한도 조회</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                    <!-- 231229 ux라이팅 수정 -->
                        <h2 class="h2">계약서상 전세 주택 정보를<br> 입력해 주세요</h2>
                    </div>
                    <h3 class="h4">전세 주택 정보</h3>
                    <!-- //231229 ux라이팅 수정 -->
                    <!-- [CASE] 주택 검색 후 사라짐  -->
                    <div class="case-wrap -sm">
                        <button type="button" class="button -lg -secondary">전세 주택 검색</button>
                    </div>
                    <!-- //[CASE] 주택 검색 후 사라짐  -->
                    <!-- [CASE] 주택 검색 후 노출  -->
                    <div class="field">
                        <label for="text1" class="label">주택 정보</label>
                        <div class="text">
                            <input type="text" data-id="text1" readonly value="12345">
                        </div>
                        <div class="text">
                            <input type="text" data-id="text1" readonly value="서울특별시 서대문구 남가좌동">
                        </div>
                    </div>
                    <div class="field">
                        <!-- 240130 ux라이팅 수정 -->
                        <label for="text2" class="label">상세 주소</label>
                        <div class="text">
                            <input type="text" id="text2" placeholder="상세 주소 입력">
                        </div>
                        <!-- //240130 ux라이팅 수정 -->
                        <div class="info-detail">
                            <a href="javascript:void(0)" class="a -arrow">전세 주택 변경</a>
                        </div>
                    </div>
                    <!--// [CASE] 주택 검색 후 노출  -->

                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE] 상세 주소 입력 완료 후 버튼 활성화-->
                        <button type="button" class="button -lg -primary" disabled>다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
