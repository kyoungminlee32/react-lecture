<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출 추가정보 입력_대출 알림정보 설정</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">모바일대출상담신청</h1>

                    <div class="funcs">
                        <!-- <button type="button" class="func -cs"><span class="hide">상담</span></button> -->
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:8;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">
                        <h2 class="h2">비용출금 정보를 설정해 주세요</h2>
                    </div>
                    <div class="field">
                        <p class="label">대상 비용(대출 실행 시 비용이 발생할 경우)</p>   <!-- [240308]텍스트 변경 -->
                        <div class="box-radios -point">
                            <div class="box-radio -readonly">
                                <input type="checkbox" name="period-point-color01" id="period-point-color1-1" checked>
                                <label for="period-point-color1-1">수입인지세</label>
                            </div>
                            <div class="box-radio -readonly">
                                <input type="checkbox" name="period-point-color01" id="period-point-color1-2" checked>
                                <label for="period-point-color1-2">국민주택채권매입비</label>
                            </div>
                            <div class="box-radio -readonly">
                                <input type="checkbox" name="period-point-color01" id="period-point-color1-3" checked>
                                <label for="period-point-color1-3">기타 비용</label>   <!-- [240308]텍스트 변경 -->
                            </div>
                        </div>
                        <p class="info">위 비용은 상품 또는 금액에 따라 미발생 시 출금(차감)하지 않습니다.</p>
                    </div>

                    <div class="field">
                        <div class="label">
                            <label for="text01">출금 방법</label>
                            <!-- 240423 툴팁 코드 변경 -->
                            <span class="tooltip">
                                <button type="button" class="tooltip-button" aria-haspopup="true" ><span class="hide">툴팁</span></button>
                            </span>                        
                        </div>
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period1234" id="box-rdio1-4" checked>
                                <label for="box-rdio1-4">무통장 출금처리</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period1234" id="box-rdio1-5">
                                <label for="box-rdio1-5">대출금 차감</label>
                            </div>
                        </div>
                        <!-- [240404]추가 -->
                        <div class="text">
                            <p class="info">대출금 입금계좌에서 별도의 지급청구서 작성없이 무통장 출금처리</p>
                        </div>
                        <!-- //[240404]추가 -->
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE]  대출상담사 URL을 통한 유입 케이스 -->
                        <!-- <button type="button" class="button -lg -primary -disabled">확인</button> -->
                        <!-- //[CASE]  대출상담사 URL을 통한 유입 케이스 -->

                        <!-- [CASE]  선택 값(권유직원등록) 제외 모든 필수 값 채워지면 활성화 처리-->
                        <button type="button" class="button -lg -primary -disabled">다음</button>
                        <!-- //[CASE]  선택 값(권유직원등록) 제외 모든 필수 값 채워지면 활성화 처리-->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
    </script>
</body>

</html>
