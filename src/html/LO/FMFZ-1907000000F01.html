<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>담보 아파트 정보 입력_바닥페이지</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">담보오피스텔 정보를 입력해 주세요</h2>
                    </div>
                    <dl class="dl -box limit-point-box2">
                        <div>
                            <dt>오피스텔 정보</dt>
                            <dd class="brdoojul">북한산현대힐스테이트3차 <br>서울특별시 은평구 불광로122-10</dd>
                        </div>
                        <div>
                            <dt>공급/전용</dt>
                            <dd>84.9㎡/61.39㎡</dd>
                        </div>
                        <div>
                            <dt>감정가액</dt>
                            <!-- 240110 dd 코드 수정 -->
                            <dd><span>725,000,000원</span><div class="point">칠억이천오백만원</div></dd>
                        </div>
                    </dl>
                    <div class="info-detail">
                        <a href="javascript:void(0)" class="a -arrow">담보 오피스텔 변경</a>
                    </div>
                    <div class="case-wrap -sm">
                        <div class="field">
                            <label for="lab" class="label">동/호</label>
                            <div class="mix">
                                <div class="text address-1" data-clear="false">
                                    <input type="text" data-id="lab" value="102" title="동">
                                </div>
                                <div class="text address-2" data-clear="false">
                                    <input type="text" data-id="lab" value="106" title="호">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="case-wrap -sm">
                        <div class="field">
                            <label for="lab" class="label">동/호</label>
                            <div class="mix select-multi-text">
                                <div class="select">
                                    <button type="button" aria-haspopup="true">102</button>
                                </div>
                                <p class="align-middle multi">동</p>
                                <div class="select">
                                    <button type="button" aria-haspopup="true">106</button>
                                </div>
                                <p class="align-middle multi">호</p>
                            </div>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">층수</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">1층</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">담보 오피스텔</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true" readonly>보유중</button>
                        </div>
                    </div>


                    <div class="field">
                        <label for="search03" class="label -readonly">대출 용도</label>
                        <div class="text -readonly">
                            <input type="text" id="search03" value="다른 금융기관 대출상환자금 " title="대출 용도 입력" readonly>
                        </div>
                    </div>

                    <div class="field">
                        <div class="label">
                            <label for="text01">토지거래 허가구역</label>
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <span class="panel">
                                    <span class="title">토지거래 허가구역</span>
                                    <span class="t-content">
                                        <span>담보 오피스텔의 토지거래 허가구역 여부는 토지이음(www.eum.go.kr)에서 확인 가능합니다.</span>
                                    </span>
                                </span>
                            </span>
                        </div>
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" id="box-rdio1-4" checked="" name="box-radio">
                                <label for="box-rdio1-4">해당</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" id="box-rdio1-5" name="box-radio">
                                <label for="box-rdio1-5">미해당</label>
                            </div>
                        </div>
                        <p class="info">토지거래 허가구역 내 담보 오피스텔 LTV는 감정가액 X 40%를 적용합니다</p>
                    </div>


                    <div class="field">
                        <label for="datedate" class="label">대출 희망일</label>
                        <div class="mix datepicker">
                            <div class="text" data-clear="false">
                                <input type="text" class="left-side" id="datedate" value="2023.10.20" title="첫번째 날짜선택" aria-haspopup="true" readonly>
                            </div>
                            <div class="space -lined date">
                                <button type="button" class="icon-button -calendar" aria-haspopup="true"><span class="hide">달력 보기</span></button>
                            </div>
                            <p class="info">신청일 기준으로 8영업일 이후부터 2개월 이내까지 선택 가능</p>
                        </div>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE]모든 항목 채워지면 활성화 -->
                        <button type="button" class="button -lg -primary" disabled>다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
