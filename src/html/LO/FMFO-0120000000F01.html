<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>약관 동의</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출한도 조회</h1>

                    <!-- 240425 헤더 수정 -->
                    <div class="funcs">
                        <button type="button" class="func -home"><span class="hide">홈</span></button>
                        <button type="button" class="func -menu"><span class="hide">전체메뉴</span></button>
                    </div>
                    <!-- //240425 헤더 수정 -->
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="h2-group">
                        <!-- <p class="sub">보조메시지</p> -->
                        <h2 class="h2">
                            약관에 동의해 주세요
                        </h2>
                    </div>
                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="required-total01">
                                <label for="required-total01">국세청 정보 이용 동의</label>
                            </div>
                            <button type="button" class="more"><span class="hide">국세청 정보 이용 동의</span></button>
                        </div>
                        <div class="panel">
                            <!-- 231201 동의서 내용 추가 -->
                            <div class="checkboxes -full">
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required1">
                                    <label for="required1">본인은 “인터넷/스마트대출 기한연기“을 신청하기 위해 본인 공동인증서로 국세청 로그인 후 소득관련 국세청 정보(소득금액증명원)을 전자적 방식으로 조회, 제출하는 것에 대해 충분히 이해하였으며, 대출기한연기 심사에 이용하는 것에 동의합니다.</label>
                                    <button type="button" class="more"><span class="hide">약관</span></button>
                                </div>
                            </div>
                            <!-- //231201 동의서 내용 추가 -->
                        </div>
                    </div>
                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="required-total">
                                <label for="required-total">건강보험공단 정보 이용 동의</label>
                            </div>
                            <button type="button" class="more"><span class="hide">건강보험공단 정보 이용 동의</span></button>
                        </div>
                        <div class="panel">
                            <div class="checkboxes -full">
                                <div class="checkbox -sub">
                                    <input type="checkbox" id="required01">
                                    <!-- 240104 UX라이팅 수정 시작 -->
                                    <label for="required01">본인은 “인터넷/스마트대출 기한연기“을 신청하기 위해 본인 공동인증서로 건강보험공단 로그인 후 재직 관련된 건강보험공단 정보(건강보험자격득실확인정보)을 전자적 방식으로 조회, 제출하는 것에 대해 충분히 이해하였으며, 대출기한연기 심사에 이용하는 것에 동의합니다.</label>
                                    <!-- //240104 UX라이팅 수정 시작 -->
                                    <button type="button" class="more"><span class="hide">동의</span></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <p class="agree-message-2">
                        본인은 본 동의서의 내용을 이해하였으며, 신용정보 수집 · 이용 · 제공에 관한 권리 안내문에 관하여 자세히 설명을 듣고 수령하였습니다.
                    </p>
                    <!-- [CASE] 시작 -->
                    <div class="case-wrap -xxs">
                        <p class="agree-message-2">
                            NH농협은행과 대출기한연기를 함에 있어 개인(신용)정보조회동의서와 개인신용정보제공활용동의서를 이해하고 동의하십니까?
                        </p>
                    </div>
                    <!-- [CASE] 끝 -->

                </div>

                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE]필수 항목을 선택후 활성화 -->
                        <button type="button" class="button -lg -primary" disabled>다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
