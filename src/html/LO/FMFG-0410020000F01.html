<html lang="ko">

    <div class="page">
        <div class="container">
            <header class="header">

                    </div>
                    <h1 class="title">대출신청</h1>

                </div>

            <main class="contents">
                <div class="content progress-layout"> 
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                            <div class="space -lined search">

                                        <div>

                                                <p>서울시 마포구 <span class="point">합정동</span> 381-14</p>
                                            </div>
                                        </div>
                                    </button>

                                            </div>
                                        </div>
                                    </button>
                                </li>
                                <li>
                                    <button type="button" class="-sm">
                                        <div>
                                            <div class="address-txt">
                                                <p>서울시 마포구 <span class="point">합정동</span> 381-17</p>
                                            </div>
                                        </div>
                                    </button>
                                </li>
                            </ul>
                        </div>
                        <button type="button" class="more-button">더보기(1/50)</button>
                    </div>
                    <!-- //[CASE]검색결과 있는 경우 -->

                    <!-- [CASE]검색결과 없는 경우 -->
                    <div class="result -sm -sub">
                        <p class="message">검색결과가 없습니다.</p>
                        <p class="desc">
                            지역명(동,읍,면) + 번지로 검색하셨나요?<br>
                            주택 검색 시 찾는 결과가 없다면<br>
                            NH농협은행 영업점을 방문해 대면으로 진행해 주세요.
                        </p>
                    </div>
                    <!-- //[CASE]검색결과 없는 경우 -->
                </div>
            <div class="buffer" style="height:0px"></div></main>
        </div>
    </div>
