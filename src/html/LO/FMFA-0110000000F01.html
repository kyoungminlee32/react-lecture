<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>적합성 원칙 확인-대출한도 조회</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출한도 조회</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">
                        <!-- 240129 ux 라이팅 수정 -->
                        <h2 class="h2">
                            대출신청 전에<br>
                            몇 가지 정보를 확인해 주세요
                        </h2>
                        <!-- 240129 ux 라이팅 수정 -->
                    </div>
                    <div class="field-box-24">
                        <div class="field">
                            <div class="select">
                                <button type="button" aria-expanded="false" id="qus01" aria-controls="ans01">
                                    <div class="selection question">
                                        <div class="question-info">
                                            <span class="select-question">
                                                <span>대출 받는 목적을 알려주세요</span>
                                            </span>
                                            <!-- 240129 ux 라이팅 수정 -->
                                            <span class="select-answer">
                                                <span>가계 자금</span>
                                            </span>
                                            <!-- //240129 ux 라이팅 수정 -->
                                        </div>
                                    </div>
                                </button>
                            </div>
                        </div>
                        <div class="field">
                            <div class="select">
                                <button type="button" aria-expanded="false" id="qus02" aria-controls="ans02">
                                    <div class="selection question">
                                        <div class="question-info">
                                            <span class="select-question">
                                                <span>자산 규모를 알려주세요</span>
                                            </span>
                                            <span class="select-answer">
                                                <!-- 240227 ux라이팅 수정 -->
                                                <span>2,000만원 미만 ~ 5,000만원 미만</span>
                                                <!-- //240227 ux라이팅 수정 -->
                                            </span>
                                        </div>
                                    </div>
                                </button>
                            </div>
                        </div>
                        <div class="field">
                            <div class="select">
                                <button type="button" aria-expanded="false" id="qus03" aria-controls="ans03">
                                    <div class="selection question">
                                        <div class="question-info">
                                            <span class="select-question">
                                                <span>대출 받은 금액을 알려주세요</span>
                                            </span>
                                            <span class="select-answer">
                                                <!-- 240227 ux라이팅 수정 -->
                                                <span>5,000만원 미만</span>
                                                <!-- //240227 ux라이팅 수정 -->
                                            </span>
                                        </div>
                                    </div>
                                </button>
                            </div>
                        </div>
                        <div class="field">
                            <div class="select">
                                <button type="button" aria-expanded="false" id="qus04" aria-controls="ans04">
                                    <div class="selection question">
                                        <div class="question-info">
                                            <span class="select-question">
                                                <span>연 소득을 알려주세요</span>
                                            </span>
                                            <span class="select-answer">
                                                <!-- 240227 ux라이팅 수정 -->
                                                <span>2,000만원 ~ 5,000만원 미만</span>
                                                <!-- //240227 ux라이팅 수정 -->
                                            </span>
                                        </div>
                                    </div>
                                </button>
                            </div>
                        </div>
                        <div class="field">
                            <div class="select">
                                <button type="button" aria-expanded="false" id="qus05" aria-controls="ans05">
                                    <div class="selection question">
                                        <div class="question-info">
                                            <span class="select-question">
                                                <span>연 소득 대비 고정지출 비율을 알려주세요</span>
                                            </span>
                                            <!-- 240129 ux 라이팅 수정 -->
                                            <span class="select-answer">
                                                <span>연간 소득의 50%미만</span>
                                            </span>
                                            <!-- //240129 ux 라이팅 수정 -->
                                        </div>
                                    </div>
                                </button>
                            </div>
                        </div>
                        <div class="field">
                            <div class="select">
                                <button type="button" aria-expanded="false" id="qus06" aria-controls="ans06">
                                    <div class="selection question">
                                        <div class="question-info">
                                            <span class="select-question">
                                                <span>연체가 있는지 알려주세요</span>
                                            </span>
                                            <span class="select-answer">
                                                <!-- [CASE]직접입력 -->
                                                <span>있음 (농협은행 5,000,000원)</span>
                                                <!-- //[CASE]직접입력 -->
                                                <!-- <span>없음</span> -->
                                            </span>
                                        </div>
                                    </div>
                                </button>
                            </div>
                        </div>
                        <div class="field">
                            <div class="select">
                                <button type="button">
                                    <div class="selection question" aria-expanded="false" id="qus07" aria-controls="ans07">
                                        <div class="question-info">
                                            <span class="select-question">
                                                <span>신용점수를 알려주세요</span>
                                            </span>
                                            <span class="select-answer">
                                                <span>잘 모름</span>
                                            </span>
                                        </div>
                                    </div>
                                </button>
                            </div>
                        </div>
                        <div class="field">
                            <div class="select">
                                <button type="button" aria-expanded="false" id="qus08" aria-controls="ans08">
                                    <div class="selection question">
                                        <div class="question-info">
                                            <span class="select-question">
                                                <span>대출은 어떻게 갚을 예정인가요?</span> <!-- 240326 재검토 -->
                                            </span>
                                            <span class="select-answer">
                                                <span>근로소득</span>
                                            </span>
                                        </div>
                                    </div>
                                </button>
                            </div>
                        </div>
                        <div class="field">
                            <div class="select">
                                <button type="button" aria-expanded="false" id="qus09" aria-controls="ans09">
                                    <div class="selection question">
                                        <div class="question-info">
                                            <span class="select-question">
                                                <span>확인서를 어디로 받을까요?</span>
                                            </span>
                                            <span class="select-answer">
                                                <span>문자메시지 (010-2345-1234)</span>
                                            </span>
                                        </div>
                                    </div>
                                </button>
                            </div>
                        </div>
                        <div class="field mt-32">
                            <div class="checkbox -sm var-line">
                                <input type="checkbox" id="checkbox-sm">
                                <!-- 240129 ux 라이팅 수정 -->
                                <label for="checkbox-sm">
                                    신청하신 대출상품 적합 여부 확인을 위해 본인의 
                                    개인정보를 수집·이용·제공하는 것에 동의합니다.
                                </label>
                                <!-- //240129 ux 라이팅 수정 -->
                            </div>
                        </div>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- <button type="button" class="button -lg">취소</button> -->
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
