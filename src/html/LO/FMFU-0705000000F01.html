<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청정보 입력</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <!-- 240131 ux라이팅 수정 -->
                        <h2 class="h2">대출 신청정보를 입력해 주세요</h2>
                        <!-- //240131 ux라이팅 수정 -->
                    </div>
                    <dl class="dl -box">
                        <div>
                            <!-- 240126 ux라이팅 수정 -->
                            <dt>대출 가능금액</dt>
                            <!-- //240126 ux라이팅 수정 -->
                            <!-- 240326 재검토 -->
                            <dd>1억9223만7900원</dd>
                        </div>
                        <div>
                            <!-- 240326 재검토 -->
                            <dt>대출 신청금액</dt>
                            <dd class="point">1억9200만원</dd>
                            <!-- //240326 재검토 -->
                        </div>
                        <div>
                            <dt>대출금리</dt>
                            <dd>2.31%</dd>
                        </div>
                    </dl>
                    <!-- ui수정 240122 (코드 변경) -->
                    <div class="field">
                        <!-- 240126 ux라이팅 수정 -->
                        <p class="label">대출금 입금계좌(이자 납입계좌)</p>
                        <!-- //240126 ux라이팅 수정 -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                </div>
                            </button>
                        </div>
                    </div>
                    <!-- [CASE] 초기값 -->
                    <!-- <div class="field">
                        <p class="label">대출금 입금계좌(이자 납입계좌)</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">계좌선택</button>
                        </div>
                    </div> -->
                    <!-- 240219 코드 변경 -->
                    <div class="field">
                        <span class="label">대출비용 출금계좌(보증료 및 인지세)</span>
                        <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                </div>
                            </button>
                        </div>
                        <div class="info-detail">
                            <!-- 240326 재검토 -->
                            <a href="javascript:void(0)" class="a -arrow">보증료 할인 대상 안내</a>
                        </div>
                    </div>
                    <!-- //240219 코드 변경 -->
                    <div class="field">
                        <div class="data-box">
                            <!-- 240326 재검토 -->
                            <div class="data-box-title">인지세(고객부담금)</div>
                            <div class="data-box-content">75,000원</div>
                        </div>
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
