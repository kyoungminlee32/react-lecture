<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출한도 조회</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출한도 조회</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">
                        <h2 class="h2">진행 절차를 확인해 주세요</h2>
                        <p class="desc">주택금융공사 대출 심사 완료 후 신청</p>
                    </div>
                    <!-- [240313]ux 라이팅 수정 시작 -->
                    <ol class="ol -badge">
                        <li>
                            <span class="gadget">1단계</span>
                            <div class="title">대출 신청</div>
                            주택금융공사 확약서 발급 후<br>NH농협은행에서 대출 신청                        
                        </li>
                        <li>
                            <span class="gadget">2단계</span>
                            <div class="title">상담 및 심사</div>
                            대출 신청내역 확인 및 추가 서류 안내                        
                        </li>
                        <li>
                            <span class="gadget">3단계</span>
                            <div class="title">비대면 대출 약정</div>
                            약정서 , 설명서, 인터넷등기 등 비대면 약정 진행
                        </li>
                        <li>
                            <span class="gadget">4단계</span>
                            <div class="title">대출 실행</div>
                            <!-- 고객님에게 대출금 보내기 완료 --> <!-- 2024-10-31 문구 삭제 -->
                        </li>
                    </ol>
                    <!-- //[240313]ux 라이팅 수정 끝 -->
                </div>


                <div class="fixer">
                    <div class="buttons">
                        <!-- <button type="button" class="button -lg">취소</button> -->
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
