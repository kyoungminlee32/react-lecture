<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청 정보 입력_바닥 페이지</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">신용보증 약정서를 작성해 주세요</h2>
                    </div>
                    <dl class="dl -box -col">
                        <div>
                            <!-- 240326 재검토 -->
                            <dt>대출 예정금액</dt>
                            <!-- //240227 ux라이팅 수정 -->
                            <dd class="point">2천만원</dd>
                        </div>
                    </dl>
                    <div class="field">
                        <!-- 240129 ux라이팅 수정 -->
                        <label for="text" class="label">보증 신청금액</label>
                        <!-- //240129 ux라이팅 수정 -->
                        <div class="mix">
                            <div class="text -won">
                                <!-- 231205 value값 수정 -->
                                <input type="tel" id="text" class="right" value="18,000,000" aria-haspopup="true" readonly>
                                <div class="won">원</div>
                            </div>
                        </div>
                    </div>
                    <!-- 240227 보증비율 삭제 -->
                    <!-- <div class="field">
                        <label for="text" class="label">보증비율</label>

                        </div>
                    </div> -->
                    <div class="field">
                        <label for="text" class="label">대출기간</label>
                        <div class="text">
                            <input type="text" id="text" readonly value="OO년">
                        </div>
                    </div>
                    <div class="field">
                        <label for="text" class="label">상환방법</label>
                        <div class="text">
                            <input type="text" id="text" readonly value="O년 거치/O년 OO균등분할">
                        </div>
                    </div>
                    <div class="field">
                        <label for="text" class="label">원금/이자 납입주기</label>
                        <div class="text">
                            <input type="text" id="text" readonly value="O월">
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">상환일</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">선택</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">보증료</p>
                        <button type="button" class="button -lg">보증료 조회</button>                    
                    </div>
                    <!-- 240116 보증료 조회 선택시 추가 -->
                    <!-- [CASE] 보증료 조회 선택시 -->
                    <!-- ui수정 240122 (ui 수정) -->
                    <div class="field">
                        <div class="data-box">
                            <div class="data-box-title">보증료(고객부담금)</div>
                            <div class="data-box-content">37,000원</div>
                        </div>
                    </div>
                    <!-- //ui수정 240122 (ui 수정) -->
                    
                    <!-- //[CASE] 보증료 조회 선택시 -->
                    <!-- ui수정 240122 (코드 변경) -->
                    <div class="field">
                        <p class="label">보증료 출금계좌</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>

                            <button type="button" aria-haspopup="true">계좌선택</button>
                        </div>
                    </div> -->
                    <!-- //ui수정 240122 (코드 변경) -->
                    <!-- ui수정 240122 (코드 변경) -->
                    <div class="field">
                        <!-- 240129 ux라이팅 수정 -->
                        <p class="label">이자 납입계좌</p>
                        <!-- //240129 ux라이팅 수정 -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                </div>
                            </button>
                        </div>
                    </div>
                    <!-- [CASE] 초기값 -->

                        <p class="label">이자 납입계좌</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">계좌선택</button>
                        </div>
                    </div> -->
                    <!-- //ui수정 240122 (코드 변경) -->
                    <!-- ui수정 240122 (코드 변경) -->
                    <div class="field">
                        <p class="label">대출금 입금계좌</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                </div>
                            </button>
                        </div>
                    </div>

                    <!-- <div class="field">
                        <p class="label">대출금 입금계좌</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">계좌선택</button>
                        </div>
                    </div> -->

                    <!-- 240227 신용보증 약정서 추가 -->
                    <div class="agree-box">
                        <div class="agree">
                            <div class="title">
                                <div class="checkbox -sub -readonly">
                                    <input type="checkbox" id="optional-total02">
                                    <label for="optional-total02">신용보증 약정서</label>
                                </div>
                                <button type="button" class="more"><span class="hide">신용보증 약정서</span></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>

            </main>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
