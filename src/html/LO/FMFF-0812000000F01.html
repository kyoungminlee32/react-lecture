<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청정보확인</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">



</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="h2-group">
                        <!-- 240126 ux라이팅 수정 -->
                        <h2 class="h2">대출 신청정보를 확인해 주세요</h2>
                        <!-- //240126 ux라이팅 수정 -->
                    </div>
                    <div class="limit-point-box">
                        <!-- ui수정 240122 (문구 변경) -->
                        <p class="p">대출 신청금액 <span class="limit-point bk">300만원</span></p>
                        <!-- //ui수정 240122 (문구 변경) -->
                    </div>
                    <!-- 231205 case-box2클래스 추가 및 내용 변경 -->
                    <dl class="dl -box case-box2">
                        <div>
                            <!-- 240227 ux라이팅 수정 -->
                            <dt>대출 과목</dt>
                            <!-- //240227 ux라이팅 수정 -->
                            <!-- 231206 코드수정 -->
                            <dd>일반자금<div>(SOHO-가맹점주우대대출)</div></dd>
                            <!-- //231206 코드수정 -->
                        </div>
                        <div>
                            <!-- 240227 ux라이팅 수정 -->
                            <dt>대출 구분</dt>
                            <!-- //240227 ux라이팅 수정 -->
                            <dd>개별대출</dd>
                        </div>
                        <div>
                            <dt>상환방법</dt>
                            <dd>원리금균등분할상환</dd>
                        </div>
                        <div>
                            <!-- 240227 ux라이팅 수정 -->
                            <dt>자금 용도</dt>
                            <!-- //240227 ux라이팅 수정 -->
                            <dd>기타</dd>
                        </div>
                        <div>
                            <!-- 240227 ux라이팅 수정 -->
                            <dt>주거 형태</dt>
                            <!-- //240227 ux라이팅 수정 -->
                            <dd>전세</dd>
                        </div>
                        <div>
                            <dt>대출기간</dt>
                            <dd>2년6개월</dd>
                        </div>
                        <div>
                            <!-- 240227 ux라이팅 수정 -->
                            <dt>대출 희망일</dt>
                            <!-- //240227 ux라이팅 수정 -->
                            <dd>2023.10.20</dd>
                        </div>
                        <div>
                            <!-- 240227 ux라이팅 수정 -->
                            <dt>희망 관리점</dt>
                            <dd>NH농협은행 불광점</dd>
                            <!-- //240227 ux라이팅 수정 -->
                        </div>
                        <div>
                            <!-- 240227 ux라이팅 수정 -->
                            <dt>직전년도 1년간 매출금액</dt>
                            <!-- //240227 ux라이팅 수정 -->
                            <dd>1,000,000,000원</dd>
                        </div>
                        <div>
                            <!-- 240227 ux라이팅 수정 -->
                            <dt>전전년도 1년간 매출금액</dt>
                            <!-- //240227 ux라이팅 수정 -->
                            <dd>1,000,000,000원</dd>
                        </div>
                        <div>
                            <dt>사업기간</dt>
                            <dd>10년 5개월</dd>
                        </div>
                        <div>
                            <!-- 240227 ux라이팅 수정 -->
                            <dt>가맹점대금 입금계좌</dt>
                            <dd>NH농협은행 <div>302-1234-5678-82</div></dd>
                            <!-- //240227 ux라이팅 수정 -->
                        </div>
                    </dl>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE]대출 약정서‘ 선택하여 “금융상품 중요사항 이해 확인“ 팝업 페이지 > (연속팝업)전자문서 미리보기 확인 후 버튼 활성화 처리 -->
                        <button type="button" class="button -lg -primary">대출 신청하기</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
