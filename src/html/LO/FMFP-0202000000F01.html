<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">비대면 서류 제출</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">서류를 제출해 주세요</h2>
                    </div>
                    <div class="case-wrap -sm">
                        <div class="picture-wrap">
                            <div class="title">기타서류</div>
                            <div class="picture-box">
                                <button type="button" class="picture -plus">
                                    <div class="count"><span>0</span>/<span>5</span></div>
                                </button>
                                <!-- <div class="picture">
                                    <img src="" alt="">
                                    <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                                </div> -->
                                <!-- <div class="picture">
                                    <img src="" alt="">
                                    <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                                </div> -->
                                <!-- <div class="picture">
                                    <img src="" alt="">
                                    <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                                </div> -->
                                <!-- <div class="picture">
                                    <img src="" alt="">
                                    <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                                </div> -->
                                <!-- <div class="picture">
                                    <img src="" alt="">
                                    <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                                </div> -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <ul class="ul -bullet">
                                <li>고객님이 제출하시는 계약서가 허위로 작성되었거나 원본과 다를 경우 대출 진행을 할 수 없습니다.</li>
                                <li>서류는 1개월 이내 발급한 원본을 촬영하여야 하며 이미지의 글자가 잘 보이지 않는 경우 서류가 거절될 수 있습니다.</li>
                                <li>이미지 파일은 JPG, JPEG, GIF, PNG, BMP 파일 형식만 등록이 가능합니다.</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">서류 제출</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
