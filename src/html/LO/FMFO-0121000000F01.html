<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <!-- 240425 헤더 수정 -->
                    <div class="funcs">
                        <button type="button" class="func -home"><span class="hide">홈</span></button>
                        <button type="button" class="func -menu"><span class="hide">전체메뉴</span></button>
                    </div>
                    <!-- //240425 헤더 수정 -->
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">재직정보와 소득정보를 입력해 주세요</h2>
                    </div>
                    <!-- 240319 agree 추가 -->
                    <div class="agree">
                        <div class="title">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="optional-total01">
                                <label for="optional-total01">해당 기관 정보 이용 제공에 동의 <br> (국세청, 건강보험공단)</label>
                            </div>
                            <button type="button" class="more"><span class="hide">해당 기관 정보 이용 제공에 동의</span></button>
                        </div>
                    </div>
                    <div class="h4-group">
                        <h3 class="h5">재직정보</h3>
                    </div>
                    <div class="field">
                        <!-- 240318 ux라이팅 수정 -->
                        <p class="label">고용 형태</p>
                        <!-- //240318 ux라이팅 수정 -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">선택</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">근무기간</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true" readonly>0년 0개월</button>
                            <p class="info">건강보험공단에서 최근 자격득실확인내역 1건을 조회합니다. (근무기간은 직접 입력이 불가합니다.)</p>
                        </div>
                        
                    </div>
                    <div class="h4-group">
                        <h3 class="h5">소득정보</h3>
                    </div>
                    <div class="field">
                        <label for="t4" class="label">연 소득 금액</label>
                        <div class="mix">
                            <div class="text -won" data-clear="false">
                                <input type="tel" id="t4" class="right" value="70000000" readonly>
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="message">국세청 홈택스에서 소득금액증명원 상 최근 귀속년도의 소득금액 1건을 조회합니다. (연 소득 금액은 직접 입력이 불가합니다.)</p>
                            </div>
                        </div>
                    </div>   
                    <div class="h4-group">
                        <h3 class="h5">기한연기 관련정보</h3>
                    </div>
                    <dl class="dl -box">
                        <div>
                            <dt>대출 만기일</dt>
                            <dd>2025.01.25</dd>
                        </div>
                    </dl>
                    <div class="case-wrap">
                        <div class="checkbox -sm">
                            <input type="checkbox" id="checkbox-smc" checked>
                            <label for="checkbox-smc">스마트금융센터 심사결과에 따라 기한연기가 제한 되거나 대출금액 축소 및 금리가 변경될 수 있습니다</label>
                        </div>    
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE]모든 항목 채워지면 활성화 -->
                        <button type="button" class="button -lg -primary">신청</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
