<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>증빙서류제출(사진파일)</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>
                    <h1 class="title">대출신청내역조회</h1>
                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>
            <main class="contents">
                <div class="content">
                    <div class="h2-group">
                        <h2 class="h2">
                            추가 서류를 제출해 주세요
                        </h2>
                    </div>
                    <div class="picture-wrap">
                        <div class="title">[필수] 전입세대열람</div>
                        <div class="picture-box">
                            <button type="button" class="picture -plus">
                                <span>2</span>/<span>5</span>
                            </button>
                            <div class="picture">
                                <img src="/content/assets/imgs/img/loan/img-document02.png" alt="">
                                <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                            </div>
                            <div class="picture">
                                <img src="/content/assets/imgs/img/loan/img-document03.png" alt="">
                                <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                            </div>
                            <!-- <div class="picture">
                                <img src="" alt="">
                                <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                            </div> -->
                            <!-- <div class="picture">
                                <img src="" alt="">
                                <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                            </div> -->
                            <!-- <div class="picture">
                                <img src="" alt="">
                                <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                            </div> -->
                        </div>
                    </div>
                    <div class="picture-wrap">
                        <div class="title">[선택] 기타</div>
                        <div class="picture-box">
                            <button type="button" class="picture -plus">
                                <span>2</span>/<span>5</span>
                            </button>
                            <div class="picture">
                                <img src="/content/assets/imgs/img/loan/img-document02.png" alt="">
                                <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                            </div>
                            <div class="picture">
                                <img src="/content/assets/imgs/img/loan/img-document03.png" alt="">
                                <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                            </div>
                            <!-- <div class="picture">
                                <img src="" alt="">
                                <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                            </div> -->
                            <!-- <div class="picture">
                                <img src="" alt="">
                                <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                            </div> -->
                            <!-- <div class="picture">
                                <img src="" alt="">
                                <button type="button" class="cancel-btn"><span class="hide">사진 삭제</span></button>
                            </div> -->
                        </div>
                        <p class="message">희망 관리점에서 심사 시 추가로 서류를 요청할 수 있습니다.</p>
                    </div>
                </div>
                <div class="sticker">
                    <div class="notice -active" data-role="fold">
                        <button type="button" class="title" data-role="marker">알아두세요</button>
                        <div class="panel" data-role="hidden">
                            <!-- 240312 ux라이팅 수정 -->
                            <!-- 240326 재검토 -->
                            <ul class="ul -bullet">
                                <li>제출하는 서류가 허위로 작성되었거나 원본과 다르면 대출을 진행할 수 없습니다. </li>
                                <li>서류는 1개월 이내 발급한 원본을 촬영해 주세요.</li>
                                <li>사진의 글자가 잘 보이지 않으면 서류가 거절될 수 있습니다.</li>
                                <li>사진은 JPG, JPEG, GIF, PNG, BMP 파일 형식만 등록할 수 있습니다.</li>
                                <li>사진은 5장까지, 1장당 8MB 이하로 등록할 수 있습니다.</li>
                            </ul>
                            <!-- // 240326 재검토 -->
                            <!-- //240312 ux라이팅 수정 -->
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE] 서류등록이 되면 활성화 처리 -->
                        <button type="button" class="button -lg -primary" disabled>서류 제출</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script></script>
</body>

</html>
