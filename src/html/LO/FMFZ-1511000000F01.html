<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출 추가정보 입력_바닥 페이지</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">대출 신청정보와 임대인 정보를<br> 입력해 주세요</h2>   <!-- [240305]br 추가 -->
                    </div>
                    <div class="field">
                        <label for="tt12" class="label">대출 신청금액</label>
                        <div class="mix">
                            <div class="text -won" data-clear="false">
                                <input type="tel" id="tt12" class="right num-call" value="70000000" aria-haspopup="true" readonly>
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="info right point">칠억원</p>
                            </div>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">상환방법</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">혼합상환</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">임자보증금 전액 임대인에게 지급완료 후 대출신청</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">아니요</button>
                        </div>
                    </div>

                    <div class="h-group">
                        <h4 class="h5">임대인 계좌정보</h4>                    
                    </div>
                    <div class="field">
                        <p class="label">금융기관</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">KB국민은행</button>
                        </div>
                    </div>
                    <!-- 240219 코드 변경 -->
                    <div class="field">
                        <label for="tt1" class="label">계좌번호</label>
                        <div class="mix">
                            <div class="text" data-clear="false">
                                <input type="tel" id="tt1" class="right num-call" aria-haspopup="true" placeholder="계좌번호 입력" readonly>
                            </div>
                        </div>
                    </div>
                    <!-- //240219 코드 변경 -->
                    <div class="field">
                        <label for="text" class="label">예금주(임대인)</label>
                        <div class="text">
                            <input type="text" id="text" placeholder="이름 입력">
                        </div>
                        <div class="case-wrap -xxs">
                            <button type="button" class="button -lg -secondary">예금주 확인</button>
                        </div>
                    </div>

                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
