<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출희망정보 입력</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <!-- 240131 ux라이팅 수정 -->
                        <h2 class="h2">대출 희망정보를 입력해 주세요</h2>
                        <!-- //240131 ux라이팅 수정 -->
                    </div>
                    <div class="field">
                        <!-- 240131 ux라이팅 수정 -->
                        <label for="text" class="label">대출 희망금액</label>
                        <!-- //240131 ux라이팅 수정 -->
                        <div class="mix">
                            <div class="text -won">
                                <!-- 231205 value값 수정 -->
                                <input type="tel" id="text" class="right num-call" value="700,000,000" aria-haspopup="true" readonly>
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="info right point">칠억원</p>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <p class="label">상환방법</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">원금균등분할상환</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">대출기간</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">3년</button>
                        </div>
                        <!-- [CASE] 대출구분에서 마이너스통장 방식 선택 시 -->
                        <!-- <div class="select">
                            <button type="button" aria-haspopup="true">1년</button>
                            <p class="info">만기일시상환, 마이너스통장의 경우 대출기간은 1년입니다.</p>
                        </div> -->
                        <!-- //[CASE] 대출구분에서 마이너스통장 방식 선택 시 -->
                    </div>
                    <div class="field">
                        <p class="label">기준금리</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">3개월 MOR</button>
                        </div>
                    </div>
                    <div class="field">
                        <!-- 240318 ux라이팅 수정 -->
                        <p class="label">부가세/면세 대상 여부</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">면세 사업자</button>
                        </div>
                        <!-- //240318 ux라이팅 수정 -->
                    </div>
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE]모든 항목 채워지면 활성화 -->
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
