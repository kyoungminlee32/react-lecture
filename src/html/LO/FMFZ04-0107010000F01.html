<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">대출신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">대출 알림정보를 설정해 주세요</h2>
                    </div>

                    <div class="field">
                        <p class="label">대출안내장 받는 곳</p>
                        <div class="box-radios -point">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color01" id="period-point-color1-1" checked>
                                <label for="period-point-color1-1">집</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color01" id="period-point-color1-2">
                                <label for="period-point-color1-2">직장</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color01" id="period-point-color1-3">
                                <label for="period-point-color1-3">스마트뱅킹</label>
                            </div>
                        </div>
                        <div class="text-wrap">
                            <div class="text">
                                <input type="text" id="text01" value="서울특별시 은평구 서오릉로 88-12" readonly>
                            </div>
                            <div class="info-detail">
                                <a href="javascript:void(0)" class="a -arrow">내 정보 수정</a>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <div class="label">
                            <label for="text01">대출알림신청(중복선택가능)</label>
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <span class="panel">
                                    <span class="t-content">
                                        <span>
                                            대출금리 변경, 대출이자 납입일, 대출 만기일을 문자메시지 또는 이메일로 안내해 드립니다.
                                        </span>
                                    </span>
                                </span>
                            </span>
                        </div>
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="checkbox" id="box-rdio1-4" checked>
                                <label for="box-rdio1-4">문자메시지</label>
                            </div>
                            <div class="box-radio">
                                <input type="checkbox" id="box-rdio1-55">
                                <label for="box-rdio1-55">이메일</label>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <div class="label">
                            <label for="text02">권유직원</label>
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <span class="panel">
                                    <span class="t-content">
                                        <span>
                                            상품가입에 도움을 준 직원번호(숫자 8자리)를 “권유 직원 조회”로 검색하실 수 있습니다.
                                        </span>
                                    </span>
                                </span>
                            </span>
                        </div>
                        <div class="box-radios -point">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color03" id="period-point-color1-03" checked>
                                <label for="period-point-color1-03">등록</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color03" id="period-point-color1-04" >
                                <label for="period-point-color1-04">등록 안함</label>
                            </div>
                        </div>
                        <!-- [CASE] 등록 -->
                        <div class="text-wrap">
                            <div class="mix">
                                <div class="text">
                                    <input type="text" class="left-side fake-readonly" id="search01" value="%검색직원명(Num)%(%지점명%)" title="희망 관리점" readonly>
                                </div>
                                <div class="space -lined search">
                                    <button type="button" class="icon-button -search" aria-haspopup="true"><span class="hide">조회</span></button>
                                </div>
                            </div>
                        </div>
                        <!-- //[CASE] 등록 -->
                    </div>

                    <div class="field">
                        <label for="search02" class="label">희망 관리점</label>
                        <div class="mix">
                            <div class="text">
                                <input type="text" class="left-side fake-readonly" id="search02" value="농협은행 불광지점" title="희망 관리점" readonly>
                            </div>
                            <div class="space -lined search">
                                <button type="button" class="icon-button -search" aria-haspopup="true"><span class="hide">조회</span></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary -disabled">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
