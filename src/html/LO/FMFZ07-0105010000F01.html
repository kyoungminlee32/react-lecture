<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대출신청정보입력 입력 확인</title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/loan.css">


</head>

<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">모바일대출상담신청</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">대출상담 신청을 위한<br>
                            고객님의 정보를 입력해 주세요</h2>
                    </div>
                    
                    <!-- [240404]순서/마크업 변경 -->
                    <div class="field">
                        <p class="label">소득구분</p>
                        <div class="box-radios -point">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color01" id="period-point-color1-1" checked>
                                <label for="period-point-color1-1">급여소득자</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color01" id="period-point-color1-2">
                                <label for="period-point-color1-2">개인사업자</label>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label for="tex" class="label">직장명</label>
                        <div class="text">
                            <input type="text" id="tex" value="NH농협은행" placeholder="">
                        </div>
                    </div>
                    <div class="field">
                        <label for="tex" class="label">사업체명</label>
                        <div class="text">
                            <input type="text" id="tex" value="NH농협은행" placeholder="">
                        </div>
                    </div>
                    <div class="field">
                        <label for="tex" class="label">사업자등록번호</label>
                        <div class="text">
                            <input type="text" id="tex" value="123-45-67890" placeholder="">
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">사업기간</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">5년 1개월</button>
                        </div>
                        <div class="text">
                            <p class="info">사업기간 12개월 미만인 경우 대출 불가할 수 있습니다.</p>
                        </div>
                    </div>
                    <div class="field">
                        <label for="text" class="label">연간 사업소득 금액</label>
                        <div class="mix">
                            <div class="text -won">
                                <input type="tel" id="text" class="right num-call" value="70,000,000" aria-haspopup="true" readonly>
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="info right point">칠천만원</p>
                            </div>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">직업구분</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">전문직</button>
                        </div>
                    </div>
                    <!-- [CASE] 직업구분 전문직 선택시 노출 -->
                    <div class="field">
                        <p class="label">자격증</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">판사</button>
                        </div>
                    </div>
                    <!-- //[CASE] 직업구분 전문직 선택시 노출 -->
                    <div class="field">
                        <p class="label">고용형태</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">정규직</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">근무기간</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">5년 1개월</button>
                        </div>
                    </div>
                    <div class="field">
                        <label for="text" class="label">연소득 정보</label>
                        <div class="mix">
                            <div class="text -won">
                                <input type="tel" id="text" class="right num-call" value="70,000,000" aria-haspopup="true" readonly>
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="info right point">칠천만원</p>
                            </div>
                        </div>
                    </div>
                    <div class="field">
                        <!-- 240318 ux라이팅 수정 -->
                        <p class="label">주거 형태</p>
                        <!-- //240318 ux라이팅 수정 -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">아파트</button>
                        </div>
                    </div>                    
                    <div class="field">
                        <p class="label">거주지소유</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">전세</button>
                        </div>
                    </div>  
                    <!-- //[240404]순서/마크업 변경 -->                  
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <!-- [CASE]모든 항목 채워지면 활성화 -->
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>

</html>
