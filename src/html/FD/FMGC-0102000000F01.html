<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">적금 가입</h1>  <!-- [240125]텍스트 수정 --> <!-- [240207]텍스트 수정 -->

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>  
                    <!-- ux 라이팅 수정 시작 -->                    
                    <div class="h2-group mb-15"> <!-- [240111]클래스 mt-32 삭제--> 
                        <h2 class="h2">
                            외환고객정보를 입력해 주세요
                        </h2>
                    </div>
                    <p class="p">여권 영문 이름과 영문 주소를 정확하게 입력해 주세요. 입력한 내용은 해외 송금할 때도 적용됩니다. 고객정보가 정확하지 않으면 해외 송금이 늦어지거나 처리되지 않을 수 있습니다.</p>
                    <!-- //ux 라이팅 수정 끝 -->
                    <div class="case-wrap">
                        <!-- ux 라이팅 수정 시작 -->
                        <!-- [240702] 기존 셀렉트에서 인풋으로 폼 변경 -->
                        <div class="field">
                            <div class="field">
                                <label for="engname" class="label">영문 이름</label>
                                <div class="text">
                                    <input type="text" id="engname" value="" placeholder="여권 영문 이름과 동일하게 입력">
                                </div>
                            </div>
                        </div> 
                        <!-- //ux 라이팅 수정 끝 -->

                        <div class="field">
                            <p class="label">우편물 받을 곳</p>
                            <div class="box-radios -point">
                                <div class="box-radio">
                                    <input type="radio" name="period-point-color01" id="period-point-color1-01" aria-selected="true" checked="">
                                    <label for="period-point-color1-01">집</label>
                                </div>
                                <div class="box-radio">
                                    <input type="radio" name="period-point-color01" id="period-point-color1-02" aria-selected="true">
                                    <label for="period-point-color1-02">직장</label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="field">
                            <label for="search01" class="label">영문 주소</label>  <!-- ux 라이팅 수정 -->
                            <div class="mix">
                                <div class="text">
                                    <input type="text" class="left-side fake-readonly" id="search01" value="120, Tongil-ro, Jung-gu, Seoul, Republic" aria-haspopup="true" readonly>
                                </div>
                                <div class="space -lined search">
                                    <button type="button" class="icon-button -search" aria-haspopup="true"><span class="hide">조회</span></button>
                                </div>
                            </div>
                            <div class="text">
                                <input type="text" id="search02" title="영문 상세 주소" value="NONGHYUP BANK">
                            </div>
                        </div>

                        <div class="field">
                            <label for="text" class="label">외환거래법 거주성 선택 
                                <span class="tooltip">
                                    <button type="button" class="tooltip-button" aria-haspopup="true" ><span class="hide">툴팁</span></button>
                                </span>
                            </label>
                            <div class="select">
                                <button type="button" aria-haspopup="true" aria-haspopup="true">거주자</button>
                            </div>
                        </div> 
                        
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
