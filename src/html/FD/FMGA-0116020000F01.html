<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <main class="contents">
                <div class="content">
                    <div class="left">
                        <img src="/content/assets/imgs/img/utility/ico-resultconfirm.png" style="width:16.8rem" alt="가입 완료 이미지">
                    </div>                    
                    <div class="h1-group">
                        <h2 class="h1">
                            NH트래블리 외화예금<br>가입을 완료했어요
                        </h2>
                    </div>
                    
                    <dl class="dl -box">
                        <div>
                            <dt>계좌번호</dt>
                            <dd>
                                <button type="button" class="button copy-btn">&계좌번호&
                                    <span class="hide">계좌번호 복사하기</span>
                                </button>
                            </dd>
                        </div>
                        <div>
                            <dt>가입일</dt>
                            <dd>&YYYY.MM.DD&</dd>
                        </div>
                    </dl>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg">확인</button>
                        <button type="button" class="button -lg -primary">체크카드 만들기</button>
                    </div>
                </div>

                <!-- 토스트팝업은 -active 클래스 사용하여 실행합니다 -->
                <div class="toast" role="alert" aria-live="assertive">
                    <div class="message">
                        <p>계좌번호가 복사 되었습니다.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
