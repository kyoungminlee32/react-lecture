<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div id="layer" class="layer dimWhiteLayer"> <!-- [231221]dimWhiteLayer 클래스 추가 -->
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">통화를 선택해 주세요</h1>

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="options">
                        <ul>
                            <li>
                                <button type="button" class="option -active">
                                    <div class="exchange">
                                        <span data-countrycode="001" class="-md">
                                            <span>USD(미국 달러)</span>
                                        </span>
                                    </div>
                                </button>
                            </li>
                            <li>
                                <button type="button" class="option">
                                    <div class="exchange">
                                        <span data-countrycode="002" class="-md">
                                            <span>JPY(일본 엔)</span>
                                        </span>
                                    </div>
                                </button>
                            </li>
                            <li>
                                <button type="button" class="option">
                                    <div class="exchange">
                                        <span data-countrycode="003" class="-md">
                                            <span>EUR(유럽연합 유로)</span>
                                        </span>
                                    </div>
                                </button>
                            </li>
                            <li>
                                <button type="button" class="option">
                                    <div class="exchange">
                                        <span data-countrycode="005" class="-md">
                                            <span>GBP(영국 파운드) </span>
                                        </span>
                                    </div>
                                </button>
                            </li>
                            <li>
                                <button type="button" class="option">
                                    <div class="exchange">
                                        <span data-countrycode="007" class="-md">
                                            <span>CAD(캐나다 달러)</span>
                                        </span>
                                    </div>
                                </button>
                            </li>
                            <!-- [231208]추가 -->
                            <li>
                                <button type="button" class="option">
                                    <div class="exchange">
                                        <span data-countrycode="010" class="-md">
                                            <span>AUD(호주 달러)</span>
                                        </span>
                                    </div>
                                </button>
                            </li>
                            <li>
                                <button type="button" class="option">
                                    <div class="exchange">
                                        <span data-countrycode="019" class="-md">
                                            <span>NZD(뉴질랜드 달러)</span>
                                        </span>
                                    </div>
                                </button>
                            </li>
                            <li>
                                <button type="button" class="option">
                                    <div class="exchange">
                                        <span data-countrycode="006" class="-md">
                                            <span>CHF(스위스 프랑)</span>
                                        </span>
                                    </div>
                                </button>
                            </li>
                            <li>
                                <button type="button" class="option">
                                    <div class="exchange">
                                        <span data-countrycode="008" class="-md">
                                            <span>HKD(홍콩 달러)</span>
                                        </span>
                                    </div>
                                </button>
                            </li>
                            <li>
                                <button type="button" class="option">
                                    <div class="exchange">
                                        <span data-countrycode="017" class="-md">
                                            <span>SGD(싱가포르 달러)</span>
                                        </span>
                                    </div>
                                </button>
                            </li>

                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Layer.open('layer');
    </script>
</body>
</html>
