<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/deposit.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">적금 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>                      
                    <div class="h2-group">                        
                        <h2 class="h2"> 
                            자동이체를 신청하시겠어요? 
                        </h2>
                    </div>
                    <div class="field">
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-1">
                                <label for="period-point-color1-1">신청함</label> 
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-2" checked="">
                                <label for="period-point-color1-2">신청 안함</label>
                            </div>
                        </div>
                        <p class="info">자동이체 신청 안내
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <span class="panel">
                                    <span class="title">자동이체 신청 안내</span>
                                    <span class="t-content">
                                        <span class="dot">자동이체 주기가 매일인 경우 자동이체 시작일은 익일로 자동 세팅됩니다.</span>
                                        <span class="dot">자동이체주기가 매주인 경우 자동이체 시작일은 해당 요일이 도래하는 가장 빠른 날짜로 세팅됩니다.</span>
                                        <span class="dot">자동이체 주기가 매월인 경우 익월 해당 일자로 자동 세팅됩니다.</span>
                                        <span class="dot">자동이체일이 토요일/공휴일이면 다음 날(영업일 기준)에 출금됩니다.</span>
                                    </span>
                                </span>
                            </span>
                        </p>
                    </div>
                    <div class="case-wrap">
                        <!-- [CASE]자동이체 신청 -->
                        <div class="field">   
                            <p class="label">자동이체 금액</p>                              
                            <div class="mix">
                                <div class="left-space flex-2">
                                    <div class="left-side" aria-haspopup="true" title="통화 선택"><span>JPY</span></div>   <!-- 통테 ux-라이팅 반영 -->   <!-- [240521]텍스트 변경 -->
                                </div>
                
                                <div class="text flex-8" data-clear="false">
                                    <input type="tel" class="right-side num-call right" id="phonen01" placeholder="1,000 이상" value="14,892" aria-haspopup="true" readonly>
                                </div>
                            </div>
                        </div>
                        
                        <!-- [240130]삭제 -->
                        <!-- <div class="field">   
                            <p class="label">자동이체일</p>    
                            <div class="select">
                                <button type="button" aria-haspopup="true">다음달 부터 매월 25일</button>  
                            </div>
                        </div> -->
                        <!-- //[240130]삭제 -->
                        <!-- //[CASE]자동이체 신청 -->

                        <!-- [CASE]자동이체주기 매월 선택 시 -->
                        <div class="field">   
                            <p class="label">자동이체 주기</p>    
                            <div class="select">
                                <button type="button" aria-haspopup="true">다음달 부터 매월 25일</button>  
                            </div>
                        </div>
                        <!-- //[CASE]자동이체주기 매월 선택 시 -->

                        <!-- [CASE]올원포켓적립예금 자동이체주기 선택 옵션 -->
                        <div class="field">   
                            <p class="label">자동이체 주기</p>    
                            <div class="select">
                                <button type="button" aria-haspopup="true">매주 금요일</button>
                            </div>
                        </div>
                        <!-- //[CASE]올원포켓적립예금 자동이체주기 선택 옵션 -->

                        <!-- [CASE]자동이체주기 매일 선택 시 -->
                        <div class="field">   
                            <p class="label">자동이체 주기</p>    
                            <div class="select">
                                <button type="button" aria-haspopup="true">매일</button>  
                            </div>
                        </div>
                        <!-- //[CASE]자동이체주기 매월 선택 시 -->
                    </div>

                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
