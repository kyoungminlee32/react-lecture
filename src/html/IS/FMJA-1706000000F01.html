<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/isa.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">ISA 신규</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:4; --max:6;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">보고서를 어떻게 받을까요?</h2>
                    </div>

                    <dl class="dl -box">
                        <div>
                            <dt>휴대폰번호</dt>
                            <dd>010-1234-5678</dd>
                        </div>
                        <div>
                            <dt>이메일</dt>
                            <dd>abc123@gmail.com</dd>
                        </div>
                        <div>
                            <!-- 2024-05-31 띄어 쓰기 수정 -->
                            <dt>집 주소</dt>
                            <!-- 2024-05-31 띄어 쓰기 수정 -->
                            <dd>(06771) 서울특별시 서초구 매헌로 24 6층</dd>
                        </div>
                        <div>
                            <!-- 2024-05-31 띄어 쓰기 수정 -->
                            <dt>직장 주소</dt>
                            <!-- 2024-05-31 띄어 쓰기 수정 -->
                            <dd>(04517) 서울특별시 종로구 가회로 88-12 백경센트레빌 1층</dd>
                        </div>
                    </dl>

                    <div class="case-wrap -xxs right">
                        <a href="javascript:void(0)" class="a -arrow">내정보 수정</a>
                    </div>

                    <div class="field">
                        <p class="label">투자일임보고서
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <span class="panel">
                                    <span class="t-content">
                                        <span>1, 4, 7, 10월에 투자일임보고서가 발송됩니다.</span>
                                    </span>
                                </span>
                            </span>
                        </p>
                        <!-- [CASE] Default : 이메일 -->
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period" id="box-radio1-1" checked>
                                <label for="box-radio1-1">이메일</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period" id="box-radio1-2">
                                <label for="box-radio1-2">우편</label>
                            </div>
                        </div>
                        <!-- // [CASE] Default : 이메일 -->
                        <p class="info">우편은 내 정보에 등록한 주소로 발송합니다.</p>
                    </div>

                    <div class="case-wrap -sm">
                        <div class="field">
                            <p class="label">운용상품매매 알림</p>
                            <div class="box-radios">
                                <div class="box-radio">
                                    <!-- ui수정 240122 (readonly 속성 수정) -->
                                    <input type="radio" name="period12344" id="box-radio1-111" checked disabled>
                                    <!-- //ui수정 240122 (readonly 속성 수정) -->
                                    <label for="box-radio1-111">문자메시지</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <p class="label">만기 자동상환 사전안내</p>
                        <!-- [CASE] Default : 이메일 -->
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-1" checked>
                                <label for="period-point-color1-1">이메일</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-2">
                                <label for="period-point-color1-2">문자메시지</label>
                            </div>
                        </div>
                        <!-- // [CASE] Default : 이메일 -->
                    </div>

                    <!-- ui수정 240130 (플로팅 버튼 추가) -->
                    <!-- 플로팅 버튼 -->
                    <div class="floating-wrap">
                        <div class="floating-btn" role="button">
                            <p>
                                원금손실<br>
                                가능상품
                            </p>
                        </div>
                        <a class="floating_close" title="원금 손실가능 상품 플로팅버튼 닫기"></a>
                    </div>
                    <!-- // 플로팅 버튼 -->
                    <!-- //ui수정 240130 (플로팅 버튼 추가) -->
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
