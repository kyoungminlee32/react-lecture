<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/isa.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">ISA 신규</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:4; --max:6;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">자동이체를 신청할까요?</h2>
                    </div>

                    <div class="field">
                        <div class="box-radios">
                            <!-- [CASE] 신청 선택 시, 하단에 설정 영역 노출 -->
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-1" checked>
                                <label for="period-point-color1-1">신청함</label>
                            </div>
                            <!-- // [CASE] 신청 선택 시, 하단에 설정 영역 노출 -->

                            <!-- [CASE] 신청안함 선택 시 하단에 [다음] 버튼을 선택하여 다음단계로 진행 -->
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-2">
                                <label for="period-point-color1-2">신청 안함</label>
                            </div>
                            <!-- // [CASE] 신청안함 선택 시 하단에 [다음] 버튼을 선택하여 다음단계로 진행 -->
                        </div>

                        <!-- ui수정 240325 (툴팁 추가 필요) -->
                        <p class="message">자동이체 신청 안내
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <span class="panel">
                                    <span class="title">자동이체 신청 안내</span>
                                    <span class="t-content">
                                        <span class="dot">자동이체일이 토요일 /공휴일이면 다음 날(영업일 기준)에 출금됩니다.</span>
                                        <span class="dot">자동이체일이 말일이고, 토요일/공휴일이라 다음 달에 출금되면 그 달의 저축한도에 따라 자동이체가 되지 않을 수 있습니다.</span>
                                    </span>
                                </span>
                            </span>
                        </p>
                        <!-- // ui수정 240325 (툴팁 추가 필요) -->
                    </div>

                    <!-- ui수정 240325 (신청 선택 시 div.case-wrap추가 영역 전체 노출) -->
                    <div class="case-wrap">
                        <div class="field">
                            <label for="tt1" class="label">자동이체금액</label>
                            <div class="mix">
                                <div class="text -won" data-clear="false">
                                    <input type="tel" id="tt1" class="right num-call" value="500,000" aria-haspopup="true" placeholder="자동이체 금액을 입력해주세요" readonly>
                                    <div class="won">원</div>
                                </div>
                                <div class="info-wrap">
                                    <p class="info right point">오십만원</p>
                                </div>
                            </div>
                        </div>
    
                        <div class="field">
                            <p class="label">자동이체 주기</p>
                            <div class="select">
                                <button type="button" aria-haspopup="true" readonly>매월만</button>
                            </div>
                        </div>
    
                        <div class="field">
                            <p class="label">자동이체일</p>
                            <div class="select">
                                <button type="button" aria-haspopup="true">24일</button>
                            </div>
                        </div>
    
                        <!-- ui수정 240228 (매월만 선택 고정으로 인한 영역 삭제) -->
                        <!-- <div class="field">
                            <p class="label">분기별 이체월 선택</p>
                            <div class="select">
                                <button type="button" aria-haspopup="true">02월 , 05월 , 08월 , 11월</button>
                            </div>
                        </div> -->
                        <!-- //ui수정 240228 (매월만 선택 고정으로 인한 영역 삭제) -->
    
                        <div class="field">
                            <p class="label">자동이체 시작월</p>
                            <div class="select">
                                <button type="button" aria-haspopup="true">2024년 10월</button>
                            </div>
                        </div>
    
                        <!-- ui수정 240122 (마크업 수정) -->
                        <div class="field">
                            <label for="tt2" class="label">자동이체 개월수</label>
                            <div class="mix">
                                <div class="text -won" data-clear="false">
                                    <input type="tel" id="tt2" class="right num-call tomonth" value="30" aria-haspopup="true" placeholder="" readonly><!-- 240412 placeholder삭제 -->
                                    <div class="won">개월까지</div>
                                </div>
                            </div>
                        </div>
                        <!-- //ui수정 240122 (마크업 수정) -->
                    </div>
                    <!-- // ui수정 240325 (신청 선택 시 div.case-wrap추가 영역 전체 노출) -->

                    <!-- ui수정 240130 (플로팅 버튼 추가) -->
                    <!-- 플로팅 버튼 -->
                    <div class="floating-wrap">
                        <div class="floating-btn" role="button">
                            <p>
                                원금손실<br>
                                가능상품
                            </p>
                        </div>
                        <a class="floating_close" title="원금 손실가능 상품 플로팅버튼 닫기"></a>
                    </div>
                    <!-- // 플로팅 버튼 -->
                    <!-- //ui수정 240130 (플로팅 버튼 추가) -->
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
