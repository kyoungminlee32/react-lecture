<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/isa.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">ISA 신규</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:1; --max:6;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 2024-06-06 page 아이콘 변경 (확인) -->
                    <div class="page-icon -type-noti" aria-hidden="true"></div>

                    <!-- <div class="page-img">
                        <img src="/content/assets/imgs/img/utility/ico-incongruity.png" style="width:10rem" alt="모바일신분증 인증 예시">
                    </div> -->

                    <div class="h2-group">
                        <h2 class="h2">
                            ISA 상품은<br>
                            투자성향분석 후 가입할 수 있습니다
                        </h2>
                    </div>

                    <div class="case-wrap -sm">
                        <div class="box">
                            <p class="p">투자성향분석은 고객님의 투자성향을 파악하여 적합한 상품을 안내해 드리기 위한 기초자료로 활용됩니다.</p>
                            <p class="p">투자성향분석은 대면, 비대면 통합하여 1일 3회(대면 1회로 제한) 가능합니다.</p>
                            <p class="p">투자성향분석 결과는 12개월 동안 사용할 수 있으며, 투자성향이 변경되지 않은 경우 다시 사용할 수 있습니다.</p>
                            <p class="p">고객님의 투자성향보다 높은 등급의 상품은 가입할 수 없으며, 투자성향이 변경된 경우 투자성향분석을 다시 진행해 주세요.</p>
                        </div>
                    </div>
                    
                    <div class="case-wrap -xxs right">
                        <a href="javascript:void(0)" class="a -arrow">투자성향분석 상세 안내</a>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">투자성향분석하기</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
