<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/retire.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">퇴직연금IRP 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">가입금액을 입력해 주세요</h2>
                    </div>

                    <div class="field">
                        <div class="mix">
                            <div class="text -won" data-clear="false">
                                <input type="tel" id="tt12" class="right num-call" value="500,000" placeholder="1만원 이상 입력" aria-haspopup="true" readonly>
                                <div class="won">원</div>
                            </div>
                            <div class="info-wrap">
                                <p class="info right point">오십만원</p>
                            </div>
                        </div>
                    </div>

                    <div class="case-wrap -sm">
                        <div class="h2-group">
                            <h2 class="h2">출금계좌를 선택해 주세요</h2>
                        </div>

                        <div class="select">
                            <button type="button" aria-haspopup="true" class="-fixed">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                    <div class="amount">
                                        <div class="key">출금가능금액</div>
                                        <div class="value">
                                            <span>150,000,000</span>원
                                        </div>
                                    </div>
                                </div>
                            </button>
                        </div>

                        <div class="case-wrap -xxs">
                            <div class="checkbox -sm">
                                <input type="checkbox" id="checkbox-sm">
                                <label for="checkbox-sm">출금계좌와 동일하게 비밀번호 설정</label>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label for="field2" class="label">비밀번호</label>
                        <div class="text">
                            <input type="password" class="num-call" id="field2" value="1212" aria-haspopup="true" readonly>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
    </script>
</body>
</html>
