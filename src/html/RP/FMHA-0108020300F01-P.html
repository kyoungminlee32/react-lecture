                    <div class="funcs">

                    </div>
                </div>
            </div>

            <div class="contents">

                        </li>
                        <li>
                            <span class="gadget">3단계</span>
                            <div class="title">최종 추천펀드 선정 및 게시</div>
                        </li>
                    </ol>

                    <h4 class="h5">선정 주기</h4>
                    <p class="p">3개월마다</p>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
