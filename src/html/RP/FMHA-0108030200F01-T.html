<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/retire.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">퇴직연금IRP 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">포트폴리오 상품을 확인해 주세요</h2>
                    </div>

                    <div class="case-wrap -sm">
                        <div class="segments -bar">
                            <div class="outer">
                                <div class="inner">
                                    <div role="tablist" class="list">
                                        <div class="item -active"><button type="button" role="tab" aria-selected="true" aria-controls="segments-panel1" id="segment3">NH로보-Pro 포트폴리오</button></div>
                                        <div class="item"><button type="button" role="tab" aria-selected="false" aria-controls="segments-panel2" id="segment4">전문가 포트폴리오</button></div>
                                        <span class="switcher" aria-hidden="true"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="segments-panels">
                        <div role="tabpanel" aria-labelledby="segment1" id="segments-panel1" class="segments-panel -active" tabindex="0">
                            <!-- [CASE] 공격투자형:-grade1, 적극투자형:-grade3, 위험중립형:-grade4, 안정추구형:-grade5, 안정형:-grade6 -->
                            <p class="grade-notice">40대 미만 <span class="-grade4">위험중립형</span>에 적합한 상품입니다.</p>

                            <div class="case-wrap -xs right">
                                <a href="javascript:void(0)" class="a -arrow">포트폴리오 변경</a>
                            </div>

                            <div class="case-wrap -xxs">
                                <div class="selection">
                                    <ul>
                                        <li>
                                            <div class="info -bordered">
                                                <div class="top-area">
                                                    <div class="badges">
                                                        <span class="badge -disabled">펀드</span><span class="badge -grade4">보통위험</span>
                                                    </div>
                                                </div>
                                                <div class="info-main">
                                                    한국투자저축은행 정기예금 1년 개인형IRP
                                                </div>
                                                <div class="info-bottom right">
                                                    <span class="sm-txt">운용비율</span>
                                                    <span class="number">20%</span>
                                                </div>
                                            </div>
                                        </li>
                                        <li>
                                            <div class="info -bordered">
                                                <div class="top-area">
                                                    <div class="badges">
                                                        <span class="badge -disabled">펀드</span><span class="badge -grade4">보통위험</span>
                                                    </div>
                                                </div>
                                                <div class="info-main">
                                                    IBK골드마이닝증권투자신탁1호(주식) C-Re
                                                </div>
                                                <div class="info-bottom right">
                                                    <span class="sm-txt">운용비율</span>
                                                    <span class="number">40%</span>
                                                </div>
                                            </div>
                                        </li>
                                        <li>
                                            <div class="info -bordered">
                                                <div class="top-area">
                                                    <div class="badges">
                                                        <span class="badge -disabled">ETF</span><span class="badge -grayline">계열사</span><span class="badge -grade4">보통위험</span>
                                                    </div>
                                                </div>
                                                <div class="info-main">
                                                    NH-Amundi HANARO 200 TOP10 증권상장지수투자 신탁[주식]
                                                </div>
                                                <div class="info-bottom right">
                                                    <span class="sm-txt">운용비율</span>
                                                    <span class="number">40%</span>
                                                </div>
                                            </div>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div role="tabpanel" aria-labelledby="segment2" id="segments-panel2" class="segments-panel" tabindex="0">
                            
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
