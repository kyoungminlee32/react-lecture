<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/retire.css">
</head>
<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">예금상품 추가</h1>

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="notice-box">
                        <!-- [CASE] 50~80%인 경우 : 상품 추가는 최대 2개까지 가능합니다. / 90%인 경우 : 상품 추가는 최대 1개까지 가능합니다. -->
                        <p class="product-notice">상품은 N개까지 추가할 수 있습니다.</p>
                        <!-- // -->
                    </div>

                    <div class="filter-bar">
                        <div class="mix-bar">
                            <!-- <div class="search">1년ㆍ금리순<button type="button" class="icon-button -filter"><span class="hide">필터</span></button></div> -->
                            <!-- 2024 접근성 수정 -->
                            <div class="search" role="button" title="상품 정렬 수정">1년ㆍ금리순<span class="icon-button -filter" aria-hidden="true"><span class="hide">필터</span></span></div>
                        </div>
                    </div>

                    <div class="selection">
                        <!-- [CASE] Default : 10개 상품 노출 -->
                        <ul>
                            <li>
                                <div class="info -bordered -delete">
                                    <div class="info-main">
                                        (DC/IRP)기업은행 정기예금 1년
                                    </div>
                                    <div class="info-bottom right">
                                        <span class="sm-txt">금리</span>
                                        <span class="number red">3.57%</span>
                                    </div>
                                    <div class="checkbox -sm -fixed">
                                        <input type="checkbox" id="bordered-account2">
                                        <label for="bordered-account2"><span class="hide">선택항목1</span></label>
                                    </div>
                                </div>
                            </li>
                            <li>
                                <div class="info -bordered -delete">
                                    <div class="info-main">
                                        (DC/IRP)하나은행 정기예금 1년
                                    </div>
                                    <div class="info-bottom right">
                                        <span class="sm-txt">금리</span>
                                        <span class="number red">4.07%</span>
                                    </div>
                                    <div class="checkbox -sm -fixed">
                                        <input type="checkbox" id="bordered-account3">
                                        <label for="bordered-account3"><span class="hide">선택항목2</span></label>
                                    </div>
                                </div>
                            </li>
                            <li>
                                <div class="info -bordered -delete">
                                    <div class="info-main">
                                        (DC/IRP)국민은행 정기예금 1년
                                    </div>
                                    <div class="info-bottom right">
                                        <span class="sm-txt">금리</span>
                                        <span class="number red">2.91%</span>
                                    </div>
                                    <div class="checkbox -sm -fixed">
                                        <input type="checkbox" id="bordered-account4">
                                        <label for="bordered-account4"><span class="hide">선택항목3</span></label>
                                    </div>
                                </div>
                            </li>
                        </ul>
                        <!-- [CASE] 상품이 5개이상일 경우 버튼 노출  -->
                        <button type="button" class="more-button">더보기</button>
                    </div>

                    <!-- [CASE] 상품 미존재 시 -->
                        <!-- <div class="result -sm -caution">
                            <p class="message">
                                조회 결과가 없습니다.<br>
                                설정을 변경해 주세요.
                            </p>
                        </div> -->
                    <!-- // -->
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Popup.open('popup');

        // 팝업 닫기(마지막 인자 기본값: false)
        // Popup.close('popup', function() {
        //     '콜백함수'
        // });

        // 팝업 닫기 + DOM 삭제
        // Popup.close('popup', function() {
        //     '콜백함수'
        // }, true);
    </script>
</body>
</html>
