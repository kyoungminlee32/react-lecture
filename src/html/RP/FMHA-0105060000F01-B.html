<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/retire.css">
</head>
<body>
    <div id="layer" class="layer">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">이체 주기를 선택해 주세요</h1>

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="datepicker-widget cycle-type">
                        <ul class="cycle">
                            <li class="on">매월</li>
                            <li>매분기</li>
                            <li>매반기</li>
                            <li>매년</li>
                        </ul>
                        <div class="cycle-list">
                            <ul class="everymonth" style="display:block">
                                <li></li>
                            </ul>
                            <ul class="everyday">
                                <li>1, 4, 7, 10월</li>
                                <li>2, 5, 8, 11월</li>
                                <li>3, 6, 9, 12월</li>
                            </ul>
                            <ul class="week">
                                <li>1, 7월</li>
                                <li>2, 8월</li>
                                <li>3, 9월</li>
                                <li>4, 10월</li>
                                <li class="on">5, 11월</li>
                            </ul>
                            <ul class="day">
                                <li class="on">1월</li>
                                <li>2월</li>
                                <li>3월</li>
                                <li>4월</li>
                                <li>5월</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        Layer.open('layer');
    </script>
</body>
</html>
