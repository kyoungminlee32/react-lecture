<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/retire.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">연금설계</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="box">
                        <p class="p">NH농협은행 개인형 퇴직연금(IRP)은 ‘월 지급식’ 으로 연금을 받을 수 있습니다.</p>
                    </div>

                    <div class="field"> <!-- 애러일 경우 -error 클래스 추가 -->
                        <div class="label">
                            <label for="tt1">연금 수령기간</label>
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <span class="panel">
                                    <span class="title">연금 수령기간</span>
                                    <span class="t-content">
                                        <span class="dot">연금 수령기간은 5 ~ 50년 이내로 선택할 수 있습니다.</span>
                                        <span class="dot">단, 2013.03.01 이후 확정급여형 퇴직연금(DB)이나 확정기여형 퇴직연금(DC)에 가입하였거나 현재 퇴직연금 제도에 가입하지 않았다면 세제 불이익을 받지 않도록 10년으로 등록해 주세요.</span>
                                    </span>
                                </span>
                            </span>
                        </div>
                        <div class="mix">
                            <div class="text -won" data-clear="false">
                                <input type="tel" id="tt1" class="right num-call" aria-haspopup="true" value="15" placeholder="5~50, 숫자만 입력" readonly>
                                <div class="won">년</div>
                            </div>
                            <div class="info-wrap">
                                <!-- [CASE] 애러일 경우 -->
                                <!-- <p class="info red">5년~50년 이내로 입력해 주세요</p> -->
                                <!-- // [CASE] 애러일 경우 -->
                            </div>
                        </div>
                    </div>

                    <div class="field"> <!-- 애러일 경우 -error 클래스 추가 -->
                        <div class="label">
                            <label for="tt2" class="label">거치기간</label>
                        </div>
                        <div class="mix">
                            <div class="text -won" data-clear="false">
                                <input type="tel" id="tt2" class="right num-call" aria-haspopup="true" value="15" placeholder="1~50, 숫자만 입력" readonly>
                                <div class="won">년</div>
                            </div>
                            <div class="info-wrap">
                                <!-- [CASE] 애러일 경우 -->
                                <!-- <p class="info red">1년~50년 이내로 입력해 주세요</p> -->
                                <!-- // [CASE] 애러일 경우 -->
                            </div>
                        </div>
                    </div>

                    <div class="field"> <!-- 애러일 경우 -error 클래스 추가 -->
                        <p class="label">운용상품만기</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">정기예금</button>
                        </div>
                        <div class="select">
                            <button type="button" aria-haspopup="true">1년</button>
                        </div>
                    </div>

                    <div class="field"> <!-- 애러일 경우 -error 클래스 추가 -->
                        <label for="gggs" class="label">운용상품 기대수익률</label>
                        <div class="mix">
                            <!-- ui수정 240416 (인풋 + 아이콘 삭제) -->
                            <div class="text -percent" data-clear="false">
                                <input type="tel" id="gggs" class="right num-call" value="" aria-haspopup="true" placeholder="0~100" readonly>
                                <div class="percent">%</div>
                            </div>
                            <!-- //ui수정 240416 (인풋 + 아이콘 삭제) -->
                            <div class="info-wrap">
                                <!-- [CASE] 애러일 경우 -->
                                <!-- <p class="info red">0~100 이내로 입력해 주세요</p> -->
                                <!-- // [CASE] 애러일 경우 -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
