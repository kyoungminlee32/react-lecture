<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/retire.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">퇴직연금IRP 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>     

                    <div class="h2-group">                        
                        <h2 class="h2">
                            추가정보를 설정해 주세요
                        </h2>
                    </div>

                    <div class="field">
                        <div class="title-group">
                            <div class="inner">
                                <span class="title">관리점</span>                               
                            </div>
                        </div>
                        <div class="mix">
                            <div class="text">
                                <!-- ui수정 240328 (input disabled 속성 변경) -->
                                <!-- [240416] value제거, placeholder 변경 -->
                                <input type="text" class="left-side fake-readonly" id="search01" title="검색하기" placeholder="관리점 찾기" aria-haspopup="true" disabled>
                                <!-- //ui수정 240328 (input disabled 속성 변경) -->
                            </div>
            
                            <div class="space -lined search">
                                <button type="button" class="icon-button -search" aria-haspopup="true"><span class="hide">조회</span></button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- [CASE] Default : 스위치 체크x -->
                    <div class="field">
                        <div class="title-group">
                            <div class="inner">
                                <span class="title">권유직원</span>                               
                            </div>
                            <span class="switch ml-auto -sm">
                                <input type="checkbox" id="switch1" checked>
                                <label for="switch1"><span class="hide">스위치</span></label>
                            </span>
                        </div>
                        <!-- [CASE] 스위치 선택시 권유직원 검색필드 노출 -->
                        <div class="mix">
                            <div class="text">
                                <!-- ui수정 240328 (input disabled 속성 변경 / fake-readonly 클래스 추가) -->
                                <input type="text" class="left-side fake-readonly" id="search02" value="김농협" placeholder="" title="직원 이름 입력" disabled>
                                <!-- //ui수정 240328 (input disabled 속성 변경 / fake-readonly 클래스 추가) -->
                            </div>
            
                            <div class="space -lined search">
                                <button type="button" class="icon-button -search" aria-haspopup="true"><span class="hide">조회</span></button>
                            </div>
                        </div>
                        <!-- // -->
                    </div>
                    <!-- // -->

                    <div class="field">
                        <div class="title-group">
                            <div class="inner">
                                <span class="title">NH포인트 사용 신청</span>                                
                            </div>
                            <span class="switch ml-auto -sm">
                                <input type="checkbox" id="switch2" checked>
                                <label for="switch2"><span class="hide">스위치</span></label>
                            </span>
                        </div>
                        <p class="message">
                            NH포인트를 현금처럼 사용해 보세요.<br>
                            캐시백을 신청하면 바로 출금계좌로 입금됩니다.
                        </p>
                    </div>

                    <div class="field">
                        <label for="point" class="label">NH포인트 사용 신청 내역</label>
                        <div class="mix">
                            <div class="text -poin"> 
                                <input type="tel" id="point" class="right" value="90" readonly>
                                <div class="poin">p</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
