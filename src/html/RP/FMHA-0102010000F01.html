<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/retire.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">퇴직연금IRP 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="h2-group">
                        <h2 class="h2">가입자 유형을 확인해 주세요</h2>
                    </div>                    
                    <!-- Default : 미선택 -->
                    <div class="field">
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-1">
                                <label for="period-point-color1-1">근로자</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-2">
                                <label for="period-point-color1-2">자영업자</label>
                            </div>
                        </div>
                    </div>
                    <!-- // -->
                    
                    <!-- [CASE] 근로자 선택한 경우 -->
                    <div class="field">
                        <p class="label">상세 유형</p>
                        <div class="box-radios custom">
                            <div class="box-radio -left">
                                <input type="radio" name="period-point-color3" id="period-point-color22-3">
                                <label for="period-point-color22-3">종합소득세 신고 대상자</label>
                            </div>
                        </div>
                        <div class="box-radios custom">
                            <div class="box-radio -left">
                                <input type="radio" name="period-point-color3" id="period-point-color22-4">
                                <label for="period-point-color22-4">사업소득 연말정산 대상자</label>
                            </div>
                        </div>
                    </div>
                    <!-- // [CASE] 근로자 선택한 경우 -->
                    
                    <!-- [CASE] 자영업자 선택한 경우 -->
                    <div class="field">
                        <p class="label">상세 유형</p>
                        <!-- [CASE] DB, DC 가입 재직근로자의 경우 -->
                        <div class="box-radios custom">
                            <div class="box-radio -left">
                                <input type="radio" name="period-point-color3" id="period-point-color22-5">
                                <label for="period-point-color22-5">DB,DC가입 재직근로자</label>
                            </div>
                        </div>
                        <!-- // [CASE] DB, DC 가입 재직근로자의 경우 -->
                        
                        <!-- [CASE] 1년 미만 및 단시간 근로자, 재직근로자, 직역연금가입자의 경우 -->
                        <div class="box-radios custom">
                            <div class="box-radio -left">
                                <input type="radio" name="period-point-color3" id="period-point-color22-6">
                                <label for="period-point-color22-6">1년 미만 및 단시간 근로자</label>
                            </div>
                        </div>
                        <div class="box-radios custom">
                            <div class="box-radio -left">
                                <input type="radio" name="period-point-color3" id="period-point-color22-7">
                                <label for="period-point-color22-7">재직근로자(퇴직연금 미가입근로자)</label>
                            </div>
                        </div>
                        <div class="box-radios custom">
                            <div class="box-radio -left">
                                <input type="radio" name="period-point-color3" id="period-point-color22-8">
                                <label for="period-point-color22-8">직역연금가입자(공무원, 사립학교, 별정직 우체국)</label>
                            </div>
                        </div>
                    </div>
                    <!-- // [CASE] 자영업자 선택한 경우 -->

                    <!-- [CASE] Default : 비노출&미선택 -->
                    <div class="field">
                        <p class="label">동의내용 확인</p>
                        <!-- [CASE] 시작 -->
                        <div class="case-wrap -xxs">
                            <div class="agree">
                                <div class="title">
                                    <div class="checkbox -sm">
                                        <input type="checkbox" id="required-total">
                                        <label for="required-total">스크래핑 이용 동의</label>
                                    </div>
                                    <button type="button" class="more"><span class="hide">스크래핑 이용 동의 약관</span></button>
                                </div>
                            </div>
                        </div>
                        <!-- [CASE] 끝 -->
                    </div>
                    <!-- // -->
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
