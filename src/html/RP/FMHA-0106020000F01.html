<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/retire.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">퇴직연금IRP 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="h2-group">
                        <h2 class="h2">
                            사전지정운용방법을 등록해 주세요
                        </h2>
                        <!-- [CASE] 투자성향보유 -->
                        <p class="desc">
                            <!-- [CASE] 공격투자형:-grade1, 적극투자형:-grade3, 위험중립형:-grade4, 안정추구형:-grade5, 안정형:-grade6 -->
                            <span class="user-bold">김농협님</span>의 투자성향에 적합한 <span class="-grade4">위협중립형</span> 상품입니다.<br>
                            다른 상품을 선택하려면 투자성향분석을 다시 해주세요.
                        </p>
                        <!-- // [CASE] 투자성향보유 -->

                        <!-- [CASE] 투자성향없음+회사에서 지정 -->
                        <!-- <p class="desc"> -->
                            <!-- [CASE] 공격투자형:-grade1, 적극투자형:-grade3, 위험중립형:-grade4, 안정추구형:-grade5, 안정형:-grade6 -->
                            <!-- 회사에서 사전에 등록한 사전지정운용상품 중<br>
                            <span class="user-bold">김농협님</span>의 투자성향에 적합한 <span class="-grade4">위협중립형</span> 상품입니다.
                        </p> -->
                        <!-- // [CASE] 투자성향없음+회사에서 지정 -->

                        <a href="javascript:void(0)" class="a -arrow">디폴트옵션 안내</a>
                    </div>

                    <div class="case-wrap -sm">
                        <div class="selection">
                            <ul>
                                <li>
                                    <div class="info -bordered -check" >
                                        <div class="top-area">
                                            <span class="badge -grade1">고위험</span>
                                        </div>
                                        <div class="info-main">
                                            NH농협은행 디폴트옵션고위험 포트폴리오 1호
                                        </div>
                                        
                                        <div class="radio -fixed -sm">
                                            <input type="radio" id="radio1-1" name="radio1">
                                            <label for="radio1-1"><span class="hide">라디오</span></label>
                                        </div>
                                    </div>
                                </li>
                                <li>
                                    <div class="info -bordered -check" >
                                        <div class="top-area">
                                            <span class="badge -grade3">중위험</span>
                                        </div>
                                        <div class="info-main">
                                            NH농협은행 디폴트옵션고위험 포트폴리오 2호
                                        </div>
                                        <div class="radio -fixed -sm">
                                            <input type="radio" id="radio1-2" name="radio1">
                                            <label for="radio1-2"><span class="hide">라디오</span></label>
                                        </div>
                                    </div>
                                </li>
                                <li>
                                    <div class="info -bordered -check" >
                                        <div class="top-area">
                                            <span class="badge -grade4">저위험</span>
                                        </div>
                                        <div class="info-main">
                                            NH농협은행 디폴트옵션고위험 포트폴리오 1호
                                        </div>
                                        <div class="radio -fixed -sm">
                                            <input type="radio" id="radio1-3" name="radio1">
                                            <label for="radio1-3"><span class="hide">라디오</span></label>
                                        </div>
                                    </div>
                                </li>
                                <li>
                                    <div class="info -bordered -check" >
                                        <div class="top-area">
                                            <span class="badge -grade5">초저위험</span>
                                        </div>
                                        <div class="info-main">
                                            NH농협은행 디폴트옵션고위험 포트폴리오 2호
                                        </div>
                                        <div class="radio -fixed -sm">
                                            <input type="radio" id="radio1-4" name="radio1">
                                            <label for="radio1-4"><span class="hide">라디오</span></label>
                                        </div>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons -half">
                        <button type="button" class="button -lg">성향분석 다시하기</button>
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
