<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">

<body>
    <div class="page">
        <div class="container">
            <header class="header transparent">
                <div class="inner">
                    <h1 class="title"><span class="hide"></span></h1>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div>
                        <img src="/content/assets/imgs/img/utility/ico-resultconfirm.png" style="width:16.8rem;" alt="">
                    </div>
                    <div class="case-wrap -sm">
                        <h2 class="h1">ELT 가입을 신청했어요</h2>
                    </div>

                    <div class="case-wrap -sm">
                        <div class="dls -box" data-role="fold">
                            <button type="button" class="more" data-role="marker">
                                <span>더보기</span>
                            </button>
                            <dl class="dl">
                                <div>
                                    <dt>상품명</dt>
                                    <dd>TIGER 2차전지테마 경영글벌 ELT</dd>
                                </div>
                                <!-- [240617]텍스트 변경 -->
                                <div>
                                    <dt>출금계좌번호</dt>
                                    <dd>
                                        %기관명%<br>
                                        000-0000-0000-00
                                    </dd>
                                </div>
                                <!-- //[240617]텍스트 변경 -->
                                <div>
                                    <dt>가입금액</dt>
                                    <dd>1,000,000원</dd>
                                </div>
                                <div>
                                    <dt>상환 조건</dt>
                                    <dd>90-85-85-80-75-65</dd>
                                </div>
                                <div data-role="hidden">
                                    <dt>위험등급</dt>
                                    <dd>일반형</dd>
                                </div>
                                <div data-role="hidden">
                                    <dt>위탁자</dt>
                                    <dd>김농협</dd>
                                </div>
                                <!-- [240617]텍스트 변경 -->
                                <div data-role="hidden">
                                    <dt>NH농협은행 계좌번호</dt>
                                    <dd>
                                        NH농협은행<br>
                                        000-0000-0000-00
                                    </dd>
                                </div>
                                <!-- //[240617]텍스트 변경 -->
                                <div data-role="hidden">
                                    <dt>자산운용보고서</dt>
                                    <dd>이메일</dd>
                                </div>
                                <div data-role="hidden">
                                    <dt>투자정보 안내</dt>
                                    <dd>
                                        (매월) 문자메시지<br>
                                        010-1234-5678
                                    </dd>
                                </div>
                                <div data-role="hidden">
                                    <dt>관리점</dt>
                                    <dd>양재지점</dd>
                                </div>
                            </dl>
                        </div>
                    </div>
                </div>

                <div class="fixer">
                    <div class="buttons -half">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>

        // 스크립트 작성
