<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/etf.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">ELT 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">가입정보를 확인해 주세요</h2>
                    </div>

                    <dl class="dl -box">
                        <div>
                            <dt>상품명</dt>
                            <dd>TIGER 2차전지테마 경영글벌 ELT</dd>
                        </div>
                        <!-- [240617]텍스트 변경 -->
                        <div>
                            <dt>출금계좌번호</dt>
                            <dd>
                                %기관명%<br>
                                000-0000-0000-00
                            </dd>
                        </div>
                        <!-- //[240617]텍스트 변경 -->
                        <div>
                            <dt>가입금액</dt>
                            <dd>1,000,000원</dd>
                        </div>
                        <div>
                            <dt>상환 조건</dt>
                            <dd>90-85-85-80-75-65</dd>
                        </div>
                        <div>
                            <dt>위험등급</dt>
                            <dd>일반형</dd>
                        </div>
                        <div>
                            <dt>위탁자</dt>
                            <dd>김농협</dd>
                        </div>
                        <!-- [240617]텍스트 변경 -->
                        <div>
                            <dt>NH농협은행 계좌번호</dt>
                            <dd>
                                NH농협은행<br>
                                000-0000-0000-00
                            </dd>
                        </div>
                        <!-- //[240617]텍스트 변경 -->
                        <div>
                            <dt>재산운용보고서</dt>
                            <dd>이메일</dd>
                        </div>
                        <div>
                            <dt>투자정보 안내</dt>
                            <dd>
                                (매월) 문자메시지<br>
                                010-1234-5678
                            </dd>
                        </div>
                        <div>
                            <dt>관리점</dt>
                            <dd>양재지점</dd>
                        </div>
                    </dl>

                    <div class="field">
                        <p class="label">계약서류 받는 방법 (필수)</p>
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-1" checked>
                                <label for="period-point-color1-1">이메일</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-2">
                                <label for="period-point-color1-2">문자메시지</label>
                            </div>
                        </div>
                        <!-- [CASE] 이메일 경우 Default -->
                        <div class="text">
                            <input type="text" id="email" placeholder="이메일 주소를 입력해 주세요" value="luckyGuy00@gmail.com">
                        </div>
                        <!-- // -->

                        <!-- [CASE] 문자메시지 경우 -->
                        <!-- <div class="mix">
                            <div class="select flex-5">
                                <button type="button" class="left-side" aria-haspopup="true" title="휴대폰 앞자리 선택">010</button>
                            </div>
            
                            <div class="text flex-7" data-clear="false">
                                <input type="tel" data-id="phone123" class="mid-side num-call" placeholder="숫자만 입력" title="휴대폰번호 입력" aria-haspopup="true"  readonly>
                            </div>
                            <div class="space -lined right-side"></div>
                        </div> -->
                        <!-- // -->
                    </div>

                    <!-- 플로팅 버튼 -->
                    <div class="floating-wrap">
                        <div class="floating-btn" role="button">
                            <p>
                                원금손실<br>
                                가능상품
                            </p>
                        </div>
                        <a class="floating_close" title="원금 손실가능 상품 플로팅버튼 닫기"></a>
                    </div>
                    <!-- // 플로팅 버튼 -->
                </div>

                <div class="fixer">
                    <div class="buttons -half">
                        <button type="button" class="button -lg">정보수정</button>
                        <button type="button" class="button -lg -primary">이대로 가입</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
