<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/etf.css">
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">ETF 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:3; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 -->
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="h2-group">
                        <h2 class="h2">
                            기준수익률·위험수익률 알림을<br>
                            설정할까요?
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <span class="panel">
                                    <span class="title">기준/위험수익률 안내</span>
                                    <span class="t-content">
                                        <span class="dot">보수 차감 후 금액인 신탁수익률이 지정한 기준수익률 (+) 및 위험수익률(-)이 되면 문자메시지로 안내되는 서비스입니다.</span>
                                        <span class="dot">해당일 종가기준으로 설정 값이 되면, 다음 영업일에 문자메시지가 전송됩니다.</span>
                                        <span class="dot">기준수익률·위험수익률이 되면 처음에만 문자메시지로 알림을 받고 이후 서비스는 종료됩니다.</span>
                                    </span>
                                </span>
                            </span>
                        </h2>
                    </div>
                    
                    <div class="field">
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-1" checked>
                                <label for="period-point-color1-1">신청함</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-2">
                                <label for="period-point-color1-2">신청 안함</label>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label for="gggs1" class="label">기준수익률</label>
                        <div class="mix">
                            <div class="text -percent" data-clear="false">
                                <div class="icon-plus">
                                    <!-- ux 라이팅 수정 시작 -->
                                    <input type="tel" id="gggs1" class="right num-call" value="" aria-haspopup="true" placeholder="1 ~ 100 이내로 입력" readonly>
                                    <!-- ux 라이팅 수정 끝 -->
                                    <div class="percent">%</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label for="gggs2" class="label">위험수익률</label>
                        <div class="mix">
                            <div class="text -percent" data-clear="false">
                                <div class="icon-minus">
                                    <!-- ux 라이팅 수정 시작 -->
                                    <input type="tel" id="gggs2" class="right num-call" value="" aria-haspopup="true" placeholder="1 ~ 100 이내로 입력" readonly>
                                    <!-- ux 라이팅 수정 끝 -->
                                    <div class="percent">%</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 플로팅 버튼 -->
                    <div class="floating-wrap">
                        <div class="floating-btn" role="button">
                            <p>
                                원금손실<br>
                                가능상품
                            </p>
                        </div>
                        <a class="floating_close" title="원금 손실가능 상품 플로팅버튼 닫기"></a>
                    </div>
                    <!-- // 플로팅 버튼 -->
                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
        // 스크립트 작성
    </script>
</body>
</html>
