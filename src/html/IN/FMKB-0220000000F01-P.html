<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">
    <link rel="stylesheet" href="../../assets/css/insurance.css">
</head>
<body>
    <div id="popup" class="popup">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">실손 중복 조회</h1> <!-- ux 라이팅 수정 -->

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="h2-group">                        
                        <h2 class="h2">
                            김농협님의 <br>실손보험 가입 내역 <!-- ux 라이팅 수정 -->
                        </h2>
                    </div>
                    <ul class="join-list">
                        <li>
                            <div class="account-item">
                                <div class="date">2022.01.01 ~ 2023.01.01</div>
                                <div class="info">
                                    <div class="name">무보험자에 의한 상해(개인용, 업무용, 이륜)</div>
                                    <div class="amount">99,999,999원</div>
                                </div>
                            </div>
                        </li>
                        <li>
                            <div class="account-item">
                                <div class="date">2022.01.01 ~ 2023.01.01</div>
                                <div class="info">
                                    <div class="name">다른 자동차 운전</div>
                                    <div class="amount">1,000원</div>
                                </div>
                            </div>
                        </li>
                        <li>
                            <div class="account-item">
                                <div class="date">2022.01.01 ~ 2023.01.01</div>
                                <div class="info">
                                    <div class="name">%담보명%</div>
                                    <div class="amount">1,000,000원</div>
                                </div>
                            </div>
                        </li>
                    </ul>
                    <p class="info">계약 관련 자세한 내용은 해당 보험 회사로 문의해 주시기 바랍니다.</p> <!-- ux 라이팅 수정 -->

                    <!-- [CASE] 실손보험내역이 없는 경우 문구 노출 -->
                    <div class="in-result" style="display: none;">
                        <div class="h2-group">                        
                            <h2 class="h2">
                                실손보험 가입 내역이 없습니다.  <!-- ux 라이팅 수정 -->
                            </h2>
                        </div>
                    </div>
                    <!-- //[CASE] 실손보험내역이 없는 경우 문구 노출 -->         

                </div>

                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -lg -primary">확인</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
