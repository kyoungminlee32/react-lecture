<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">    
    <link rel="stylesheet" href="../../assets/css/insurance.css">  
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">보험 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>                      
                    <div class="h2-group">                        
                        <h2 class="h2">
                            김농협님의 정보를 입력해 주세요 </h2>
                    </div>
                    <div class="field">
                        <dl class="dl -box">
                            <div>
                                <dt>휴대폰번호</dt>
                                <dd>010-1234-5678</dd>
                            </div>
                            <div>
                                <dt>집 주소</dt>
                                <dd>서울특별시 은평구 서오릉로 88-12(현대힐스테이트) 000동 0000호</dd>
                            </div>
                            <div>
                                <dt>직장 주소</dt>
                                <dd>-</dd>
                            </div>
                            <div>
                                <dt>이메일</dt>
                                <dd>abcd @korea.com</dd>
                            </div>
                        </dl>                         
                        <div class="right mt-13">
                            <a href="javascript:void(0)" class="a -arrow">내 정보 수정</a>
                        </div>
                    </div> 
                    <div class="field">
                        <!-- 2024-04-16 문구 수정 -->
                        <p class="label">보험 우편물 받는 곳</p>
                        <!-- //2024-04-16 문구 수정 -->
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-1" checked>
                                <label for="period-point-color1-1">집</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-2">
                                <label for="period-point-color1-2">직장</label>
                            </div>
                        </div>
                        <!-- 2024-04-22 문구 추가 -->
                        <p class="message -error">주소 정보를 다시 확인해 주세요.</p>
                        <!-- //2024-04-22 문구 추가 -->
                        <div class="checkbox -sm">
                            <input type="checkbox" id="checkbox-sm">
                            <!-- 2024-05-13 문구 수정 -->
                            <label for="checkbox-sm">이메일 및 카카오톡/문자메시지로 계약관련 서류 및 안내를 받는 것에 동의합니다.</label> <!-- ux 라이팅 수정 -->
                        </div>
                    </div>
                    <!-- [240115] 마크업변경 -->
                    <div class="field">
                        <p class="label">보험료 출금/보험금 수령 계좌</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>통장(상품)명</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협은행</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                </div>
                            </button>
                        </div>
                        <div class="text">
                            <p class="info -bullet">보험금 수령 계좌는 보험사에서 변경할 수 있습니다.</p>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">자동이체/보험금 수령 계좌</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">
                                <div class="selection">
                                    <div data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>통장(상품)명</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협은행</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </div>
                                </div>
                            </button>
                        </div>
                        <div class="text">
                            <p class="info -bullet">보험금 수령 계좌는 보험사에서 변경할 수 있습니다.</p>
                        </div>
                    </div>
                    <!-- //[240115] 마크업변경 -->
                    <div class="field">
                        <p class="label">자동이체일</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">선택</button>
                        </div>
                        <div class="checkbox -sm">
                            <input type="checkbox" id="checkbox-sm-checked" checked>
                            <label for="checkbox-sm-checked">출금이체 동의 및 송금계좌 신청에 동의합니다.</label>
                        </div>
                    </div>
                    <div class="field">
                        <label for="search01" class="label">관리점</label>
                        <div class="mix">
                            <div class="text">
                                <input type="text" class="left-side fake-readonly" id="search01" placeholder="관리점 찾기" aria-haspopup="true" readonly>
                            </div>
                            <div class="space -lined search">
                                <button type="button" class="icon-button -search right-side" aria-haspopup="true"><span class="hide">조회</span></button>
                            </div>
                        </div>
                    </div>                                                                         
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
      
    </script>
</body>
</html>
