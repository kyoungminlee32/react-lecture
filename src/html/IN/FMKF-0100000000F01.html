<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">    
    <link rel="stylesheet" href="../../assets/css/insurance.css">  
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">보험 설계</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>                      
                    <div class="h2-group">                        
                        <h2 class="h2">
                            보험을 설계해 주세요 <!-- ux 라이팅 수정 -->
                        </h2>
                    </div>
                    <div class="field">
                        <p class="label">계약 플랜 <!-- ux 라이팅 수정 -->
                            <span class="tooltip">
                                <button type="button" class="trigger">
                                    <span class="hide">툴팁</span>
                                </button>
                                <span class="panel">
                                    <span class="title">일반플랜</span>
                                    <span class="t-content">
                                        스윙에 자신감을 UP 동시에 홀인원에 기쁨을<br> (홀인원 70만원, 배상책임 1,000만원, 상해 5,000만원)

                                    </span>
                                    <span class="title">고급플랜</span>
                                    <span class="t-content">
                                        안전한 라운딩은 기본 홀인원의 기쁨을<br> (홀인원 100만원, 배상책임 2,000만원, 상해 1억원)

                                    </span>
                                </span>
                            </span>
                        </p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">선택</button>                            
                        </div>
                    </div>  
                    <div class="field">
                        <label for="datedate" class="label">보험 시작일</label>
                        <div class="mix datepicker">
                            <div class="text" data-clear="false">
                                <input type="text" class="left-side" id="datedate" value="2023.08.23" title="첫번째 날짜선택" aria-haspopup="true" readonly>
                            </div>
                            <div class="space -lined date">
                                <button type="button" class="icon-button -calendar" aria-haspopup="true"><span class="hide">달력 보기</span></button>
                            </div>
                            <p class="info">다음 날부터 설정할 수 있어요.</p>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">운전 여부</p> <!-- ux 라이팅 수정 -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">선택</button>
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">실손보험 확인</p>
                        <button type="button" class="button -lg">실손 중복 조회 동의 및 확인</button> <!-- ux 라이팅 수정 -->
                    </div>  
                    <div class="field">
                        <label for="search01" class="label">직업</label>
                        <div class="mix">
                            <div class="text">
                                <input type="text" class="left-side fake-readonly" id="search01" placeholder="검색" aria-haspopup="true" readonly>
                            </div>
                            <div class="space -lined search">
                                <button type="button" class="icon-button -search right-side" aria-haspopup="true"><span class="hide">조회</span></button>
                            </div>
                        </div>
                    </div>                                                                         
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- 숫자 키패드 레이어 -->
    <div class="custom-key-layer" aria-hidden="true">
        <div class="amount-btn-wrap">
            <button type="button" value="100000" class="button numBtn -sm -fit">+10만</button>
            <button type="button" value="500000" class="button numBtn -sm -fit">+50만</button>
            <button type="button" value="1000000" class="button numBtn -sm -fit">+100만</button>
            <button type="button" value="10000000" class="button numBtn -sm -fit">+1,000</button>
        </div>
        <div class="custom-key-wrap">
            <button type="button" class="numBtn" value="1" title="숫자 1 입력">1</button>
            <button type="button" class="numBtn" value="2" title="숫자 2 입력">2</button>
            <button type="button" class="numBtn" value="3" title="숫자 3 입력">3</button>
            <button type="button" class="numBtn" value="4" title="숫자 4 입력">4</button>
            <button type="button" class="numBtn" value="5" title="숫자 5 입력">5</button>
            <button type="button" class="numBtn" value="6" title="숫자 6 입력">6</button>
            <button type="button" class="numBtn" value="7" title="숫자 7 입력">7</button>
            <button type="button" class="numBtn" value="8" title="숫자 8 입력">8</button>
            <button type="button" class="numBtn" value="9" title="숫자 9 입력">9</button>
            <button type="button" class="numBtn btn-temp" disabled  aria-hidden="true">NH</button>
            <button type="button" class="numBtn btn-amount" value="00" title="숫자 00입력" >00</button>
            <button type="button" class="numBtn" value="0" title="숫자 0 입력">0</button>
            <button type="button" class="numBtn btn-del" title="마지막 숫자 삭제">←</button>
        </div>
        <div class="buttons">
            <button type="button" class="button -lg -primary" onclick="numKey.keyClose()">확인</button>
        </div>
    </div>
    <!-- 숫자 키패드 레이어 -->

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
       /* 키패드 키입력 예시 */
       var numKeyEmt = document.querySelectorAll('.custom-key-wrap button');
        numKeyEmt.forEach(function(numKeyEmt) {
            numKeyEmt.addEventListener('click',function () {
                var $targetInput;
                var $thisValLayer = numKeyEmt.closest('.custom-key-layer.-active');  //dim 없는 레이어 숫자 키패드
                var $thisValChoose = numKeyEmt.closest('.choose-account-Wrap');  //bottom sheet 숫자 키패드
                
                if ($thisValLayer !== null) {
                    $targetInput = numKey.numInput;
                } else if($thisValChoose !== null) {
                    $targetInput = $thisValChoose.querySelector('.choose-account-input input')
                    $targetInput.closest('.text').classList.remove('-textless');
                }
                var $thisval = numKeyEmt.value;

                if (numKeyEmt.classList.contains('btn-del')) {
                    if ($targetInput.value.length !== 0) {
                        $targetInput.value = $targetInput.value.slice(0,-1);
                        if ($targetInput.value.length == 0) {
                            setTimeout(function() {
                                $targetInput.closest('.text').classList.add('-textless');
                            }, 101);
                        }
                    }
                }else{
                    $targetInput.value = $targetInput.value + $thisval;
                }
            })
        });


        //10만, 50만.... 버튼 클릭시
        var amountBtn = document.querySelectorAll('.amount-btn-wrap button');
        amountBtn.forEach(function(amountBtn) {
            amountBtn.addEventListener('click',function () {
                var $targetInput;
                var $thisValLayer = amountBtn.closest('.custom-key-layer.-active');  //dim 없는 레이어 숫자 키패드
                var $thisValChoose = amountBtn.closest('.choose-account-Wrap');  //bottom sheet 숫자 키패드
                if ($thisValLayer !== null) {
                    $targetInput = numKey.numInput;
                } else if($thisValChoose !== null) {
                    $targetInput = $thisValChoose.querySelector('.choose-account-input input')
                }
                var $thisval = amountBtn.value;
                $targetInput.value = Number($thisval) + Number($targetInput.value);
            })
        });
        /* //키패드 키입력 예시 */      
    </script>
</body>
</html>
