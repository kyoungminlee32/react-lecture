<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">
    <link rel="stylesheet" href="../../assets/css/util.css">

<body>
    <div id="layer" class="layer">
        <div class="container">
            <div class="header">
                <div class="inner">
                    <h1 class="title">보험 종류를 선택해 주세요</h1> <!-- [231227] 마침표 삭제 --> <!-- ux 라이팅 수정 -->

                    <div class="funcs">
                        <button type="button" class="func -close"><span class="hide">닫기</span></button>
                    </div>
                </div>
            </div>

            <div class="contents">
                <div class="content">
                    <div class="options"><!-- 240327 재검토 -->
                        <ul> <!-- [CASE] 여행보험 경우 노출 --> 
                            <li><button type="button" class="option">개인 실속형</button></li>
                            <li><button type="button" class="option -active">개인 고급형</button></li>
                            <li><button type="button" class="option">가족 실속형</button></li>
                            <li><button type="button" class="option">가족 고급형</button></li>                            
                        </ul>
                        <ul style="display: none;"> <!-- [CASE] (무)손안에골라담는암보험10년만기_20년만기)인 경우 노출 -->                          
                            <li><button type="button" class="option -active">(무)손안에 골라담는 암보험 10년만기</button></li> 
                        </ul>
                        <ul style="display: none;"> <!-- [CASE] 변액보험인 경우 노출 -->
                            <li><button type="button" class="option">(무)ETF 투자의 정석 변액저축보험(e)_기본형_적립형</button></li>
                            <li><button type="button" class="option -active">(무)ETF 투자의 정석 변액저축보험(e)_기본형_거치형</button></li>
                        </ul>
                        <ul style="display: none;"> <!-- [CASE] 보장성보험인 경우 노출 -->
                            <li><button type="button" class="option">(무)건강e제일 입원비보험(월납)</button></li>
                            <li><button type="button" class="option -active">(무)건강e제일 입원비보험(연납)</button></li>
                        </ul>
                        <ul style="display: none;"> <!-- [CASE] 저축보험인 경우 노출 -->
                            <li><button type="button" class="option">(무)엔젤더확실한e양로저축보험_중도금부형(보험료)</button></li>
                            <li><button type="button" class="option -active">(무)엔젤더확실한e양로저축보험_기본형(보험료)</button></li>
                        </ul>
                    </div><!-- //240327 재검토 -->
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>

        Layer.open('layer');
