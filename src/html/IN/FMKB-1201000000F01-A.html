                    <h3 class="title">과세 대상 계약이에요.</h3>
                    <ul class="ul -bullet">
                        <li>보험 만기가 10년 미만인 계약</li> <!-- ux 라이팅 수정 -->
                        <li>10년 이내 납입보험료를 확정 연금형태로 분할하여 지급받는 계약</li> <!-- ux 라이팅 수정 -->

                    </ul>

                    <p class="p">계약자당 보험 비과세범위를 초과하여 가입하거나 입금할 경우 보험차익에 대하여 과세 됩니다.</p>
                    <p class="p">동 과세되는 보험차익과 다른 금융소득을 합산하여 세법에서 정한 금융 소득(현재 1인당 2천만원)을 초과한 경우, 종합소득세가 부과됩니다.</p>
