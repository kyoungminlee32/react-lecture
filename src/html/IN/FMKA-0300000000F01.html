<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">    
    <link rel="stylesheet" href="../../assets/css/insurance.css">  
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">보험 선물하기</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>                      
                    <div class="h2-group">                        
                        <h2 class="h2">
                            선물 받는 분의 정보를 입력해 주세요
                        </h2>
                    </div>
                    <div class="field">
                        <label for="phone12344" class="label multi-label">휴대폰 번호</label> <!-- ux 라이팅 수정 -->
                        <div class="mix">
                            <div class="text flex-8" data-clear="false">
                                <input type="tel" data-id="none" class="left-side num-call" placeholder="직접 입력 또는 주소록 검색" aria-haspopup="true" readonly>
                            </div>
                            <div class="space -lined right-side">
                                <button type="button" class="button -xs -fit">주소록</button>
                            </div>
                            <p class="message -error">휴대폰 번호를 확인해 주세요. </p> <!-- [240118] 메세지 추가 --> <!-- ux 라이팅 수정 -->
                        </div>
                    </div>
                    <div class="field -error">
                        <label for="text" class="label">이름</label>
                        <div class="text">
                            <input type="text" id="text" value="" placeholder="선물 받는 분의 실명으로 반드시 입력해 주세요.">
                        </div>
                        <div class="info-wrap"> <!-- [240118] 메세지 추가 -->
                            <p class="message">이름을 확인해 주세요.</p>
                        </div>
                    </div>
                    <div class="field">
                        <label for="text" class="label">확인사항</label>
                        <div class="box"> <!-- ui수정 240122 (-sm 삭제) -->
                            <p class="p center">
                                보험 가입할 수 있는 나이는 <span class="age">만 19세 ~ 34세</span>입니다. <!-- ux 라이팅 수정 -->
                            </p>
                        </div>  
                        <div class="checkbox -sm">
                            <input type="checkbox" id="checkbox-sm-checked02">
                            <label for="checkbox-sm-checked02">선물 받는 분의 나이를 확인했어요.</label> <!-- ux 라이팅 수정 -->
                        </div>
                    </div>
                </div>


                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
       
    </script>
</body>
</html>
