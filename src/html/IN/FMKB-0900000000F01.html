<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">    
    <link rel="stylesheet" href="../../assets/css/insurance.css">  
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">보험 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>                      
                    <div class="h2-group">                        
                        <h2 class="h2">
                            추가정보를 입력해 주세요 
                        </h2>
                    </div>
                    <div class="field -error"> <!-- [CASE] 아니오시 error 추가 -->
                        <p class="label">실소유자 여부</p>
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-1">
                                <label for="period-point-color1-1">예</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color1" id="period-point-color1-2" checked>
                                <label for="period-point-color1-2">아니요</label> 
                            </div>
                        </div>
                        <div class="info-wrap"> <!-- [CASE] 아니요 선택시 안내 문구 제공 -->
                            <p class="message">실제 소유자가 아닌 경우 가입할 수 없습니다.</p> <!-- [231205] 클래스명 변경 -->
                        </div>
                    </div>
                    <div class="field -error"> <!-- [CASE] 아니오시 error 추가 -->
                        <p class="label">금융정보 제공 대상</p>
                        <h3 class="h5">미국납세의무자(시민권자, 영주권자, 미국 세법상 미국 거주자)에 해당하거나, 한국 이외에 다른 나라에 조세 목적상 거주지가 있으세요?</h3>
                        <div class="box-radios">
                            <div class="box-radio">
                                <input type="radio" name="period-point-color2" id="period-point-color2-1" checked> <!-- [CASE] 예 선택시 안내 문구 제공 -->
                                <label for="period-point-color2-1">예</label>
                            </div>
                            <div class="box-radio">
                                <input type="radio" name="period-point-color2" id="period-point-color2-2">
                                <label for="period-point-color2-2">아니요</label> 
                            </div>
                        </div>
                        <div class="info-wrap"> <!-- [CASE] 아니요 선택시 안내 문구 제공 -->
                            <p class="message">한국 이외에 다른 나라에 조세 목적상 거주지가 있는 경우 가입할 수 없습니다.</p> <!-- [231205] 클래스명 변경 -->
                        </div>
                    </div>
                    <div class="field">
                        <p class="label">거래 목적</p> <!-- ux 라이팅 수정 -->
                        <div class="select">
                            <button type="button" aria-haspopup="true">선택</button>
                        </div>
                    </div>  
                    <div class="field">
                        <p class="label">자금의 원천 및 출처</p>
                        <div class="select">
                            <button type="button" aria-haspopup="true">선택</button>
                        </div>
                    </div>                                                                       
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">다음</button>
                    </div>
                </div>
            </main>
        </div>
    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
    </script>
</body>
</html>
