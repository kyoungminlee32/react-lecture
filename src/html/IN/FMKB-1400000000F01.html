<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <link rel="stylesheet" href="../../assets/libs/swiper/dist/css/swiper.min.css">
    <link rel="stylesheet" href="../../assets/css/common-ui.css">    
    <link rel="stylesheet" href="../../assets/css/insurance.css">  
</head>
<body>
    <div class="page">
        <div class="container">
            <header class="header">
                <div class="inner">
                    <div class="funcs">
                        <button type="button" class="func -back"><span class="hide">뒤로가기</span></button>
                    </div>

                    <h1 class="title">보험 가입</h1>

                    <div class="funcs">
                        <button type="button" class="func -cs"><span class="hide">상담</span></button>
                        <button type="button" class="func">취소</button>
                    </div>
                </div>
            </header>

            <main class="contents">
                <div class="content">
                    <div class="progress-top">
                        <div class="progress">
                            <!--
                                style 속성에서 사용되는 CSS 전용 변수로 게이지 컨트롤
                                --current : 현재 표시되야 하는 수치
                                    --max : 최대 수치
                                게이지가 차오르는 값을 css로 지정 합니다 %, 실수치, 모두 가능 ( ※게이지계산식 : 100% * ( --current / --max ) )
                                (단, 숫자 정수값만 사용할 것)
                            -->
                            <div class="bar" style="--current:6; --max:12;">
                                <div class="gauge">
                                    <!-- 접근성 관련 텍스트 동적 변경 필요 --> 
                                    <span class="hide"> 12단계 중 3번째</span> 
                                </div>
                            </div>
                        </div>
                    </div>                      
                    <div class="h2-group">                        
                        <h2 class="h2">보험료 출금계좌를 확인해 주세요</h2> <!-- [CASE] 보험 가입하기 진입한 경우 해당 문구 노출 --> <!-- ux 라이팅 수정 -->
                        <h2 class="h2" style="display: none;">보험료 받을 계좌를 확인해 주세요</h2> <!-- [CASE] 보험 선물받기 진입한 경우 해당 문구 노출 -->
                    </div>
                    <div class="field">
                        <dl class="dl -box">
                            <div>
                                <dt>상품명</dt>
                                <dd>NH해외여행보험 가족 고급형</dd>
                            </div>
                            <div>
                                <dt>보험료</dt>
                                <dd>120,000원</dd>
                            </div>
                            <div>
                                <dt>납입기간</dt>
                                <dd>2023.08.12 00:00<br> ~ 2023.08.13 24:00</dd>
                            </div>
                            <div>
                                <dt>납입방법</dt>
                                <dd>한번에 내기</dd>
                            </div>
                        </dl>                         
                    </div> 
                    <div class="field">
                        <div class="select">
                            <div class="button-type -fixed">
                                <div class="selection">
                                    <button type="button" aria-haspopup="true" data-bankcode="011" class="info">
                                        <span class="name">
                                            <span>주거래우대통장</span>
                                        </span>
                                        <span class="account-number">
                                            <span>NH농협</span>
                                            <span>111-1234-5678-99</span>
                                        </span>
                                    </button>
                                    <div class="amount">
                                        <div class="key">출금가능금액</div>
                                        <div class="value">
                                            <span>
                                                <!-- 2024-06-10 삭제 -->
                                                <!-- <button type="button" class="refresh"><span class="hide">새로고침</span></button> -->
                                            150,000,000</span>원
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- [240102] 하단 도트리스트 변경 -->
                            <div class="text">
                                <!-- 2024-06-10 삭제 -->
                                <!-- <p class="info -bullet">출금가능금액이 변동이 있으면 새로고침 해주세요.</p> -->
                                <!-- //2024-06-10 삭제 -->
                                <p class="info -bullet"><span class="point">선물 보낸 분의 계좌에서 고객님의 계좌로 입금되어  보험료 결제가 진행됩니다.</span> </p>
                            </div>
                        </div>
                    </div>
                    <!-- [CASE]보험 선물받기 진입한 경우 비노출 -->
                    <div class="field">
                        <div class="title-group">
                            <div class="inner">
                                <span class="title">NH포인트 사용 신청</span>                                
                            </div>
                            <span class="switch ml-auto -sm">
                                <input type="checkbox" id="switch3">
                                <label for="switch3"><span class="hide">스위치</span></label>
                            </span>
                        </div>
                        <p class="message">
                            NH포인트를 현금처럼 사용해 보세요. <br>캐시백을 신청하면 바로 출금계좌로 입금됩니다.  
 
                        </p>
                    </div>
                    <!-- //[CASE]보험 선물받기 진입한 경우 비노출 -->                                                                       
                </div>
                <div class="fixer">
                    <div class="buttons">
                        <button type="button" class="button -primary -lg">결제하기</button>
                    </div>
                </div>
            </main>
        </div>


    <script src="../../assets/libs/jquery/jquery-3.6.0.min.js"></script>
    <script src="../../assets/libs/anime/lib/anime.min.js"></script>
    <script src="../../assets/libs/swiper/dist/js/swiper.min.js"></script>
    <script src="../../assets/js/common-ui.js"></script>
    <script>
    </script>
</body>
</html>
